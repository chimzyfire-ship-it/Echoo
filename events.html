<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>echoo explore</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #080907;
        --panel: #11130f;
        --panel-2: #191b15;
        --ink: #f5f1e8;
        --muted: #a8a397;
        --dim: #706c62;
        --line: rgba(245, 241, 232, 0.13);
        --line-strong: rgba(245, 241, 232, 0.28);
        --signal: #e7c98e;
        --rose: #d8a2d9;
        --shadow: 0 24px 70px rgba(0, 0, 0, 0.42);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background:
          linear-gradient(90deg, rgba(245,241,232,0.035) 1px, transparent 1px) 0 0 / 34px 34px,
          radial-gradient(circle at 78% 4%, rgba(216,255,95,0.1), transparent 25rem),
          var(--bg);
      }

      a { color: inherit; text-decoration: none; }
      button, input { font: inherit; }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 18px;
        border-bottom: 1px solid var(--line);
        background: rgba(8, 9, 7, 0.82);
        backdrop-filter: blur(18px);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-weight: 950;
        font-size: 26px;
        letter-spacing: -0.05em;
      }

      .brand img {
        width: 44px;
        height: 44px;
        border: 1px solid var(--line);
        border-radius: 18px;
        object-fit: cover;
        object-position: 50% 0%;
      }

      .topbar a:last-child {
        min-height: 42px;
        padding: 0 15px;
        display: inline-flex;
        align-items: center;
        border: 1px solid var(--line);
        color: var(--muted);
        font-weight: 850;
      }

      .shell {
        width: min(1160px, 100%);
        margin: 0 auto;
        padding: 18px 18px 106px;
      }

      .hero {
        display: grid;
        gap: 16px;
        padding: 22px 0;
      }

      .kicker {
        color: var(--signal);
        font-size: 12px;
        font-weight: 950;
        letter-spacing: 0.15em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(48px, 14vw, 94px);
        line-height: 0.86;
        letter-spacing: -0.075em;
      }

      .search {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        padding: 8px;
        border: 1px solid var(--line);
        background: rgba(17, 19, 15, 0.88);
      }

      input {
        min-width: 0;
        min-height: 54px;
        border: 0;
        outline: 0;
        color: var(--ink);
        background: transparent;
        padding: 0 8px;
        font-weight: 750;
      }

      .primary,
      .filter {
        min-height: 54px;
        border: 1px solid var(--line);
        border-radius: 0;
        cursor: pointer;
        font-weight: 950;
        transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
      }

      .primary {
        border-color: transparent;
        color: #151311;
        background: linear-gradient(135deg, #e4bd78 0%, #f2ddb0 42%, var(--rose) 100%);
        padding: 0 18px;
      }

      .filter {
        flex: 0 0 auto;
        padding: 0 15px;
        color: var(--muted);
        background: rgba(245, 241, 232, 0.04);
      }

      .filter.active {
        color: #10110e;
        background: var(--ink);
      }

      .primary:hover,
      .filter:hover {
        transform: translateY(-2px);
        border-color: var(--line-strong);
      }

      .filters {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        scrollbar-width: none;
        padding-bottom: 4px;
      }

      .filters::-webkit-scrollbar { display: none; }

      .content {
        display: grid;
        gap: 14px;
      }

      .event {
        display: grid;
        grid-template-columns: 104px 1fr;
        gap: 14px;
        padding: 12px;
        border: 1px solid var(--line);
        background: rgba(17, 19, 15, 0.84);
        cursor: pointer;
        transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
      }

      .event:hover {
        transform: translateX(4px);
        border-color: var(--line-strong);
        background: rgba(25, 27, 21, 0.94);
      }

      .event img {
        width: 104px;
        height: 132px;
        object-fit: cover;
        filter: saturate(0.58) contrast(1.08);
      }

      .event small {
        color: var(--signal);
        font-size: 11px;
        font-weight: 950;
        letter-spacing: 0.13em;
        text-transform: uppercase;
      }

      .event h2 {
        margin: 8px 0;
        font-size: 24px;
        line-height: 0.98;
        letter-spacing: -0.055em;
      }

      .event p {
        margin: 0 0 12px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.38;
        font-weight: 650;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
      }

      .meta span {
        padding: 6px 9px;
        border: 1px solid var(--line);
        color: var(--muted);
        font-size: 12px;
        font-weight: 850;
      }

      .side {
        display: grid;
        gap: 12px;
      }

      .brief {
        padding: 16px;
        border: 1px solid var(--line);
        background: rgba(245, 241, 232, 0.035);
      }

      .brief h3 {
        margin: 0 0 8px;
        font-size: 25px;
        letter-spacing: -0.055em;
      }

      .brief p {
        margin: 0 0 14px;
        color: var(--muted);
        line-height: 1.42;
        font-weight: 650;
      }

      .bottom-nav {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 30;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        border-top: 1px solid var(--line);
        background: rgba(8, 9, 7, 0.88);
        backdrop-filter: blur(18px);
      }

      .bottom-nav a {
        display: grid;
        place-items: center;
        min-height: 68px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 850;
      }

      .bottom-nav a.active { color: var(--signal); }

      @media (min-width: 860px) {
        .shell { padding: 34px 28px 70px; }
        .hero {
          grid-template-columns: 1fr 480px;
          align-items: end;
          padding: 54px 0 26px;
        }
        .content {
          grid-template-columns: 1fr 340px;
          align-items: start;
        }
        .event { grid-template-columns: 190px 1fr; }
        .event img { width: 190px; height: 210px; }
        .bottom-nav { display: none; }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="index.html">
        <img src="assets/echoo-new-logo.jpg" alt="">
        <span>echoo</span>
      </a>
      <a href="auth.html">Sign in</a>
    </header>

    <main class="shell">
      <section class="hero">
        <div>
          <div class="kicker">Discover</div>
          <h1>Find the plan people answer yes to.</h1>
        </div>
        <form class="search" id="search-form">
          <input id="query" placeholder="What sounds good tonight?">
          <button class="primary" type="submit">Find</button>
        </form>
      </section>

      <div class="filters" id="filters">
        <button class="filter active" data-filter="all">All</button>
        <button class="filter" data-filter="music">Music</button>
        <button class="filter" data-filter="dates">Dates</button>
        <button class="filter" data-filter="movies">Films</button>
        <button class="filter" data-filter="food">Food</button>
      </div>

      <section class="content" style="margin-top: 16px;">
        <div id="events-list"></div>
        <aside class="side">
          <div class="brief">
            <h3 id="brief-title">A few good starts</h3>
            <p id="brief-copy">One easy plan, one interesting plan, and one backup for when the group changes its mind.</p>
            <a class="primary" style="display:inline-flex;align-items:center;text-decoration:none;" href="app.html">Plan with friends</a>
          </div>
        </aside>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="Primary">
      <a href="index.html">Home</a>
      <a class="active" href="events.html">Discover</a>
      <a href="app.html">Plan</a>
      <a href="auth.html">Sign in</a>
    </nav>

    <script>
      const events = [
        { id: 1, category: "music", title: "Basement listening room", copy: "A small-room set with reserved standing space and an easy late food route nearby.", img: "assets/news-music.png", meta: ["Tonight", "18 min", "$28"] },
        { id: 2, category: "dates", title: "Rooftop dinner plus quiet walk", copy: "A date plan that feels built, not assembled: table, timing, and a softer second stop.", img: "assets/news-date.png", meta: ["Weekend", "Two stops", "$$"] },
        { id: 3, category: "movies", title: "Late film with post-show dessert", copy: "A cinema anchor paired with a place that stays open late enough to keep talking.", img: "assets/news-movie.png", meta: ["9:40 PM", "Seats open", "$18"] },
        { id: 4, category: "food", title: "Kitchen still open", copy: "A simple food-first option for when nobody wants to plan, but everyone wants a good answer.", img: "assets/news-date.png", meta: ["Open late", "12 min", "$$"] }
      ];

      const list = document.getElementById("events-list");
      const queryInput = document.getElementById("query");
      let activeFilter = "all";

      function render() {
        const query = queryInput.value.trim().toLowerCase();
        const filtered = events.filter((event) => {
          const inFilter = activeFilter === "all" || event.category === activeFilter;
          const inQuery = !query || `${event.title} ${event.copy} ${event.category}`.toLowerCase().includes(query);
          return inFilter && inQuery;
        });

        list.innerHTML = filtered.map((event) => `
          <article class="event" data-id="${event.id}">
            <img src="${event.img}" alt="">
            <div>
              <small>${event.category}</small>
              <h2>${event.title}</h2>
              <p>${event.copy}</p>
              <div class="meta">${event.meta.map((item) => `<span>${item}</span>`).join("")}</div>
            </div>
          </article>
        `).join("") || `<div class="brief"><h3>Nothing close yet</h3><p>Try a broader mood, place, or time. Plain language works best.</p></div>`;
      }

      document.getElementById("filters").addEventListener("click", (event) => {
        const button = event.target.closest("[data-filter]");
        if (!button) return;
        activeFilter = button.dataset.filter;
        document.querySelectorAll("[data-filter]").forEach((item) => item.classList.toggle("active", item === button));
        render();
      });

      document.getElementById("search-form").addEventListener("submit", (event) => {
        event.preventDefault();
        render();
      });

      const params = new URLSearchParams(window.location.search);
      const filter = params.get("filter");
      const query = params.get("query") || params.get("ai");
      if (query) queryInput.value = query === "bored" ? "simple surprising tonight" : query;
      if (filter) {
        const button = document.querySelector(`[data-filter="${filter}"]`);
        if (button) button.click();
      } else {
        render();
      }
    </script>
  </body>
</html>
