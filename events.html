<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#050505" />
    <title>Discover · echoo</title>
    <link rel="stylesheet" href="assets/party-radar.css" />
    <link rel="stylesheet" href="assets/echoo-place-detail.css" />
    <style>
      :root {
        color-scheme: dark;
        --bg-black: #050505;
        --surface-dark: #121212;
        --surface-glass: rgba(22, 22, 22, 0.72);
        --ink: #f8f5ef;
        --muted: #9e978e;
        --line: rgba(248, 245, 239, 0.08);
        --line-strong: rgba(248, 245, 239, 0.16);
        --peach: #f7d5b2;
        --peach-glow: rgba(247, 213, 178, 0.15);
        --card-radius: 20px;
        --pill-radius: 9999px;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html, body {
        margin: 0;
        padding: 0;
        min-height: 100%;
        background-color: var(--bg-black);
        color: var(--ink);
        overflow-x: hidden;
      }

      body {
        display: flex;
        justify-content: center;
      }

      button, input {
        font: inherit;
        color: inherit;
        background: none;
        border: none;
        outline: none;
      }

      button {
        cursor: pointer;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      /* App Shell Container - Standard 430px mobile width */
      .app-shell {
        width: min(100vw, 430px);
        min-height: 100svh;
        isolation: isolate;
        position: relative;
        background:
          radial-gradient(circle at 50% -2%, rgba(247, 213, 178, 0.1), transparent 22rem),
          radial-gradient(circle at 15% 45%, rgba(120, 140, 180, 0.06), transparent 18rem),
          linear-gradient(180deg, #0a0a0a 0%, #050505 100%);
        padding-bottom: 94px;
      }

      /* Header Bar */
      .topbar {
        position: sticky;
        top: 0;
        z-index: 30;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: calc(28px + env(safe-area-inset-top)) 24px 16px;
        background: rgba(5, 5, 5, 0.82);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
      }

      .brand {
        display: flex;
        align-items: center;
        height: 32px;
      }

      .brand img {
        height: 24px;
        width: auto;
        filter: brightness(1.2);
      }

      .profile-link {
        display: grid;
        place-items: center;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: rgba(248, 245, 239, 0.06);
        border: 1px solid rgba(248, 245, 239, 0.12);
        color: var(--ink);
        transition: transform 0.2s ease, background 0.2s ease;
      }

      .profile-link:active {
        transform: scale(0.95);
      }

      .profile-link svg {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        stroke-width: 1.6;
        fill: none;
      }

      /* Main Shell Content */
      .shell {
        padding: 12px 24px 24px;
        display: flex;
        flex-direction: column;
        gap: 28px;
      }

      /* Location Badge */
      .location-badge {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--peach);
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 2px;
      }

      /* Hero Section */
      .hero {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-top: 4px;
      }

      .hero h1 {
        margin: 0;
        font-size: 34px;
        font-weight: 750;
        line-height: 1.12;
        letter-spacing: -0.02em;
        color: var(--ink);
      }

      .hero h1 .accent-dot {
        color: var(--peach);
      }

      .hero p {
        margin: 0;
        font-size: 15px;
        font-weight: 420;
        line-height: 1.45;
        color: var(--muted);
        max-width: 340px;
      }

      /* Search Bar */
      .search-wrap {
        position: relative;
        width: 100%;
        margin-top: 6px;
      }

      .search-form {
        display: flex;
        align-items: center;
        height: 56px;
        padding: 0 8px 0 18px;
        border-radius: var(--pill-radius);
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--line-strong);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        transition: border-color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
      }

      .search-form:focus-within {
        border-color: rgba(247, 213, 178, 0.4);
        background: rgba(255, 255, 255, 0.07);
        box-shadow: 0 0 20px var(--peach-glow);
      }

      .search-icon {
        width: 20px;
        height: 20px;
        stroke: var(--muted);
        stroke-width: 2;
        fill: none;
        margin-right: 12px;
        flex-shrink: 0;
      }

      .search-input {
        flex: 1;
        font-size: 15px;
        font-weight: 450;
        color: var(--ink);
        background: transparent;
      }

      .search-input::placeholder {
        color: var(--muted);
        font-weight: 400;
      }

      .search-submit-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: var(--peach);
        color: #050505;
        display: grid;
        place-items: center;
        transition: transform 0.18s ease, filter 0.18s ease;
        flex-shrink: 0;
      }

      .search-submit-btn:active {
        transform: scale(0.94);
      }

      .search-submit-btn svg {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        stroke-width: 2.2;
        fill: none;
      }

      /* Auto Suggestions Popover */
      .suggestions-popover {
        position: absolute;
        top: calc(100% + 8px);
        left: 0;
        right: 0;
        z-index: 40;
        background: rgba(18, 18, 18, 0.96);
        backdrop-filter: blur(28px);
        -webkit-backdrop-filter: blur(28px);
        border: 1px solid var(--line-strong);
        border-radius: 20px;
        padding: 8px;
        display: flex;
        flex-direction: column;
        gap: 2px;
        box-shadow: 0 16px 36px rgba(0, 0, 0, 0.6);
      }

      .suggestions-popover[hidden] {
        display: none !important;
      }

      .suggestion-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 14px;
        border-radius: 14px;
        font-size: 14px;
        color: var(--ink);
        text-align: left;
        transition: background 0.15s ease;
      }

      .suggestion-item:hover, .suggestion-item:focus {
        background: rgba(248, 245, 239, 0.08);
      }

      /* Category Pills Bar */
      .category-pills {
        display: flex;
        gap: 10px;
        overflow-x: auto;
        padding: 4px 0 6px;
        scrollbar-width: none;
        -ms-overflow-style: none;
        margin: -4px -24px 0;
        padding-left: 24px;
        padding-right: 24px;
      }

      .category-pills::-webkit-scrollbar {
        display: none;
      }

      .chip {
        white-space: nowrap;
        padding: 10px 18px;
        border-radius: var(--pill-radius);
        font-size: 14px;
        font-weight: 500;
        color: var(--muted);
        background: transparent;
        border: 1px solid transparent;
        transition: all 0.2s ease;
        flex-shrink: 0;
      }

      .chip:hover {
        color: var(--ink);
      }

      .chip.active {
        background: var(--peach);
        color: #050505;
        font-weight: 650;
        border-color: var(--peach);
      }

      /* Highlighted Category Chip for Upcoming Drop */
      .chip.chip-drop {
        border-color: rgba(247, 213, 178, 0.4);
        color: var(--peach);
        font-weight: 600;
        background: rgba(247, 213, 178, 0.08);
      }

      .chip.chip-drop.active {
        background: var(--peach);
        color: #050505;
      }

      /* Section Headers */
      .section-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 14px;
      }

      .section-header h2 {
        margin: 0;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: -0.01em;
        color: var(--ink);
      }

      .section-header .see-all {
        font-size: 13px;
        font-weight: 550;
        color: var(--peach);
        display: flex;
        align-items: center;
        gap: 4px;
      }

      /* Featured Destination Card */
      .featured-card {
        position: relative;
        width: 100%;
        aspect-ratio: 16 / 9.5;
        border-radius: 24px;
        overflow: hidden;
        background: #111;
        border: 1px solid var(--line);
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
        cursor: pointer;
        transition: transform 0.22s ease, border-color 0.22s ease;
      }

      .featured-card:active {
        transform: scale(0.98);
      }

      .featured-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .featured-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to top,
          rgba(5, 5, 5, 0.94) 0%,
          rgba(5, 5, 5, 0.4) 50%,
          rgba(5, 5, 5, 0.05) 100%
        );
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        padding: 20px 22px;
      }

      .featured-info {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .featured-title {
        margin: 0;
        font-size: 21px;
        font-weight: 750;
        color: var(--ink);
        line-height: 1.2;
      }

      .featured-sub {
        font-size: 13px;
        font-weight: 450;
        color: var(--muted);
      }

      .featured-rating {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        font-weight: 600;
        color: var(--ink);
        margin-top: 2px;
      }

      .featured-rating .star {
        color: var(--peach);
      }

      .featured-action-btn {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: rgba(30, 30, 30, 0.75);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: var(--ink);
        display: grid;
        place-items: center;
        flex-shrink: 0;
      }

      .featured-action-btn svg {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        stroke-width: 2;
        fill: none;
      }

      /* Horizontal Scroll Carousels */
      .horizontal-carousel {
        display: flex;
        gap: 14px;
        overflow-x: auto;
        padding-bottom: 8px;
        margin: 0 -24px;
        padding-left: 24px;
        padding-right: 24px;
        scrollbar-width: none;
      }

      .horizontal-carousel::-webkit-scrollbar {
        display: none;
      }

      /* Location Card */
      .location-card {
        flex: 0 0 160px;
        height: 215px;
        position: relative;
        border-radius: 20px;
        overflow: hidden;
        background: #151515;
        border: 1px solid var(--line);
        cursor: pointer;
        transition: transform 0.2s ease;
      }

      .location-card:active {
        transform: scale(0.97);
      }

      .location-card-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .location-card-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to top,
          rgba(5, 5, 5, 0.95) 0%,
          rgba(5, 5, 5, 0.35) 55%,
          transparent 100%
        );
        padding: 14px 14px 16px;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        gap: 3px;
      }

      .location-card-title {
        font-size: 15px;
        font-weight: 700;
        color: var(--ink);
        line-height: 1.25;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .location-card-meta {
        font-size: 12px;
        font-weight: 450;
        color: var(--muted);
      }

      .location-card-rating {
        font-size: 12px;
        font-weight: 600;
        color: var(--ink);
        display: flex;
        align-items: center;
        gap: 4px;
        margin-top: 2px;
      }

      /* Skeleton Loader Styles */
      .skeleton-card {
        position: relative;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.05) !important;
        border: 1px solid rgba(248, 245, 239, 0.08) !important;
      }

      .skeleton-card::after {
        content: "";
        position: absolute;
        inset: 0;
        transform: translateX(-100%);
        background: linear-gradient(
          90deg,
          transparent 0%,
          rgba(255, 255, 255, 0.08) 50%,
          transparent 100%
        );
        animation: skeleton-shimmer 1.5s infinite;
      }

      @keyframes skeleton-shimmer {
        100% {
          transform: translateX(100%);
        }
      }

      /* View Toggle Switch (List / Map) */
      .view-switch {
        display: flex;
        background: rgba(248, 245, 239, 0.06);
        padding: 3px;
        border-radius: var(--pill-radius);
        border: 1px solid var(--line);
      }

      .view-switch button {
        padding: 4px 12px;
        border-radius: var(--pill-radius);
        font-size: 12px;
        font-weight: 550;
        color: var(--muted);
        transition: all 0.2s ease;
      }

      .view-switch button.active {
        background: var(--surface-dark);
        color: var(--ink);
        box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      }

      /* Map View Container */
      .map-view {
        width: 100%;
        height: 360px;
        border-radius: 24px;
        background: #0d0d0d;
        border: 1px solid var(--line);
        position: relative;
        overflow: hidden;
      }

      .map-caption {
        position: absolute;
        bottom: 16px;
        left: 16px;
        padding: 6px 12px;
        border-radius: var(--pill-radius);
        background: rgba(5, 5, 5, 0.8);
        border: 1px solid var(--line);
        font-size: 12px;
        color: var(--muted);
      }

      .map-pin {
        position: absolute;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: var(--peach);
        color: #050505;
        font-weight: 750;
        font-size: 13px;
        display: grid;
        place-items: center;
        transform: translate(-50%, -50%);
        box-shadow: 0 4px 14px rgba(0,0,0,0.5);
        border: 2px solid #050505;
      }

      /* Canonical Bottom Navigation Bar — must match index.html exactly */
      .bottom-nav {
        position: fixed;
        left: 50%;
        bottom: 12px;
        z-index: 30;
        width: min(376px, calc(100% - 52px));
        min-height: 72px;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 6px;
        padding: 10px 15px 8px;
        border: 1px solid rgba(248, 245, 239, 0.06);
        border-radius: 28px;
        background: rgba(25, 25, 24, 0.82);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.05),
          0 18px 44px rgba(0, 0, 0, 0.42);
        backdrop-filter: blur(26px);
        transform: translateX(-50%);
      }

      .nav-link {
        min-width: 0;
        display: grid;
        justify-items: center;
        align-content: center;
        gap: 5px;
        color: rgba(248, 245, 239, 0.62);
        font-size: 12px;
        font-weight: 560;
      }

      .nav-link.active {
        color: var(--peach);
      }

      .nav-link svg {
        width: 27px;
        height: 27px;
        stroke: currentColor;
        stroke-width: 1.8;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .nav-link.active svg {
        fill: currentColor;
        stroke-width: 0;
      }

      /* Floating AI Chat FAB */
      .fab-chat {
        position: fixed;
        bottom: 96px;
        right: max(16px, calc((100vw - 430px) / 2 + 16px));
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: var(--peach);
        color: #050505;
        display: grid;
        place-items: center;
        z-index: 45;
        box-shadow: 0 8px 24px rgba(247, 213, 178, 0.35);
        transition: transform 0.2s ease;
      }

      .fab-chat:active {
        transform: scale(0.93);
      }

      .fab-chat svg {
        width: 22px;
        height: 22px;
        fill: currentColor;
      }

      /* Modal Sheet (Detail View) */
      .sheet {
        position: fixed;
        inset: 0;
        z-index: 100;
        visibility: hidden;
        opacity: 0;
        transition: opacity 0.25s ease, visibility 0.25s ease;
        display: flex;
        justify-content: center;
        align-items: flex-end;
      }

      .sheet.open {
        visibility: visible;
        opacity: 1;
      }

      .sheet-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }

      .sheet-panel {
        position: relative;
        width: min(100vw, 430px);
        max-height: 88vh;
        overflow-y: auto;
        background: #141414;
        border-top-left-radius: 28px;
        border-top-right-radius: 28px;
        border: 1px solid var(--line-strong);
        border-bottom: none;
        padding: 24px 24px calc(28px + env(safe-area-inset-bottom, 0px));
        transform: translateY(100%);
        transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        z-index: 2;
      }

      .sheet.open .sheet-panel {
        transform: translateY(0);
      }

      /* Hide floating bottom nav and FAB when sheet modal is active */
      body.sheet-open .bottom-nav {
        opacity: 0 !important;
        pointer-events: none !important;
        transform: translate(-50%, 40px) !important;
        transition: transform 0.25s ease, opacity 0.2s ease;
      }

      body.sheet-open .fab-chat {
        opacity: 0 !important;
        pointer-events: none !important;
        transition: opacity 0.2s ease;
      }

      .sheet-handle {
        width: 36px;
        height: 4px;
        border-radius: 2px;
        background: rgba(248, 245, 239, 0.2);
        margin: 0 auto 20px;
      }

      .sheet-close {
        position: absolute;
        top: 20px;
        right: 20px;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: rgba(248, 245, 239, 0.08);
        color: var(--ink);
        display: grid;
        place-items: center;
        font-size: 20px;
      }

      .detail-art {
        width: 100%;
        aspect-ratio: 16 / 10;
        border-radius: 20px;
        background-size: cover;
        background-position: center;
        margin-bottom: 16px;
      }

      .detail-kicker {
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        color: var(--peach);
        letter-spacing: 0.06em;
      }

      .detail-title {
        font-size: 24px;
        font-weight: 750;
        margin: 4px 0 8px;
        color: var(--ink);
      }

      .detail-copy {
        font-size: 15px;
        line-height: 1.45;
        color: var(--muted);
        margin-bottom: 20px;
      }

      .detail-actions {
        display: flex;
        gap: 10px;
        margin-top: 24px;
      }

      .detail-actions button, .detail-actions a {
        flex: 1;
        padding: 14px;
        border-radius: var(--pill-radius);
        text-align: center;
        font-weight: 650;
        font-size: 14px;
        background: rgba(248, 245, 239, 0.08);
        color: var(--ink);
        border: 1px solid var(--line);
      }

      .detail-actions .primary {
        background: var(--peach);
        color: #050505;
        border: none;
      }
    </style>
    <link rel="stylesheet" href="assets/page-loader.css" />
    <script>document.documentElement.classList.add("echoo-page-loading");</script>
  </head>
  <body>
    <div class="app-shell">
      <!-- Header -->
      <header class="topbar" aria-label="Echoo">
        <a class="brand" href="index.html" aria-label="Echoo home">
          <img src="assets/echoo-wordmark.png" alt="echoo" />
        </a>
      </header>

      <!-- Main Shell Content -->
      <main class="shell">
        <!-- Hero Section -->
        <section class="hero">
          <div class="location-badge" id="location-note">
            <span style="display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--peach);"></span>
            <span>VANCOUVER TODAY</span>
          </div>
          <h1>Discover your next favorite place<span class="accent-dot">.</span></h1>
          <p>Thoughtful places, plans, and experiences — all grounded in what Echoo knows locally.</p>
          
          <!-- Search Bar -->
          <div class="search-wrap">
            <form class="search-form" id="search-form" role="search" aria-label="Search Echoo">
              <svg class="search-icon" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="7" />
                <path d="m16.5 16.5 4.5 4.5" />
              </svg>
              <input
                id="query"
                class="search-input"
                autocomplete="off"
                placeholder="Search and discover places"
                aria-controls="suggestions"
                aria-expanded="false"
              />
              <button class="search-submit-btn" type="submit" aria-label="Search">
                <svg viewBox="0 0 24 24">
                  <path d="M5 12h14M12 5l7 7-7 7" />
                </svg>
              </button>
            </form>
            <div class="suggestions-popover" id="suggestions" role="listbox" hidden></div>
          </div>
        </section>

        <!-- Category Pills -->
        <div class="category-pills" id="chips" aria-label="Explore categories">
          <button class="chip active" data-query="trending">Trending</button>
          <button class="chip chip-drop" data-query="upcoming drop">Upcoming Drop</button>
          <button class="chip" data-query="food">Food</button>
          <button class="chip" data-query="music">Music</button>
          <button class="chip" data-query="nightlife">Nightlife</button>
          <button class="chip" data-query="culture">Culture</button>
          <button class="chip" data-query="nature">Nature</button>
        </div>

        <!-- Featured Destination Card -->
        <section aria-label="Featured Destination">
          <div class="featured-card" id="featured-destination-card">

        <section aria-label="Events this week" id="events-section">

        <!-- Search Results (Shown dynamically when searching) -->
        <section id="search-results-section" hidden>
          <div id="results" style="display: flex; flex-direction: column; gap: 14px; margin-top: 12px;"></div>
          <button id="load-more" style="width: 100%; padding: 14px; margin-top: 16px; border-radius: var(--pill-radius); background: rgba(248,245,239,0.06); border: 1px solid var(--line); font-weight: 600;" hidden>
            Show more places
          </button>
        </section>
      </main>

      <!-- AI Chat Floating Button -->
      <a class="fab-chat" href="app.html" aria-label="Open AI chat">
        <svg viewBox="0 0 24 24">
          <path d="M12 3c-4.97 0-9 3.13-9 7 0 2.38 1.42 4.49 3.63 5.74L5 21l4.39-2.17C10.24 18.94 11.11 19 12 19c4.97 0 9-3.13 9-7s-4.03-7-9-7Z" />
        </svg>

      <!-- Floating Bottom Navigation -->
      <nav class="bottom-nav" aria-label="Main navigation">

          <svg viewBox="0 0 24 24">

          <span>Home</span>

        <a class="nav-link active" href="events.html" aria-current="page">
          <svg viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="7" />

          <span>Discover</span>
        </a>
        <a class="nav-link" href="tickets.html">
          <svg viewBox="0 0 24 24">
            <path d="M3 9a3 3 0 0 0 0 6v3h18v-3a3 3 0 0 0 0-6V6H3Z" />
            <path d="M13 6v12" />
          </svg>
          <span>Tickets</span>
        </a>

          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="8" r="4" />
            <path d="M4 21a8 8 0 0 1 16 0" />

          <span>Profile</span>
        </a>
      </nav>
    </div>

    <!-- Detail Sheet Modal -->
    <div class="sheet" id="detail-sheet" aria-hidden="true">
      <div class="sheet-backdrop" data-close-sheet></div>
      <section class="sheet-panel" role="dialog" aria-modal="true" aria-label="Place details">
        <div class="sheet-handle"></div>
        <button class="sheet-close" data-close-sheet aria-label="Close details">×</button>
        <div id="detail-content"></div>
      </section>
    </div>

      <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
      <script src="assets/echoo-auth.js"></script>
      <script src="assets/echoo-place-detail.js"></script>
      <script src="assets/location-platform.js"></script>
      <script>
        const CONFIG = {
          anonKey: "sb_publishable_4FeunYH-ItDm68Sjg93c_w_s8yMizxH",
          exploreUrl: "https://dlezregdjpdqmooubwvl.supabase.co/functions/v1/explore-search",
          suggestionsUrl: "https://dlezregdjpdqmooubwvl.supabase.co/functions/v1/search-suggestions",
          communityUrl: "https://dlezregdjpdqmooubwvl.supabase.co/functions/v1/discovery-community",
          placeDetailUrl: "https://dlezregdjpdqmooubwvl.supabase.co/functions/v1/place-detail",
        };

      const params = new URLSearchParams(location.search);
      let prefs = {};
      try {
        prefs = JSON.parse(localStorage.getItem("echoo_preferences") || "{}");
      } catch (_) {}
      let city = params.get("city") || prefs.city || "Vancouver";
      let lat = Number(prefs.lastLat), lng = Number(prefs.lastLng);

      const queryInput = document.getElementById("query"),
        resultsEl = document.getElementById("results"),
        suggestionsEl = document.getElementById("suggestions"),
        mapView = document.getElementById("map-view"),
        mapPins = document.getElementById("map-pins"),
        loadMore = document.getElementById("load-more"),
        popularContainer = document.getElementById("popular-nearby-container");

      let activeQuery = params.get("query") || "trending",
        items = [],
        view = "list",
        suggestionTimer;

      const esc = (value) =>
        String(value || "").replace(/[&<>"']/g, (char) => ({
          "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
        })[char]);

      const headers = {
        "Content-Type": "application/json",
        apikey: CONFIG.anonKey,
        Authorization: `Bearer ${CONFIG.anonKey}`,
      };

      const DETAIL_PENDING_KEY = "echoo_pending_place_detail";

      function imageUrlFor(item) {
        const image = item?.image;
        const rawUrl = image?.url || (image?.storagePath
          ? `https://chimzyfire-ship-it.supabase.co/storage/v1/object/public/discovery-covers/${image.storagePath}`
          : item?.imageUrl || "");
        return /^https?:\/\//i.test(rawUrl) ? rawUrl : "";
      }

      function openDetailSheet() {
        const sheet = document.getElementById("detail-sheet");
        sheet.classList.add("open");
        sheet.setAttribute("aria-hidden", "false");
        document.body.classList.add("sheet-open");
      }

      function closeDetailSheet() {
        const sheet = document.getElementById("detail-sheet");
        sheet.classList.remove("open");
        sheet.setAttribute("aria-hidden", "true");
        document.body.classList.remove("sheet-open");
      }

      function bindDetailCloseButtons() {
        document
          .querySelectorAll("#detail-content [data-close-sheet]")
          .forEach((btn) => (btn.onclick = closeDetailSheet));
      }

      function setDetailContent(html) {
        document.getElementById("detail-content").innerHTML = html;
        bindDetailCloseButtons();
        if (window.EchooPlaceDetail?.bindGalleryInteractions) {
          window.EchooPlaceDetail.bindGalleryInteractions();
        }
      }

      function buildFallbackDetail(item) {
        const normalize = (value) => String(value || "").replace(/\s+/g, " ").trim();
        const rating = Number(
          item.community?.ratingAverage ||
            item.rating ||
            item.rating_average ||
            "",
        );
        const ratingCount = Number(
          item.community?.ratingCount ||
            item.rating_count ||
            item.reviews ||
            0,
        );
        const hasRating = Number.isFinite(rating);
        return {
          place: {
            id: item.id || "",
            name: normalize(item.title || item.name || "This place"),
            category: item.category || "Place",
            subcategory: item.subcategory || "",
            municipality: normalize(item.neighborhood || item.city || city),
            city: normalize(item.city || city),
            formatted_address: normalize(item.neighborhood || item.address || city),
            latitude: item.latitude || null,
            longitude: item.longitude || null,
            timezone: "America/Toronto",
            image_url: imageUrlFor(item) || item.image || "",
            phone: normalize(item.phone || item.contactPhone || ""),
            website: normalize(item.website || ""),
            rating_average: hasRating ? rating : null,
            rating_count: ratingCount > 0 ? ratingCount : null,
          },
          community: hasRating
            ? {
                ratingAverage: rating,
                ratingCount,
              }
            : null,
          profile: {
            summary: normalize(item.description || ""),
            good_for: item.good_for || item.bestFor || [],
            vibe_tags: item.vibe_tags || item.tags || [],
            activity_tags: item.activity_tags || [],
            meal_tags: item.meal_tags || [],
            price_band: item.price_band || item.priceBand || "",
            noise_level: item.noise_level || "",
            confidence_score: hasRating ? Math.min(1, Math.max(0.45, rating / 5)) : null,
          },
          hours: [],
          sources: [],
          relatedEvents: [],
          alternatives: [],
          sourceStatus: {
            sourceCount: 0,
            confidenceScore: hasRating ? Math.min(1, Math.max(0.45, rating / 5)) : null,
          },
        };
      }

      async function fetchPlaceDetail(item) {
        if (!item?.id) return buildFallbackDetail(item);
        const headersForDetail = window.EchooAuth?.authHeaders
          ? await window.EchooAuth.authHeaders({
              "Content-Type": "application/json",
            })
          : headers;
        const response = await fetch(
          `${CONFIG.placeDetailUrl}?id=${encodeURIComponent(item.id)}`,
          { headers: headersForDetail },
        );
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(payload?.error || "Place detail failed");
        }
        return payload?.data || buildFallbackDetail(item);
      }

      function savePendingDetail(item) {
        sessionStorage.setItem(
          DETAIL_PENDING_KEY,
          JSON.stringify({
            item,
            city,
            createdAt: Date.now(),
          }),
        );
      }

      function clearPendingDetail() {
        sessionStorage.removeItem(DETAIL_PENDING_KEY);
      }

      async function resumePendingDetail() {
        const raw = sessionStorage.getItem(DETAIL_PENDING_KEY);
        if (!raw || !window.EchooAuth?.getAuthState) return;
        let pending;
        try {
          pending = JSON.parse(raw);
        } catch (_) {
          clearPendingDetail();
          return;
        }
        const authState = await window.EchooAuth.getAuthState({
          requireFresh: true,
        });
        if (!authState.ok) return;
        clearPendingDetail();
        await openDetailByItem(pending.item, { resume: true });
      }

      async function openDetailByItem(item, options = {}) {
        const authState = window.EchooAuth?.getAuthState
          ? await window.EchooAuth.getAuthState({ requireFresh: true })
          : { ok: false, signedIn: false, needsLogin: true, needsReauth: false };
        const heroImage = imageUrlFor(item) || item?.image || defaultPlaces[0].image;

        if (!authState.ok) {
          savePendingDetail(item);
          setDetailContent(
            window.EchooPlaceDetail.renderAuthPrompt({
              title: "Sign in to unlock this place",
              subhead: "Back in a sec.",
              note: "We’ll bring you back here after a quick sign-in.",
              nextUrl: `${window.location.pathname.split("/").pop() || "events.html"}${window.location.search}${window.location.hash}`,
              seed: item?.title || item?.name || "place",
              primaryLabel: "Sign in",
              secondaryLabel: "Keep browsing",
            }),
          );
          openDetailSheet();
          return;
        }

        openDetailSheet();
        setDetailContent(
          window.EchooPlaceDetail.renderPlaceDetail(
            buildFallbackDetail(item),
            {
              heroImage,
              preview: true,
              directionsHref:
                item?.id && Number.isFinite(Number(item.latitude)) && Number.isFinite(Number(item.longitude))
                  ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(`${item.latitude},${item.longitude}`)}`
                  : undefined,
            },
          ),
        );

        try {
          const detail = await fetchPlaceDetail(item);
          const resolvedHeroImage =
            detail?.place?.image_url ||
            detail?.place?.imageUrl ||
            heroImage;
          setDetailContent(
            window.EchooPlaceDetail.renderPlaceDetail(detail, {
              heroImage: resolvedHeroImage,
              directionsHref:
                item?.id && Number.isFinite(Number(item.latitude)) && Number.isFinite(Number(item.longitude))
                  ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(`${item.latitude},${item.longitude}`)}`
                  : undefined,
            }),
          );
          clearPendingDetail();
        } catch (error) {
          console.warn("Echoo: place detail load failed.", error);
          setDetailContent(
            window.EchooPlaceDetail.renderPlaceDetail(buildFallbackDetail(item), {
              heroImage,
            }),
          );
          clearPendingDetail();
        }
      }

      const defaultPlaces = [
        {
          title: "Science World",
          category: "Museum",
          neighborhood: "Downtown Vancouver",
          rating: 4.8,
          reviews: 120,
          image: "https://images.unsplash.com/photo-1569336415962-a4bd9f69cd83?auto=format&fit=crop&w=800&q=80",
          distance: "0.8 km"
        },
        {
          title: "Breka Bakery",
          category: "Café",
          neighborhood: "Davie St",
          rating: 4.6,
          distance: "0.4 km",
          image: "https://images.unsplash.com/photo-1509440159596-0249088772ff?auto=format&fit=crop&w=600&q=80"
        },
        {
          title: "The Roof",
          category: "Rooftop",
          neighborhood: "Downtown",
          rating: 4.7,
          distance: "0.6 km",
          image: "https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&w=600&q=80"
        },
        {
          title: "The Narrow",
          category: "Bar",
          neighborhood: "Main St",
          rating: 4.5,
          distance: "0.7 km",
          image: "https://images.unsplash.com/photo-1514933651103-005eec06c04b?auto=format&fit=crop&w=600&q=80"
        },
        {
          title: "Grouse Mountain",
          category: "Park",
          neighborhood: "North Vancouver",
          rating: 4.4,
          distance: "4.2 km",
          image: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=600&q=80"
        }
      ];

      function renderPopularNearby(placeList) {
        const list = placeList.length ? placeList : defaultPlaces;
        popularContainer.innerHTML = list.map((item, idx) => {
          const img = imageUrlFor(item) || item.image || defaultPlaces[idx % defaultPlaces.length].image;
          const rating = item.community?.ratingAverage ? Number(item.community.ratingAverage).toFixed(1) : item.rating || "4.6";
          const dist = item.distanceMeters ? `${(item.distanceMeters / 1000).toFixed(1)} km` : item.distance || "0.5 km";
          const cat = item.category || "Place";

          return `
            <div class="location-card" onclick="openDetail(${idx})">
              <img class="location-card-img" src="${esc(img)}" alt="${esc(item.title)}" loading="lazy" />
              <div class="location-card-overlay">
                <div class="location-card-title">${esc(item.title)}</div>
                <div class="location-card-meta">${esc(cat)} • ${esc(dist)}</div>
                <div class="location-card-rating">★ ${esc(rating)}</div>
              </div>
            </div>
          `;
        }).join("");
      }

      function updateFeaturedCard(featured) {
        if (!featured) return;
        const img = imageUrlFor(featured) || featured.image || defaultPlaces[0].image;
        document.getElementById("featured-img").src = img;
        document.getElementById("featured-title").textContent = featured.title || "Science World";
        document.getElementById("featured-sub").textContent = `${featured.category || 'Museum'} • ${featured.neighborhood || featured.city || 'Downtown Vancouver'}`;
        document.getElementById("featured-score").textContent = featured.community?.ratingAverage ? Number(featured.community.ratingAverage).toFixed(1) : (featured.rating || "4.8");
        document.getElementById("featured-destination-card").onclick = () => openDetail(0);
      }

      function renderItems() {
        if (items.length) {
          updateFeaturedCard(items[0]);
          renderPopularNearby(items.slice(1));
        } else {
          renderPopularNearby(defaultPlaces);
        }
      }

      async function search(query = activeQuery) {
        let cleanQuery = query.trim().toLowerCase();
        if (!cleanQuery) cleanQuery = "trending";
        activeQuery = cleanQuery;

        document.querySelectorAll(".chip").forEach((chip) => {
          chip.classList.toggle("active", chip.dataset.query === activeQuery);
        });

        if (activeQuery === "upcoming drop") {
          document.getElementById("events-section").scrollIntoView({ behavior: "smooth" });
          return;
        }

        queryInput.value = activeQuery === "trending" ? "" : activeQuery;
        suggestionsEl.hidden = true;

        try {
          const response = await fetch(CONFIG.exploreUrl, {
            method: "POST",
            headers,
            body: JSON.stringify({
              query: activeQuery === "trending" ? "top attractions" : activeQuery,
              city,
              includeLiveFallback: true,
              limit: 15,
            }),
          });
          if (response.ok) {
            const payload = await response.json();
            items = payload.results || [];
            renderItems();
          } else {
            renderItems();
          }
        } catch (_) {
          renderItems();
        }
      }

      function openDetail(index) {
        const item = items[index] || defaultPlaces[index] || defaultPlaces[0];
        savePendingDetail(item);
        openDetailByItem(item);
      }

      function closeDetail() {
        clearPendingDetail();
        closeDetailSheet();
      }

      document.getElementById("search-form").onsubmit = (e) => {
        e.preventDefault();
        search(queryInput.value);
      };

      document.getElementById("chips").onclick = (e) => {
        const chip = e.target.closest("[data-query]");
        if (chip) search(chip.dataset.query);
      };

      document.querySelector(".view-switch").onclick = (e) => {
        const btn = e.target.closest("button");
        if (!btn) return;
        document.querySelectorAll(".view-switch button").forEach(b => b.classList.toggle("active", b === btn));
        const isMap = btn.dataset.view === "map";
        popularContainer.hidden = isMap;
        mapView.hidden = !isMap;
      };

      document.querySelectorAll("[data-close-sheet]").forEach((btn) => btn.onclick = closeDetail);

      // Initial setup
      document.getElementById("location-note").innerHTML = `<span style="display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--peach);"></span><span>${city.toUpperCase()} TODAY</span>`;
      renderPopularNearby(defaultPlaces);
      search(activeQuery);
      resumePendingDetail();
    </script>
    <script src="assets/party-radar.js"></script>
    <script src="assets/page-loader.js"></script>
  </body>
