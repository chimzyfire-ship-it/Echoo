<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#090909" />
    <title>Explore · echoo</title>
    <style>
      :root {
        color-scheme: dark;
        --ink: #f8f5ef;
        --muted: #aaa29a;
        --line: rgba(248, 245, 239, 0.12);
        --peach: #f7d5b2;
        --panel: #151515;
        --deep: #070707;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #000;
        color: var(--ink);
      }
      body {
        display: grid;
        justify-items: center;
        overflow-x: hidden;
      }
      button,
      input {
        font: inherit;
      }
      button {
        cursor: pointer;
      }
      a {
        color: inherit;
        text-decoration: none;
      }
      .app-shell {
        width: min(100vw, 430px);
        min-height: 100svh;
        isolation: isolate;
        overflow: hidden;
        position: relative;
        background:
          radial-gradient(
            circle at 72% -5%,
            rgba(247, 213, 178, 0.16),
            transparent 21rem
          ),
          radial-gradient(
            circle at 5% 35%,
            rgba(111, 130, 169, 0.12),
            transparent 18rem
          ),
          linear-gradient(145deg, #171716 0%, #0a0a0a 46%, #030303);
      }
      .app-shell::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: -1;
        opacity: 0.55;
        background:
          linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.028),
            transparent 17%,
            transparent 83%,
            rgba(255, 255, 255, 0.024)
          ),
          radial-gradient(
            ellipse at center,
            transparent 43%,
            rgba(0, 0, 0, 0.62)
          );
      }
      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: calc(14px + env(safe-area-inset-top)) 27px 12px;
        background: rgba(8, 8, 8, 0.64);
        backdrop-filter: blur(22px);
      }
      .brand {
        display: inline-flex;
        width: 96px;
        height: 34px;
        align-items: center;
        overflow: hidden;
      }
      .brand img {
        width: 96px;
        filter: brightness(1.2) contrast(1.05);
      }
      .profile-link {
        display: grid;
        place-items: center;
        width: 34px;
        height: 34px;
        border: 2px solid rgba(248, 245, 239, 0.72);
        border-radius: 50%;
        position: relative;
        color: var(--ink);
      }
      .profile-link::before {
        content: "";
        width: 8px;
        height: 8px;
        border: 2px solid currentColor;
        border-radius: 50%;
        position: absolute;
        top: 6px;
      }
      .profile-link::after {
        content: "";
        position: absolute;
        left: 7px;
        right: 7px;
        bottom: 6px;
        height: 10px;
        border: 2px solid currentColor;
        border-bottom: 0;
        border-radius: 14px 14px 0 0;
      }
      .shell {
        padding: 16px 20px calc(112px + env(safe-area-inset-bottom));
      }
      .eyebrow {
        color: var(--peach);
        font-size: 10px;
        font-weight: 760;
        text-transform: uppercase;
        letter-spacing: 0.11em;
      }
      .hero {
        padding: 10px 7px 20px;
      }
      h1 {
        margin: 6px 0 10px;
        max-width: 9ch;
        font-size: clamp(42px, 12.2vw, 55px);
        line-height: 0.98;
        letter-spacing: -0.055em;
        font-weight: 830;
        text-wrap: balance;
      }
      .hero p {
        margin: 0;
        max-width: 31ch;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.45;
        font-weight: 510;
      }
      .search-wrap {
        position: relative;
        z-index: 10;
        margin-top: 20px;
      }
      .search {
        display: grid;
        grid-template-columns: 22px 1fr 44px;
        align-items: center;
        gap: 11px;
        min-height: 62px;
        padding: 8px 8px 8px 17px;
        border: 1px solid rgba(248, 245, 239, 0.1);
        border-radius: 22px;
        background: linear-gradient(
          180deg,
          rgba(48, 48, 46, 0.84),
          rgba(27, 27, 26, 0.84)
        );
        box-shadow:
          inset 0 1px rgba(255, 255, 255, 0.07),
          0 18px 42px rgba(0, 0, 0, 0.26);
        backdrop-filter: blur(24px);
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .search:focus-within {
        border-color: rgba(247, 213, 178, 0.55);
        box-shadow:
          inset 0 1px rgba(255, 255, 255, 0.08),
          0 0 0 4px rgba(247, 213, 178, 0.09),
          0 18px 42px rgba(0, 0, 0, 0.26);
      }
      .search-icon {
        width: 17px;
        height: 17px;
        border: 2px solid var(--ink);
        border-radius: 50%;
        position: relative;
        opacity: 0.9;
      }
      .search-icon::after {
        content: "";
        width: 7px;
        height: 2px;
        background: var(--ink);
        position: absolute;
        right: -5px;
        bottom: -3px;
        transform: rotate(45deg);
        border-radius: 99px;
      }
      .search input {
        width: 100%;
        min-width: 0;
        border: 0;
        outline: 0;
        background: transparent;
        color: var(--ink);
        font-size: 15px;
        font-weight: 560;
      }
      .search input::placeholder {
        color: rgba(248, 245, 239, 0.46);
      }
      .search-submit {
        width: 44px;
        height: 44px;
        border: 0;
        border-radius: 15px;
        background: var(--peach);
        color: #17130f;
        display: grid;
        place-items: center;
        transition: transform 0.18s ease;
      }
      .search-submit:hover {
        transform: scale(1.045);
      }
      .search-submit::before {
        content: "↗";
        font-size: 22px;
        line-height: 1;
        font-weight: 700;
        transform: translate(-1px, 1px);
      }
      .suggestions {
        position: absolute;
        top: calc(100% + 8px);
        inset-inline: 0;
        overflow: hidden;
        border: 1px solid rgba(248, 245, 239, 0.12);
        border-radius: 18px;
        background: rgba(25, 25, 24, 0.96);
        box-shadow: 0 20px 44px rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(26px);
      }
      .suggestions[hidden] {
        display: none;
      }
      .suggestion {
        width: 100%;
        display: grid;
        grid-template-columns: 30px 1fr auto;
        align-items: center;
        gap: 10px;
        padding: 12px 14px;
        border: 0;
        border-bottom: 1px solid rgba(248, 245, 239, 0.07);
        background: transparent;
        color: var(--ink);
        text-align: left;
      }
      .suggestion:last-child {
        border-bottom: 0;
      }
      .suggestion:hover,
      .suggestion:focus-visible {
        background: rgba(255, 255, 255, 0.06);
        outline: 0;
      }
      .suggestion-mark {
        width: 28px;
        height: 28px;
        display: grid;
        place-items: center;
        border-radius: 9px;
        background: rgba(247, 213, 178, 0.13);
        color: var(--peach);
        font-size: 13px;
      }
      .suggestion strong {
        font-size: 13px;
        font-weight: 680;
      }
      .suggestion small {
        color: var(--muted);
        text-transform: capitalize;
        font-size: 11px;
      }
      .location-line {
        display: flex;
        align-items: center;
        gap: 7px;
        margin: 14px 2px 0;
        color: rgba(248, 245, 239, 0.55);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.055em;
        text-transform: uppercase;
      }
      .location-line::before {
        content: "";
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--peach);
        box-shadow: 0 0 13px rgba(247, 213, 178, 0.75);
      }
      .chips {
        display: flex;
        gap: 8px;
        overflow: auto;
        padding: 2px 0 17px;
        scrollbar-width: none;
      }
      .chips::-webkit-scrollbar {
        display: none;
      }
      .chip {
        flex: 0 0 auto;
        min-height: 34px;
        border: 1px solid var(--line);
        border-radius: 99px;
        padding: 0 13px;
        background: rgba(255, 255, 255, 0.035);
        color: rgba(248, 245, 239, 0.7);
        font-size: 12px;
        font-weight: 650;
        transition: 0.18s ease;
      }
      .chip:hover,
      .chip.active {
        border-color: rgba(247, 213, 178, 0.5);
        background: rgba(247, 213, 178, 0.14);
        color: var(--ink);
      }
      .result-head {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 16px;
        padding: 5px 2px 13px;
      }
      .result-head h2 {
        margin: 0;
        font-size: 22px;
        letter-spacing: -0.04em;
      }
      .result-head p {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 12px;
      }
      .view-switch {
        display: flex;
        padding: 3px;
        border: 1px solid var(--line);
        border-radius: 11px;
        background: rgba(255, 255, 255, 0.045);
      }
      .view-switch button {
        width: 31px;
        height: 28px;
        border: 0;
        border-radius: 8px;
        background: transparent;
        color: var(--muted);
        font-size: 14px;
      }
      .view-switch button.active {
        background: rgba(247, 213, 178, 0.2);
        color: var(--peach);
      }
      .results {
        display: grid;
        gap: 13px;
      }
      .explore-card {
        position: relative;
        display: grid;
        grid-template-columns: 116px 1fr;
        min-height: 116px;
        overflow: hidden;
        border: 1px solid rgba(248, 245, 239, 0.11);
        border-radius: 19px;
        background: linear-gradient(
          120deg,
          rgba(37, 37, 36, 0.8),
          rgba(18, 18, 18, 0.78)
        );
        box-shadow: 0 14px 30px rgba(0, 0, 0, 0.2);
        cursor: pointer;
        transition:
          transform 0.18s ease,
          border-color 0.18s ease;
      }
      .explore-card:hover {
        transform: translateY(-2px);
        border-color: rgba(247, 213, 178, 0.4);
      }
      .card-art {
        position: relative;
        min-height: 100%;
        overflow: hidden;
        background: linear-gradient(145deg, #775a44, #171616);
      }
      .card-art::before {
        content: "";
        position: absolute;
        width: 120px;
        height: 120px;
        left: -35px;
        bottom: -28px;
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        box-shadow:
          30px -24px 0 -1px rgba(255, 255, 255, 0.09),
          65px 12px 0 -2px rgba(247, 213, 178, 0.55);
      }
      .card-art::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          155deg,
          transparent 35%,
          rgba(0, 0, 0, 0.42)
        );
      }
      .card-art[data-kind="museum"],
      .card-art[data-kind="gallery"] {
        background: linear-gradient(150deg, #756a61, #202020 67%);
      }
      .card-art[data-kind="restaurant"],
      .card-art[data-kind="food"] {
        background: linear-gradient(145deg, #8c552f, #271813 70%);
      }
      .card-art[data-kind="event"] {
        background: linear-gradient(145deg, #674a78, #18131d 70%);
      }
      .card-art[data-kind="google"] {
        background: linear-gradient(145deg, #4c6380, #141b24 70%);
      }
      .card-art-label {
        position: absolute;
        left: 11px;
        bottom: 10px;
        z-index: 1;
        max-width: 88px;
        color: #fff;
        font-size: 10px;
        font-weight: 760;
        letter-spacing: 0.07em;
        line-height: 1.1;
        text-transform: uppercase;
      }
      .card-body {
        display: grid;
        align-content: start;
        gap: 7px;
        padding: 15px 14px 13px;
        min-width: 0;
      }
      .card-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 6px;
      }
      .card-kicker {
        color: var(--peach);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 10px;
        font-weight: 750;
        letter-spacing: 0.07em;
        text-transform: uppercase;
      }
      .new-badge,
      .hot-badge {
        flex: 0 0 auto;
        padding: 4px 6px;
        border-radius: 6px;
        background: rgba(247, 213, 178, 0.14);
        color: var(--peach);
        font-size: 9px;
        font-weight: 760;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .hot-badge {
        background: rgba(255, 137, 88, 0.16);
        color: #ffc09d;
      }
      .trending-rank-badge {
        flex: 0 0 auto;
        padding: 4px 8px;
        border-radius: 6px;
        background: var(--peach);
        color: var(--deep);
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.04em;
      }
      .trending-minimalist {
        flex: 0 0 auto;
        color: var(--peach);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .trending-rank-badge + .trending-minimalist {
        margin-left: 6px;
      }
      .card-body h3 {
        margin: 0;
        overflow: hidden;
        font-size: 17px;
        line-height: 1.08;
        letter-spacing: -0.028em;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .card-body p {
        display: -webkit-box;
        margin: 0;
        overflow: hidden;
        color: var(--muted);
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
        font-size: 12px;
        line-height: 1.36;
      }
      .card-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 1px;
      }
      .card-meta span {
        max-width: 100%;
        overflow: hidden;
        padding: 4px 6px;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.055);
        color: rgba(248, 245, 239, 0.7);
        font-size: 10px;
        font-weight: 620;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .provider-note {
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 1px 2px 0;
        color: rgba(248, 245, 239, 0.43);
        font-size: 10px;
      }
      .provider-note::before {
        content: "";
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: rgba(248, 245, 239, 0.5);
      }
      .map-view {
        position: relative;
        min-height: 470px;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 21px;
        background:
          radial-gradient(
            circle at 42% 36%,
            rgba(247, 213, 178, 0.11),
            transparent 17%
          ),
          linear-gradient(135deg, #1c211e, #111412 48%, #1b1a18);
      }
      .map-view[hidden] {
        display: none;
      }
      .map-grid {
        position: absolute;
        inset: -10%;
        opacity: 0.32;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.08) 1px, transparent 1px);
        background-size: 44px 44px;
        transform: rotate(-11deg) scale(1.2);
      }
      .map-road {
        position: absolute;
        height: 2px;
        width: 130%;
        left: -15%;
        background: rgba(247, 213, 178, 0.24);
        transform: rotate(-27deg);
        box-shadow:
          0 42px 0 rgba(247, 213, 178, 0.12),
          0 -86px 0 rgba(247, 213, 178, 0.12);
      }
      .map-caption {
        position: absolute;
        top: 15px;
        left: 15px;
        padding: 7px 9px;
        border: 1px solid rgba(248, 245, 239, 0.12);
        border-radius: 9px;
        background: rgba(6, 6, 6, 0.6);
        color: rgba(248, 245, 239, 0.65);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        backdrop-filter: blur(8px);
      }
      .map-pin {
        position: absolute;
        width: 35px;
        height: 35px;
        border: 2px solid rgba(255, 255, 255, 0.8);
        border-radius: 50% 50% 50% 0;
        background: var(--peach);
        color: #17120e;
        box-shadow:
          0 7px 20px rgba(0, 0, 0, 0.45),
          0 0 0 5px rgba(247, 213, 178, 0.14);
        transform: translate(-50%, -100%) rotate(-45deg);
        transition: transform 0.18s ease;
      }
      .map-pin:hover {
        transform: translate(-50%, -105%) rotate(-45deg) scale(1.1);
      }
      .map-pin span {
        display: grid;
        width: 100%;
        height: 100%;
        place-items: center;
        font-size: 11px;
        font-weight: 800;
        transform: rotate(45deg);
      }
      .map-pin.google {
        background: #a9c7e8;
      }
      .skeleton {
        pointer-events: none;
        overflow: hidden;
      }
      .skeleton .card-art,
      .skeleton .sk-line {
        background: linear-gradient(
          100deg,
          rgba(255, 255, 255, 0.045) 24%,
          rgba(255, 255, 255, 0.12) 38%,
          rgba(255, 255, 255, 0.045) 55%
        );
        background-size: 260% 100%;
        animation: shimmer 1.3s infinite linear;
      }
      .sk-line {
        height: 10px;
        border-radius: 99px;
      }
      .sk-line.big {
        width: 78%;
        height: 18px;
      }
      .sk-line.medium {
        width: 94%;
      }
      .sk-line.short {
        width: 55%;
      }
      @keyframes shimmer {
        to {
          background-position: -160% 0;
        }
      }
      .empty {
        display: grid;
        justify-items: start;
        gap: 9px;
        padding: 27px 22px;
        border: 1px dashed rgba(248, 245, 239, 0.19);
        border-radius: 19px;
        background: rgba(255, 255, 255, 0.025);
      }
      .empty-mark {
        display: grid;
        width: 36px;
        height: 36px;
        place-items: center;
        border-radius: 12px;
        background: rgba(247, 213, 178, 0.13);
        color: var(--peach);
        font-size: 18px;
      }
      .empty h3 {
        margin: 0;
        font-size: 18px;
        letter-spacing: -0.03em;
      }
      .empty p {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.4;
      }
      .empty button {
        margin-top: 3px;
        min-height: 35px;
        border: 1px solid rgba(247, 213, 178, 0.35);
        border-radius: 99px;
        padding: 0 12px;
        background: rgba(247, 213, 178, 0.1);
        color: var(--ink);
        font-size: 12px;
        font-weight: 680;
      }
      .load-more {
        width: 100%;
        min-height: 46px;
        margin-top: 3px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--ink);
        font-size: 12px;
        font-weight: 700;
      }
      .load-more:hover {
        border-color: rgba(247, 213, 178, 0.4);
      }
      .sheet {
        position: fixed;
        inset: 0;
        z-index: 40;
        display: grid;
        align-items: end;
        pointer-events: none;
      }
      .sheet.open {
        pointer-events: auto;
      }
      .sheet-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.68);
        opacity: 0;
        transition: opacity 0.24s;
      }
      .sheet.open .sheet-backdrop {
        opacity: 1;
      }
      .sheet-panel {
        position: relative;
        width: min(430px, 100%);
        max-height: min(80svh, 700px);
        overflow: auto;
        margin-inline: auto;
        padding: 10px 20px calc(28px + env(safe-area-inset-bottom));
        border: 1px solid rgba(248, 245, 239, 0.14);
        border-radius: 25px 25px 0 0;
        background: linear-gradient(145deg, #272625, #101010 62%);
        box-shadow: 0 -20px 60px rgba(0, 0, 0, 0.46);
        transform: translateY(105%);
        transition: transform 0.3s cubic-bezier(0.22, 0.9, 0.3, 1);
      }
      .sheet.open .sheet-panel {
        transform: translateY(0);
      }
      .sheet-handle {
        width: 38px;
        height: 4px;
        margin: 0 auto 17px;
        border-radius: 99px;
        background: rgba(248, 245, 239, 0.26);
      }
      .sheet-close {
        position: absolute;
        top: 15px;
        right: 17px;
        width: 31px;
        height: 31px;
        border: 0;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.1);
        color: var(--ink);
        font-size: 17px;
      }
      .detail-art {
        height: 150px;
        margin-bottom: 17px;
        border-radius: 17px;
        background: linear-gradient(135deg, #805b41, #1b1715 68%);
        position: relative;
        overflow: hidden;
      }
      .detail-art::after {
        content: "";
        position: absolute;
        width: 210px;
        height: 210px;
        right: -43px;
        top: -78px;
        border: 1px solid rgba(255, 255, 255, 0.23);
        border-radius: 50%;
        box-shadow: -48px 45px 0 -2px rgba(247, 213, 178, 0.5);
      }
      .detail-kicker {
        color: var(--peach);
        font-size: 10px;
        font-weight: 750;
        letter-spacing: 0.09em;
        text-transform: uppercase;
      }
      .detail-title {
        margin: 7px 0 9px;
        font-size: 30px;
        line-height: 1;
        letter-spacing: -0.055em;
      }
      .detail-copy {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.45;
      }
      .detail-stats {

      function card(item, index) {
        const community = item.community;
        const rating = community?.ratingAverage
          ? `${Number(community.ratingAverage).toFixed(1)} Echoo rating`
          : "";
        const distance = item.distanceMeters

          const rank = index < 5 ? `<span class="trending-rank-badge">#${index + 1}</span>` : "";

              ? `<span class="new-badge">Live nearby</span>`

                ? `<span class="hot-badge">Hot</span>`

        }
        
        const ratingSpan = rating && rating !== "New to Echoo" ? `<span>${esc(rating)}</span>` : "";

        const metaHtml = (ratingSpan || distanceSpan)

        section.setAttribute("aria-busy", "false");

          document.getElementById("clear-search").onclick = () => search("");
        } else resultsEl.innerHTML = items.map(card).join("");
        renderMap();
      }
      function renderMap() {
        mapPins.innerHTML = "";
        const mappable = items.filter(
          (item) =>
            Number.isFinite(item.latitude) && Number.isFinite(item.longitude),
        );
        const coords = mappable.map((item) => [item.latitude, item.longitude]);
        const minLat = Math.min(...coords.map((x) => x[0]), 43.61),
          maxLat = Math.max(...coords.map((x) => x[0]), 43.7),
          minLng = Math.min(...coords.map((x) => x[1]), -79.46),
          maxLng = Math.max(...coords.map((x) => x[1]), -79.34);
        mappable.forEach((item, index) => {
          const x =
              13 + ((item.longitude - minLng) / (maxLng - minLng || 1)) * 74,
            y = 88 - ((item.latitude - minLat) / (maxLat - minLat || 1)) * 67;
          const pin = document.createElement("button");
          pin.className = `map-pin ${item.source === "google_places" ? "google" : ""}`;
          pin.style.left = `${x}%`;
          pin.style.top = `${y}%`;
          pin.innerHTML = `<span>${index + 1}</span>`;
          pin.setAttribute("aria-label", `Open ${item.title}`);
          pin.onclick = () => openDetail(items.indexOf(item));
          mapPins.append(pin);

        document.getElementById("result-title").textContent = activeQuery
          ? `Results for “${activeQuery}”`
          : "Explore nearby";
        const owned = Number(payload.ownedResultCount || 0),
          live = Number(payload.liveFallbackCount || 0);
        document.getElementById("result-subtitle").textContent = owned
          ? `${owned} from Echoo${live ? ` · ${live} live nearby` : ""}`
          : live
            ? `${live} live places nearby · ordered by distance`
            : "The local edit is still growing here.";
      }
      async function search(query = activeQuery, append = false) {
        let cleanQuery = query.trim();
        if (!cleanQuery) cleanQuery = "trending";
        activeQuery = cleanQuery;

        // Sync active class on chips dynamically
        document.querySelectorAll(".chip").forEach((chip) => {
          chip.classList.toggle("active", chip.dataset.query === activeQuery);
        });

        if (!append) {
          nextCursor = null;
          nextLivePageToken = null;
          items = [];
          skeletons();
        }
        queryInput.value = activeQuery === "trending" ? "" : activeQuery;
        suggestionsEl.hidden = true;
        queryInput.setAttribute("aria-expanded", "false");
        section.setAttribute("aria-busy", "true");

        if (activeQuery === "trending") {
          setTimeout(() => {
            items = trendingPlaces;

            document.getElementById("result-subtitle").textContent = "Most popular places in Ontario this week";

            loadMore.hidden = true;
          }, 300);
          return;

        const body = {
          query: activeQuery,
          city,
          includeLiveFallback: true,
          limit: 20,
        };
        if (lat !== undefined) Object.assign(body, { lat, lng });
        if (append && nextCursor) body.cursor = nextCursor;
        if (append && nextLivePageToken) body.livePageToken = nextLivePageToken;
        try {
          const response = await fetch(CONFIG.exploreUrl, {
            method: "POST",
            headers,
            body: JSON.stringify(body),
          });
          if (!response.ok) throw new Error("Explore request failed");
          const payload = await response.json();
          if (!payload.supported)
            throw new Error(payload.reason || "This region is not supported");
          items = append
            ? [...items, ...(payload.results || [])]
            : payload.results || [];
          nextCursor = payload.nextCursor || null;
          nextLivePageToken = payload.liveNextPageToken || null;
          updateHeader(payload);
          renderItems();
          loadMore.hidden = !nextCursor && !nextLivePageToken;

          console.warn(error);
          section.setAttribute("aria-busy", "false");

            search(activeQuery);
          loadMore.hidden = true;
        }

            method: "POST",

          suggestionsEl.innerHTML = suggestions

        const request = { action, entityId: item.id };
        if (action === "rate") {
          const rating = Number(prompt("Rate this place from 1 to 5"));
          if (!Number.isInteger(rating) || rating < 1 || rating > 5) return;
          request.rating = rating;
        }
        if (action === "review") {
          const body = prompt("Share what stood out (at least 20 characters)");
          if (!body) return;
          request.body = body;
        }
        button.disabled = true;
        const original = button.textContent;
        button.textContent = "Saving…";
        try {
          const actionHeaders = await window.EchooAuth.authHeaders({
            "Content-Type": "application/json",
          });
          const response = await fetch(CONFIG.communityUrl, {
            method: "POST",
            headers: actionHeaders,
            body: JSON.stringify(request),
          });
          const payload = await response.json();
          if (!response.ok)
            throw new Error(payload.error || "Could not save that action");
          button.textContent =
            action === "save"
              ? payload.saved
                ? "Saved"
                : "Save"
              : action === "visit"
                ? "Marked visited"
                : action === "rate"
                  ? `${payload.rating} stars`
                  : "Review sent";
          button.disabled = action !== "save";
        } catch (error) {
          console.warn(error);
          button.textContent = error.message || original;
          button.disabled = false;
        }
      }
      function openDetail(index) {
        const item = items[index];
        if (!item) return;
        const community = item.community;
        const rating = community?.ratingAverage
          ? `${Number(community.ratingAverage).toFixed(1)} Echoo rating · ${community.ratingCount || 0} ratings`
          : "New to Echoo · no community rating yet";
        const features = (item.features || [])
          .slice(0, 4)
          .map((value) => value.replace(/_/g, " "));
        const directions =
          item.actionUrl ||
          (Number.isFinite(item.latitude)
            ? `https://www.google.com/maps/search/?api=1&query=${item.latitude},${item.longitude}`
            : "");
        const actions =
          item.source === "echoo"
            ? `<button data-community-action="save">Save</button><button data-community-action="visit">Visited</button><button data-community-action="rate">Rate</button><button data-community-action="review">Review</button>`
            : "";
        document.getElementById("detail-content").innerHTML =
          `<div class="detail-art"></div><span class="detail-kicker">${esc(item.source === "google_places" ? "Live result · Google Maps" : item.category || "Echoo place")}</span><h2 class="detail-title">${esc(item.title)}</h2><p class="detail-copy">${esc(item.description || "A newly discovered local place.")}</p><div class="detail-stats"><span>${esc(rating)}</span>${community?.verifiedVisitCount ? `<span>${community.verifiedVisitCount} verified visits</span>` : ""}${features.map((value) => `<span>${esc(value)}</span>`).join("")}</div><div class="detail-actions">${actions}${directions ? `<a class="primary" href="${esc(directions)}" target="_blank" rel="noopener">Directions</a>` : `<button class="primary" data-local-action="open">Open place</button>`}</div>${item.source === "google_places" ? `<p class="provider-note">Live Google Maps result. It has no Echoo rating or history yet.</p>` : ""}`;
        const sheet = document.getElementById("detail-sheet");
        sheet.classList.add("open");
        sheet.setAttribute("aria-hidden", "false");
        document
          .querySelectorAll("[data-community-action]")
          .forEach(
            (button) =>
              (button.onclick = () =>
                communityAction(item, button.dataset.communityAction, button)),
          );
        document.querySelectorAll("[data-local-action]").forEach(
          (button) =>
            (button.onclick = () => {
              button.textContent = "Coming soon";
              button.disabled = true;
            }),
        );
      }
      function closeDetail() {
        const sheet = document.getElementById("detail-sheet");
        sheet.classList.remove("open");
        sheet.setAttribute("aria-hidden", "true");
      }
      document.getElementById("search-form").onsubmit = (event) => {
        event.preventDefault();
        search(queryInput.value);
      };
      queryInput.oninput = () => {
        clearTimeout(suggestionTimer);
        suggestionTimer = setTimeout(suggest, 180);
      };
      suggestionsEl.onclick = (event) => {
        const button = event.target.closest("[data-suggestion]");
        if (!button) return;
        const item = suggestionsEl._items[Number(button.dataset.suggestion)];
        queryInput.value = item.label;
        search(item.type === "feature" ? item.label : item.value);
      };
      document.getElementById("chips").onclick = (event) => {
        const chip = event.target.closest("[data-query]");
        if (!chip) return;
        document
          .querySelectorAll(".chip")
          .forEach((item) => item.classList.toggle("active", item === chip));
        search(chip.dataset.query || "");
      };
      document.querySelector(".view-switch").onclick = (event) => {
        const button = event.target.closest("[data-view]");
        if (!button) return;
        view = button.dataset.view;
        document
          .querySelectorAll("[data-view]")
          .forEach((item) => item.classList.toggle("active", item === button));
        resultsEl.hidden = view === "map";
        mapView.hidden = view !== "map";
        loadMore.hidden =
            view === "map" || (!nextCursor && !nextLivePageToken);
      };
      resultsEl.onclick = (event) => {
        const card = event.target.closest("[data-index]");
        if (card) openDetail(Number(card.dataset.index));
      };
      resultsEl.onkeydown = (event) => {
        if (
          (event.key === "Enter" || event.key === " ") &&
          event.target.matches("[data-index]")
        ) {
          event.preventDefault();
          openDetail(Number(event.target.dataset.index));
        }
      };
      loadMore.onclick = () => search(activeQuery, true);
      document
        .querySelectorAll("[data-close-sheet]")
        .forEach((item) => (item.onclick = closeDetail));
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") closeDetail();
      });
      document.getElementById("location-note").textContent =
        lat === undefined ? `Exploring ${city}` : `Near you in ${city}`;
      if (activeQuery) queryInput.value = activeQuery;
      skeletons();
      search(activeQuery);
    </script>
  </body>
</html>
