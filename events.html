<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>echoo explore</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #080907;
        --panel: #11130f;
        --panel-2: #191b15;
        --ink: #f5f1e8;
        --muted: #a8a397;
        --dim: #706c62;
        --line: rgba(245, 241, 232, 0.13);
        --line-strong: rgba(245, 241, 232, 0.28);
        --signal: #e7c98e;
        --rose: #d8a2d9;
        --shadow: 0 24px 70px rgba(0, 0, 0, 0.42);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background:
          linear-gradient(
              90deg,
              rgba(245, 241, 232, 0.035) 1px,
              transparent 1px
            )
            0 0 / 34px 34px,
          radial-gradient(
            circle at 78% 4%,
            rgba(216, 255, 95, 0.1),
            transparent 25rem
          ),
          var(--bg);
      }

      a {
        color: inherit;
        text-decoration: none;
      }
      button,
      input {
        font: inherit;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 18px;
        border-bottom: 1px solid var(--line);
        background: rgba(8, 9, 7, 0.94);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-weight: 950;
        font-size: 26px;
        letter-spacing: -0.05em;
      }

      .brand img {
        width: 44px;
        height: 44px;
        border: 1px solid var(--line);
        border-radius: 18px;
        object-fit: cover;
        object-position: 50% 0%;
      }

      .topbar a:last-child {
        min-height: 42px;
        padding: 0 15px;
        display: inline-flex;
        align-items: center;
        border: 1px solid var(--line);
        color: var(--muted);
        font-weight: 850;
      }

      .shell {
        width: min(1160px, 100%);
        margin: 0 auto;
        padding: 18px 18px 106px;
      }

      .hero {
        display: grid;
        gap: 16px;
        padding: 22px 0;
      }

      .kicker {
        color: var(--signal);
        font-size: 12px;
        font-weight: 950;
        letter-spacing: 0.15em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(48px, 14vw, 94px);
        line-height: 0.86;
        letter-spacing: -0.075em;
      }

      .search {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        padding: 8px;
        border: 1px solid var(--line);
        background: rgba(17, 19, 15, 0.88);
      }

      input {
        min-width: 0;
        min-height: 54px;
        border: 0;
        outline: 0;
        color: var(--ink);
        background: transparent;
        padding: 0 8px;
        font-weight: 750;
      }

      .primary,
      .filter {
        min-height: 54px;
        border: 1px solid var(--line);
        border-radius: 0;
        cursor: pointer;
        font-weight: 950;
        transition:
          transform 180ms ease,
          border-color 180ms ease,
          background 180ms ease;
      }

      .primary {
        border-color: transparent;
        color: #151311;
        background: linear-gradient(
          135deg,
          #e4bd78 0%,
          #f2ddb0 42%,
          var(--rose) 100%
        );
        padding: 0 18px;
      }

      .filter {
        flex: 0 0 auto;
        padding: 0 15px;
        color: var(--muted);
        background: rgba(245, 241, 232, 0.04);
      }

      .filter.active {
        color: #10110e;
        background: var(--ink);
      }

      .primary:hover,
      .filter:hover {
        transform: translateY(-2px);
        border-color: var(--line-strong);
      }

      /* ── News Bubble Slider ── */
      .news-carousel-wrap {
        margin: 8px 0 20px;
        overflow: hidden;
        position: relative;
        width: 100%;
      }

      .news-carousel-wrap::before,
      .news-carousel-wrap::after {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 30px;
        z-index: 2;
        content: "";
        pointer-events: none;
      }
      .news-carousel-wrap::before {
        left: 0;
        background: linear-gradient(90deg, var(--bg) 0%, transparent 100%);
      }
      .news-carousel-wrap::after {
        right: 0;
        background: linear-gradient(-90deg, var(--bg) 0%, transparent 100%);
      }

      .news-slider {
        display: flex;
        overflow-x: auto;
        scrollbar-width: none;
        -ms-overflow-style: none;
        cursor: grab;
        user-select: none;
        touch-action: pan-x;
        scroll-behavior: auto;
      }
      .news-slider::-webkit-scrollbar {
        display: none;
      }
      .news-slider:active {
        cursor: grabbing;
      }

      .news-track {
        display: flex;
        gap: 10px;
        padding: 4px 8px;
      }

      .news-card {
        flex: 0 0 auto;
        height: 60px;
        padding: 6px 12px 6px 6px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        border-radius: 4px;
        border: 1px solid var(--line);
        background: var(--panel);
        transition:
          border-color 180ms ease,
          background-color 180ms ease;
      }

      .news-card:hover {
        border-color: var(--signal);
        background-color: var(--panel-2);
      }

      .news-card img {
        width: 48px;
        height: 48px;
        object-fit: cover;
        border-radius: 2px;
        flex-shrink: 0;
      }

      .news-card .news-info {
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 2px;
        text-align: left;
      }

      .news-card .tag {
        color: var(--signal);
        font-size: 10px;
        font-weight: 950;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .news-card .headline {
        color: var(--muted);
        font-size: 13px;
        font-weight: 750;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 260px;
        transition: color 180ms ease;
      }

      .news-card:hover .headline {
        color: var(--ink);
      }

      .filters {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        scrollbar-width: none;
        padding-bottom: 4px;
      }

      .filters::-webkit-scrollbar {
        display: none;
      }

      .content {
        display: grid;
        gap: 14px;
      }

      .event {
        display: grid;
        grid-template-columns: 104px 1fr;
        gap: 14px;
        padding: 12px;
        border: 1px solid var(--line);
        background: rgba(17, 19, 15, 0.84);
        cursor: pointer;
        transition:
          transform 180ms ease,
          border-color 180ms ease,
          background 180ms ease;
      }

      .event:hover {
        transform: translateX(4px);
        border-color: var(--line-strong);
        background: rgba(25, 27, 21, 0.94);
      }

      .event img {
        width: 104px;
        height: 132px;
        object-fit: cover;
        filter: saturate(0.58) contrast(1.08);
      }

      .event small {
        color: var(--signal);
        font-size: 11px;
        font-weight: 950;
        letter-spacing: 0.13em;
        text-transform: uppercase;
      }

      .event h2 {
        margin: 8px 0;
        font-size: 24px;
        line-height: 0.98;
        letter-spacing: -0.055em;
      }

      .event p {
        margin: 0 0 12px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.38;
        font-weight: 650;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
      }

      .meta span {
        padding: 6px 9px;
        border: 1px solid var(--line);
        color: var(--muted);
        font-size: 12px;
        font-weight: 850;
      }

      .side {
        display: grid;
        gap: 12px;
      }

      .brief {
        padding: 16px;
        border: 1px solid var(--line);
        background: rgba(245, 241, 232, 0.035);
      }

      .brief h3 {
        margin: 0 0 8px;
        font-size: 25px;
        letter-spacing: -0.055em;
      }

      .brief p {
        margin: 0 0 14px;
        color: var(--muted);
        line-height: 1.42;
        font-weight: 650;
      }

      .bottom-nav {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 30;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        border-top: 1px solid var(--line);
        background: rgba(8, 9, 7, 0.96);
      }

      .bottom-nav a {
        display: grid;
        place-items: center;
        min-height: 68px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 850;
      }

      .bottom-nav a.active {
        color: var(--signal);
      }

      @media (min-width: 860px) {
        .shell {
          padding: 34px 28px 70px;
        }
        .hero {
          grid-template-columns: 1fr 480px;
          align-items: end;
          padding: 54px 0 26px;
        }
        .content {
          grid-template-columns: 1fr 340px;
          align-items: start;
        }
        .event {
          grid-template-columns: 190px 1fr;
        }
        .event img {
          width: 190px;
          height: 210px;
        }
        .bottom-nav {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="index.html">
        <img src="assets/echoo-new-logo.jpg" alt="" />
        <span>echoo</span>
      </a>
      <a href="auth.html">Sign in</a>
    </header>

    <main class="shell">
      <section class="hero">
        <div>
          <div class="kicker">Discover</div>
          <h1>Find the plan people answer yes to.</h1>
        </div>
        <form class="search" id="search-form">
          <input id="query" placeholder="What sounds good right now?" />
          <button class="primary" type="submit">Search</button>
        </form>
      </section>

      <!-- News Carousel Section -->
      <div class="news-carousel-wrap">
        <div class="news-slider" id="news-slider">
          <div class="news-track" id="news-track"></div>
        </div>
      </div>

      <div class="filters" id="filters">
        <button class="filter active" data-filter="all">All</button>
        <button class="filter" data-filter="music">Music</button>
        <button class="filter" data-filter="dates">Dates</button>
        <button class="filter" data-filter="movies">Films</button>
        <button class="filter" data-filter="food">Food</button>
      </div>

      <section class="content" style="margin-top: 16px">
        <div id="events-list"></div>
        <aside class="side">
          <div class="brief">
            <h3 id="brief-title">A few good starts</h3>
            <p id="brief-copy">
              One easy plan, one interesting plan, and one backup for when the
              group changes its mind.
            </p>
            <a
              class="primary"
              style="
                display: inline-flex;
                align-items: center;
                text-decoration: none;
              "
              href="app.html"
              >Plan with friends</a
            >
          </div>
        </aside>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="Primary">
      <a href="index.html">Home</a>
      <a class="active" href="events.html">Discover</a>
      <a href="app.html">Plan</a>
      <a href="auth.html">Sign in</a>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/echoo-auth.js"></script>
    <script src="assets/location-platform.js"></script>
    <script src="assets/activity-context.js"></script>
    <script>
      /* Diagnostic logger for redirects */
      window.addEventListener("beforeunload", () => {
        const history = JSON.parse(
          sessionStorage.getItem("echoo_unload_log") || "[]",
        );
        history.push({
          time: new Date().toISOString(),
          url: window.location.href,
          stack: new Error().stack,
        });
        sessionStorage.setItem(
          "echoo_unload_log",
          JSON.stringify(history.slice(-10)),
        );
      });

      let events = [
        {
          id: 1,
          category: "music",
          title: "Basement listening room",
          copy: "A small-room set with reserved standing space and an easy food route nearby.",
          img: "assets/optimized/news-music-768.jpg",
          webp: "assets/optimized/news-music-768.webp",
          meta: ["Today", "18 min", "$28"],
        },
        {
          id: 2,
          category: "dates",
          title: "Rooftop dinner plus quiet walk",
          copy: "A date plan that feels built, not assembled: table, timing, and a softer second stop.",
          img: "assets/optimized/news-date-768.jpg",
          webp: "assets/optimized/news-date-768.webp",
          meta: ["Today", "Two stops", "$$"],
        },
        {
          id: 3,
          category: "movies",
          title: "Late film with post-show dessert",
          copy: "A cinema anchor paired with a place that stays open late enough to keep talking.",
          img: "assets/optimized/news-movie-768.jpg",
          webp: "assets/optimized/news-movie-768.webp",
          meta: ["9:40 PM", "Seats open", "$18"],
        },
        {
          id: 4,
          category: "food",
          title: "Kitchen still open",
          copy: "A simple food-first option for when nobody wants to plan, but everyone wants a good answer.",
          img: "assets/optimized/news-date-768.jpg",
          webp: "assets/optimized/news-date-768.webp",
          meta: ["Open late", "12 min", "$$"],
        },
      ];

      const list = document.getElementById("events-list");
      const queryInput = document.getElementById("query");
      let activeFilter = "all";

      function render() {
        const query = queryInput.value.trim().toLowerCase();
        const planIntent =
          /plan|today|tonight|night|date|near|nearby|out|discover|surprise|bored|morning|lunch|afternoon|evening|late|monday|tuesday|wednesday|thursday|friday|saturday|sunday/.test(
            query,
          );
        const filtered = events.filter((event) => {
          const inFilter =
            activeFilter === "all" || event.category === activeFilter;
          const inQuery =
            !query ||
            planIntent ||
            `${event.title} ${event.copy} ${event.category} ${event.meta.join(" ")}`
              .toLowerCase()
              .includes(query);
          return inFilter && inQuery;
        });

        list.innerHTML =
          filtered
            .map(
              (event) => `
          <article class="event" data-id="${event.id}" ${event.detailId ? `data-detail-id="${event.detailId}"` : ""} ${event.actionUrl ? `data-action-url="${event.actionUrl}"` : ""}>
            <picture>
              <source srcset="${event.webp}" type="image/webp">
              <img src="${event.img}" alt="" loading="lazy" decoding="async">
            </picture>
            <div>
              <small>${event.category}</small>
              <h2>${event.title}</h2>
              <p>${event.copy}</p>
              <div class="meta">${event.meta.map((item) => `<span>${item}</span>`).join("")}</div>
            </div>
          </article>
        `,
            )
            .join("") ||
          `<div class="brief"><h3>Nothing close yet</h3><p>Try music, dates, movies, food, today, or near me.</p></div>`;
      }

      document.getElementById("filters").addEventListener("click", (event) => {
        const button = event.target.closest("[data-filter]");
        if (!button) return;
        activeFilter = button.dataset.filter;
        document
          .querySelectorAll("[data-filter]")
          .forEach((item) => item.classList.toggle("active", item === button));
        render();
      });

      document
        .getElementById("search-form")
        .addEventListener("submit", (event) => {
          event.preventDefault();
          const q = queryInput.value.trim();
          if (q) {
            window.location.href = `app.html?q=${encodeURIComponent(q)}`;
          } else {
            render();
          }
        });

      list.addEventListener("click", (event) => {
        const card = event.target.closest(
          "[data-detail-id], [data-action-url]",
        );
        if (!card) return;
        window.location.href = card.dataset.actionUrl
          ? card.dataset.actionUrl
          : `event.html?id=${encodeURIComponent(card.dataset.detailId)}`;
      });

      const params = new URLSearchParams(window.location.search);
      const filter = params.get("filter");
      const query = params.get("query") || params.get("ai");
      let budget = params.get("budget");
      let storedPrefs = {};
      const previewMode =
        params.get("preview") === "1" ||
        window.EchooLocationPlatform.readPreferences().locationSupported ===
          false;
      if (query)
        queryInput.value =
          query === "bored" ? "simple surprising plan today" : query;
      if (filter) {
        const button = document.querySelector(`[data-filter="${filter}"]`);
        if (button) button.click();
      } else {
        render();
      }

      /* ── News Bubble Slider ── */
      let city = params.get("city");
      let preciseLat;
      let preciseLng;
      const stored = localStorage.getItem("echoo_preferences");
      if (stored) {
        try {
          storedPrefs = JSON.parse(stored);
        } catch (e) {}
      }
      if (budget) {
        try {
          localStorage.setItem(
            "echoo_preferences",
            JSON.stringify({ ...storedPrefs, budget }),
          );
          storedPrefs = { ...storedPrefs, budget };
        } catch (e) {}
      }
      if (!city) {
        city = storedPrefs.city;
        preciseLat = Number(storedPrefs.lastLat);
        preciseLng = Number(storedPrefs.lastLng);
      }
      city = city || "Toronto";
      budget = budget || storedPrefs.budget || "$";
      const personalizationProfile = {
        interests: Array.isArray(storedPrefs.interests)
          ? storedPrefs.interests
          : [],
        eventStyles: Array.isArray(storedPrefs.eventStyles)
          ? storedPrefs.eventStyles
          : [],
        audiences: Array.isArray(storedPrefs.audiences)
          ? storedPrefs.audiences
          : [],
        motivations: Array.isArray(storedPrefs.motivations)
          ? storedPrefs.motivations
          : [],
        budget,
        energy: storedPrefs.energy || "chill",
        city,
        gender: storedPrefs.gender || "Prefer not to say",
        dob: storedPrefs.dob || "",
        tone: storedPrefs.tone || "direct",
      };

      function applyPreferenceSnapshot(prefs = {}) {
        if (!prefs || typeof prefs !== "object") return;
        storedPrefs = { ...storedPrefs, ...prefs };
        city = prefs.city || city;
        budget = params.get("budget") || prefs.budget || budget;
        preciseLat = Number(prefs.lastLat ?? preciseLat);
        preciseLng = Number(prefs.lastLng ?? preciseLng);
        Object.assign(personalizationProfile, {
          interests: Array.isArray(prefs.interests)
            ? prefs.interests
            : personalizationProfile.interests,
          eventStyles: Array.isArray(prefs.eventStyles)
            ? prefs.eventStyles
            : personalizationProfile.eventStyles,
          audiences: Array.isArray(prefs.audiences)
            ? prefs.audiences
            : personalizationProfile.audiences,
          motivations: Array.isArray(prefs.motivations)
            ? prefs.motivations
            : personalizationProfile.motivations,
          budget,
          energy: prefs.energy || personalizationProfile.energy,
          city,
          gender: prefs.gender || personalizationProfile.gender,
          dob: prefs.dob || personalizationProfile.dob,
          tone: prefs.tone || personalizationProfile.tone,
        });
      }

      const authGate = window.EchooAuth
        ? window.EchooAuth.requireOnboarding({
            next: window.EchooAuth.currentRelativeUrl(),
          }).then((state) => {
            if (state.ok) applyPreferenceSnapshot(state.preferences);
            return state;
          })
        : Promise.resolve({ ok: true });

      const CONFIG = {
        supabaseUrl: "https://dlezregdjpdqmooubwvl.supabase.co",
        supabaseAnonKey: "sb_publishable_4FeunYH-ItDm68Sjg93c_w_s8yMizxH",
        locationSearchUrl:
          "https://dlezregdjpdqmooubwvl.supabase.co/functions/v1/location-search",
        planEngineUrl:
          "https://dlezregdjpdqmooubwvl.supabase.co/functions/v1/plan-engine",
        discoverLiveUrl:
          "https://dlezregdjpdqmooubwvl.supabase.co/functions/v1/discover-live",
      };

      const normalizedCity = window.EchooLocationPlatform.cityByName(city);
      if (!normalizedCity) {
        city = "Toronto";
      }

      function activityContext() {
        const cityRecord = window.EchooLocationPlatform.cityByName(city);
        return window.EchooActivityContext.getActivityContext({
          city,
          timezone: cityRecord?.timezone,
        });
      }

      const currentContext = activityContext();
      queryInput.placeholder = currentContext.searchPlaceholder;
      if (!queryInput.value) queryInput.value = currentContext.defaultQuery;

      async function loadLocationEntities() {
        const authState = await authGate;
        if (authState && authState.ok === false) return;
        if (previewMode) {
          console.info(
            "Echoo: preview mode active; live Canada location search is paused.",
          );
          return;
        }
        try {
          const response = await fetch(CONFIG.locationSearchUrl, {
            method: "POST",
            headers: window.EchooAuth
              ? await window.EchooAuth.authHeaders({
                  "Content-Type": "application/json",
                })
              : {
                  "Content-Type": "application/json",
                  Authorization: `Bearer ${CONFIG.supabaseAnonKey}`,
                  apikey: CONFIG.supabaseAnonKey,
                },
            body: JSON.stringify(
              Number.isFinite(preciseLat) && Number.isFinite(preciseLng)
                ? {
                    lat: preciseLat,
                    lng: preciseLng,
                    radiusMeters: 25000,
                    limit: 24,
                  }
                : { city, limit: 24 },
            ),
          });
          if (!response.ok) return;

          const payload = await response.json();
          if (
            !payload.supported ||
            !Array.isArray(payload.results) ||
            payload.results.length === 0
          )
            return;

          events = payload.results.map((item, index) => ({
            id: item.id || index + 1,
            detailId: item.entity_id || item.id,
            category: item.category || item.entity_type || "events",
            title: item.title,
            copy:
              item.description ||
              "A nearby Echoo recommendation with verified Canadian location data.",
            img: item.image_url || "assets/optimized/news-music-768.jpg",
            webp: item.image_url || "assets/optimized/news-music-768.webp",
            meta: [
              item.city || city,
              item.distance_meters
                ? `${Math.max(1, Math.round(item.distance_meters / 1000))} km away`
                : "Canada",
              item.starts_at
                ? new Date(item.starts_at).toLocaleDateString(undefined, {
                    month: "short",
                    day: "numeric",
                  })
                : "Open",
            ],
          }));
          render();
        } catch (error) {
          console.warn(
            "Echoo: location search unavailable, using static launch cards.",
            error,
          );
        }
      }

      async function loadPlanEngine() {
        const authState = await authGate;
        if (authState && authState.ok === false) return false;
        if (previewMode) return false;
        const queryText =
          queryInput.value.trim() || activityContext().defaultQuery;
        try {
          const response = await fetch(CONFIG.discoverLiveUrl, {
            method: "POST",
            headers: window.EchooAuth
              ? await window.EchooAuth.authHeaders({
                  "Content-Type": "application/json",
                })
              : {
                  "Content-Type": "application/json",
                  Authorization: `Bearer ${CONFIG.supabaseAnonKey}`,
                  apikey: CONFIG.supabaseAnonKey,
                },
            body: JSON.stringify(
              Number.isFinite(preciseLat) && Number.isFinite(preciseLng)
                ? {
                    lat: preciseLat,
                    lng: preciseLng,
                    query: queryText,
                    budget,
                    profile: personalizationProfile,
                    limit: 8,
                  }
                : {
                    city,
                    query: queryText,
                    budget,
                    profile: personalizationProfile,
                    limit: 8,
                  },
            ),
          });
          if (!response.ok) return false;
          const payload = await response.json();
          if (
            !payload.supported ||
            !Array.isArray(payload.recommendations) ||
            payload.recommendations.length === 0
          )
            return false;

          events = payload.recommendations.map((item, index) => ({
            id: item.id || index + 1,
            detailId: item.actionUrl ? "" : item.id,
            actionUrl: item.actionUrl || "",
            category: item.category || item.type || "live",
            title: item.title,
            copy:
              item.reason ||
              item.description ||
              "A live Echoo pick matched to your current moment.",
            img: item.imageUrl || "assets/optimized/news-music-768.jpg",
            webp: item.imageUrl || "assets/optimized/news-music-768.webp",
            meta: [
              item.source || "Live",
              item.distanceMeters
                ? `${Math.max(1, Math.round(item.distanceMeters / 1000))} km away`
                : item.city || city,
              item.startsAt
                ? new Date(item.startsAt).toLocaleDateString(undefined, {
                    month: "short",
                    day: "numeric",
                  })
                : item.priceLabel || item.actionLabel || "Open",
            ],
          }));
          render();
          return true;
        } catch (error) {
          console.warn(
            "Echoo: plan engine unavailable, falling back to location search.",
            error,
          );
          return false;
        }
      }

      async function loadNewsSlider() {
        let displayNews = [];

        if (CONFIG.supabaseUrl && CONFIG.supabaseAnonKey && window.supabase) {
          try {
            const supabaseClient = window.supabase.createClient(
              CONFIG.supabaseUrl,
              CONFIG.supabaseAnonKey,
            );
            const { data, error } = await supabaseClient
              .from("news")
              .select("*")
              .or(`city.eq.${city},city.eq.Global`)
              .order("published_at", { ascending: false })
              .limit(12);

            if (!error && data && data.length > 0) {
              displayNews = data.map((item) => ({
                tag: item.tag,
                text: item.title,
                img:
                  item.image_url ||
                  "https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?auto=format&fit=crop&w=120&q=80",
              }));
              console.log("Echoo: Loaded real-time news from Supabase.");
            } else if (error) {
              console.warn(
                "Echoo: Supabase query error, falling back to mock news:",
                error.message,
              );
            }
          } catch (e) {
            console.warn(
              "Echoo: Failed to query Supabase, falling back to mock news:",
              e,
            );
          }
        }

        if (displayNews.length === 0) {
          const cityList = localNewsDb[city] || localNewsDb["Toronto"];
          const mixedNews = [];
          const maxLen = Math.max(cityList.length, worldNews.length);
          for (let i = 0; i < maxLen; i++) {
            if (i < cityList.length) mixedNews.push(cityList[i]);
            if (i < worldNews.length) mixedNews.push(worldNews[i]);
          }
          displayNews = mixedNews;
        }

        const newsTrack = document.getElementById("news-track");
        if (newsTrack) {
          const doubledNews = [...displayNews, ...displayNews];
          newsTrack.innerHTML = doubledNews
            .map(
              (item) => `
            <div class="news-card">
              <img src="${item.img}" alt="" loading="lazy">
              <div class="news-info">
                <span class="tag">${item.tag}</span>
                <span class="headline">${item.text}</span>
              </div>
            </div>
          `,
            )
            .join("");
        }
      }

      async function bootDiscovery() {
        const authState = await authGate;
        if (authState && authState.ok === false) return;
        loadNewsSlider();
        const loaded = await loadPlanEngine();
        if (!loaded) await loadLocationEntities();
      }

      bootDiscovery();

      const slider = document.getElementById("news-slider");
      let scrollSpeed = 0.18;
      let autoScrollActive = true;
      let interactionTimeout;
      let isDraggingNews = false;
      let newsStartX = 0;
      let newsStartScrollLeft = 0;
      let isProgrammaticScroll = false;

      function step() {
        if (autoScrollActive && slider) {
          isProgrammaticScroll = true;
          slider.scrollLeft += scrollSpeed;
          if (slider.scrollLeft >= slider.scrollWidth / 2) {
            slider.scrollLeft = 0;
          }
          requestAnimationFrame(() => {
            isProgrammaticScroll = false;
          });
        }
        requestAnimationFrame(step);
      }

      function pauseNewsAutoScroll(delay = 2600) {
        autoScrollActive = false;
        clearTimeout(interactionTimeout);
        interactionTimeout = setTimeout(() => {
          autoScrollActive = true;
        }, delay);
      }

      if (slider) {
        slider.addEventListener("pointerdown", (event) => {
          isDraggingNews = true;
          newsStartX = event.clientX;
          newsStartScrollLeft = slider.scrollLeft;
          slider.setPointerCapture?.(event.pointerId);
          pauseNewsAutoScroll(5000);
        });
        slider.addEventListener("pointermove", (event) => {
          if (!isDraggingNews) return;
          event.preventDefault();
          const delta = event.clientX - newsStartX;
          slider.scrollLeft = newsStartScrollLeft - delta;
        });
        ["pointerup", "pointercancel", "pointerleave"].forEach((type) => {
          slider.addEventListener(type, (event) => {
            if (!isDraggingNews) return;
            isDraggingNews = false;
            if (slider.hasPointerCapture?.(event.pointerId))
              slider.releasePointerCapture(event.pointerId);
            pauseNewsAutoScroll(1800);
          });
        });
        slider.addEventListener("wheel", () => pauseNewsAutoScroll(2200), {
          passive: true,
        });
        slider.addEventListener("scroll", () => {
          if (!isProgrammaticScroll && !isDraggingNews)
            pauseNewsAutoScroll(2200);
        });

        requestAnimationFrame(step);
      }
