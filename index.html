<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Echoo</title>
    <style>
      :root {
        color-scheme: dark;
        --ink: #f6f0e6;
        --muted: #c7bdb0;
        --quiet: #91887f;
        --line: rgba(246, 240, 230, 0.2);
        --line-soft: rgba(246, 240, 230, 0.1);
        --glass: rgba(31, 32, 31, 0.52);
        --gold: #e7c98e;
        --rose: #d8a2d9;
        --violet: #a68cdb;
        --deep: #101112;
        --shadow: 0 24px 80px rgba(0, 0, 0, 0.46);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * { box-sizing: border-box; }
      html, body { min-height: 100%; }
      body {
        margin: 0;
        color: var(--ink);
        background: #161819;
        overflow-x: hidden;
      }

      body::before {
        position: fixed;
        inset: 0;
        z-index: -3;
        content: "";
        background: url("assets/echoo-mobile-bg.png") center / cover no-repeat;
        filter: contrast(1.04) brightness(0.76) saturate(0.88);
        transform: scale(1.015);
      }

      body::after {
        position: fixed;
        inset: 0;
        z-index: -2;
        content: "";
        background:
          linear-gradient(180deg, rgba(13, 14, 15, 0.56) 0%, rgba(13, 14, 15, 0.2) 30%, rgba(13, 14, 15, 0.18) 58%, rgba(13, 14, 15, 0.92) 100%),
          radial-gradient(circle at 50% 5%, rgba(231, 201, 142, 0.16), transparent 18rem);
      }

      a { color: inherit; text-decoration: none; }
      button, input { font: inherit; }
      button { -webkit-tap-highlight-color: transparent; }

      .page {
        min-height: 100svh;
        display: grid;
        grid-template-rows: auto 1fr auto;
        width: min(480px, 100%);
        margin: 0 auto;
        padding: 16px 18px 84px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding-top: max(2px, env(safe-area-inset-top));
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        min-height: 44px;
      }

      .brand-mark {
        width: 42px;
        height: 42px;
        border-radius: 18px;
        background: rgba(246, 240, 230, 0.08);
        overflow: hidden;
        border: 1px solid rgba(246, 240, 230, 0.12);
      }

      .brand-mark img {
        width: 122px;
        height: 88px;
        object-fit: cover;
        object-position: 50% 0%;
        transform: translate(-40px, -7px);
        filter: saturate(0.9) contrast(1.05);
      }

      .brand-name {
        font-size: 26px;
        font-weight: 850;
        letter-spacing: -0.035em;
      }

      .top-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .round-action {
        position: relative;
        width: 44px;
        height: 44px;
        border: 1px solid rgba(246, 240, 230, 0.14);
        border-radius: 50%;
        background: rgba(15, 16, 17, 0.5);
        color: var(--ink);
        backdrop-filter: blur(14px);
        cursor: pointer;
        transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
      }

      .round-action:hover,
      .round-action:focus-visible {
        transform: translateY(-2px);
        border-color: rgba(246, 240, 230, 0.36);
        background: rgba(246, 240, 230, 0.08);
        outline: 0;
      }

      .round-action.search::before {
        position: absolute;
        inset: 12px;
        content: "";
        border: 2px solid currentColor;
        border-radius: 50%;
      }

      .round-action.search::after {
        position: absolute;
        right: 11px;
        bottom: 11px;
        width: 9px;
        height: 2px;
        content: "";
        background: currentColor;
        border-radius: 999px;
        transform: rotate(45deg);
      }

      .round-action.person::before {
        position: absolute;
        top: 10px;
        left: 16px;
        width: 9px;
        height: 9px;
        content: "";
        border: 2px solid currentColor;
        border-radius: 50%;
      }

      .round-action.person::after {
        position: absolute;
        left: 12px;
        bottom: 10px;
        width: 18px;
        height: 12px;
        content: "";
        border: 2px solid currentColor;
        border-bottom: 0;
        border-radius: 14px 14px 0 0;
      }

      .hero {
        display: grid;
        align-content: end;
        gap: 18px;
        min-height: calc(100svh - 196px);
        padding: 34px 0 12px;
      }

      .hero-center {
        display: grid;
        justify-items: center;
        text-align: center;
        gap: 10px;
        margin-bottom: auto;
        padding-top: clamp(40px, 11svh, 86px);
      }

      .hero-logo {
        width: min(170px, 48vw);
        height: min(118px, 34vw);
        overflow: hidden;
        display: grid;
        place-items: start center;
      }

      .hero-logo img {
        width: 100%;
        height: auto;
        filter: drop-shadow(0 14px 22px rgba(0, 0, 0, 0.42));
      }

      .hero-logo span {
        display: block;
        width: 100%;
        height: 76px;
        background: url("assets/echoo-new-logo.jpg") center 8% / 148% auto no-repeat;
      }

      h1 {
        margin: 0;
        font-size: clamp(47px, 15vw, 72px);
        line-height: 0.9;
        letter-spacing: -0.075em;
        text-wrap: balance;
        text-shadow: 0 18px 40px rgba(0, 0, 0, 0.52);
      }

      .tagline {
        margin: 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.35;
        font-weight: 650;
        text-shadow: 0 12px 24px rgba(0, 0, 0, 0.64);
      }

      .city-pill {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        width: fit-content;
        min-height: 38px;
        padding: 0 14px;
        margin: 4px auto 0;
        border: 1px solid rgba(246, 240, 230, 0.16);
        border-radius: 999px;
        background: rgba(16, 17, 18, 0.46);
        color: var(--muted);
        font-size: 13px;
        font-weight: 750;
        backdrop-filter: blur(12px);
      }

      .city-pill::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--gold), var(--rose));
        box-shadow: 0 0 14px rgba(231, 201, 142, 0.5);
      }

      .control-stack {
        display: grid;
        gap: 12px;
      }

      .prompt {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 10px;
        min-height: 60px;
        padding: 7px 8px 7px 18px;
        border: 1px solid rgba(246, 240, 230, 0.16);
        border-radius: 999px;
        background: rgba(28, 29, 30, 0.68);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 16px 48px rgba(0, 0, 0, 0.28);
        backdrop-filter: blur(18px);
      }

      .prompt:focus-within {
        border-color: rgba(231, 201, 142, 0.72);
        box-shadow: 0 0 0 4px rgba(231, 201, 142, 0.12), 0 16px 48px rgba(0, 0, 0, 0.28);
      }

      .prompt input {
        width: 100%;
        min-width: 0;
        border: 0;
        outline: 0;
        color: var(--ink);
        background: transparent;
        font-size: 15px;
        font-weight: 700;
      }

      .prompt input::placeholder { color: #cfc6ba; opacity: 0.92; }

      .send {
        position: relative;
        width: 46px;
        height: 46px;
        border: 0;
        border-radius: 50%;
        color: #161514;
        background: linear-gradient(135deg, #f1d391, #d8a2d9 62%, #a992e5);
        cursor: pointer;
        transition: transform 180ms ease, filter 180ms ease;
      }

      .send::before {
        position: absolute;
        top: 15px;
        left: 13px;
        width: 16px;
        height: 2px;
        content: "";
        background: currentColor;
        border-radius: 999px;
      }

      .send::after {
        position: absolute;
        top: 11px;
        left: 21px;
        width: 10px;
        height: 10px;
        content: "";
        border-top: 2px solid currentColor;
        border-right: 2px solid currentColor;
        transform: rotate(45deg);
      }

      .send:hover,
      .send:focus-visible {
        transform: translateY(-2px) scale(1.02);
        filter: brightness(1.04);
        outline: 0;
      }

      .main-cta,
      .bored-cta {
        width: 100%;
        min-height: 58px;
        border: 1px solid transparent;
        border-radius: 999px;
        cursor: pointer;
        font-weight: 900;
        letter-spacing: -0.02em;
        transition: transform 180ms ease, filter 180ms ease, border-color 180ms ease, background 180ms ease;
      }

      .main-cta {
        color: #151311;
        background: linear-gradient(135deg, #e4bd78 0%, #f2ddb0 40%, #d8a2d9 100%);
        box-shadow: 0 16px 46px rgba(216, 162, 217, 0.18);
        text-transform: uppercase;
        font-size: 14px;
      }

      .bored-cta {
        color: var(--ink);
        background: rgba(16, 17, 18, 0.48);
        border-color: rgba(246, 240, 230, 0.15);
        backdrop-filter: blur(14px);
        font-size: 15px;
      }

      .main-cta:hover,
      .main-cta:focus-visible,
      .bored-cta:hover,
      .bored-cta:focus-visible {
        transform: translateY(-2px);
        outline: 0;
      }

      .bored-cta:hover,
      .bored-cta:focus-visible {
        border-color: rgba(246, 240, 230, 0.34);
        background: rgba(246, 240, 230, 0.08);
      }

      .bottom-nav {
        position: fixed;
        left: 50%;
        bottom: 0;
        z-index: 30;
        width: min(480px, 100%);
        transform: translateX(-50%);
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        padding: 9px 10px calc(8px + env(safe-area-inset-bottom));
        border-top: 1px solid rgba(246, 240, 230, 0.12);
        background: rgba(16, 17, 18, 0.78);
        backdrop-filter: blur(20px);
      }

      .nav-link {
        display: grid;
        justify-items: center;
        gap: 5px;
        min-height: 54px;
        color: var(--quiet);
        font-size: 10px;
        font-weight: 850;
        letter-spacing: 0.02em;
      }

      .nav-link.active { color: var(--gold); }

      .glyph {
        position: relative;
        width: 23px;
        height: 23px;
        color: currentColor;
      }

      .glyph.home::before {
        position: absolute;
        inset: 8px 3px 2px;
        content: "";
        border: 2px solid currentColor;
        border-top: 0;
        border-radius: 2px;
      }

      .glyph.home::after {
        position: absolute;
        left: 4px;
        top: 3px;
        width: 14px;
        height: 14px;
        content: "";
        border-left: 2px solid currentColor;
        border-top: 2px solid currentColor;
        transform: rotate(45deg);
      }

      .glyph.discover::before {
        position: absolute;
        inset: 3px;
        content: "";
        border: 2px solid currentColor;
        border-radius: 50%;
      }

      .glyph.discover::after {
        position: absolute;
        left: 10px;
        top: 10px;
        width: 8px;
        height: 2px;
        content: "";
        background: currentColor;
        transform: rotate(-35deg);
        transform-origin: left center;
      }

      .glyph.weekend::before {
        position: absolute;
        inset: 5px 3px 3px;
        content: "";
        border: 2px solid currentColor;
        border-radius: 3px;
      }

      .glyph.weekend::after {
        position: absolute;
        left: 6px;
        right: 6px;
        top: 10px;
        height: 2px;
        content: "";
        background: currentColor;
        box-shadow: 0 -6px 0 -1px currentColor;
      }

      .glyph.people::before,
      .glyph.people::after {
        position: absolute;
        content: "";
        border: 2px solid currentColor;
      }

      .glyph.people::before {
        left: 8px;
        top: 4px;
        width: 7px;
        height: 7px;
        border-radius: 50%;
      }

      .glyph.people::after {
        left: 3px;
        bottom: 3px;
        width: 17px;
        height: 9px;
        border-bottom: 0;
        border-radius: 14px 14px 0 0;
      }

      .glyph.profile::before {
        position: absolute;
        left: 8px;
        top: 4px;
        width: 7px;
        height: 7px;
        content: "";
        border: 2px solid currentColor;
        border-radius: 50%;
      }

      .glyph.profile::after {
        position: absolute;
        left: 5px;
        bottom: 4px;
        width: 13px;
        height: 8px;
        content: "";
        border: 2px solid currentColor;
        border-bottom: 0;
        border-radius: 12px 12px 0 0;
      }

      .sheet {
        position: fixed;
        left: 50%;
        right: auto;
        bottom: 92px;
        z-index: 50;
        width: min(440px, calc(100% - 28px));
        transform: translate(-50%, 18px);
        opacity: 0;
        pointer-events: none;
        padding: 18px;
        border: 1px solid rgba(246, 240, 230, 0.18);
        border-radius: 28px;
        background: rgba(22, 23, 24, 0.86);
        box-shadow: var(--shadow);
        backdrop-filter: blur(22px);
        transition: opacity 180ms ease, transform 180ms ease;
      }

      .sheet.open {
        opacity: 1;
        pointer-events: auto;
        transform: translate(-50%, 0);
      }

      .sheet h2 {
        margin: 0 0 8px;
        font-size: 27px;
        line-height: 1;
        letter-spacing: -0.045em;
      }

      .sheet p {
        margin: 0 0 16px;
        color: var(--muted);
        line-height: 1.45;
        font-weight: 650;
      }

      .sheet-actions {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
      }

      .sheet-actions a,
      .sheet-actions button {
        min-height: 48px;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(246, 240, 230, 0.14);
        font-weight: 850;
        cursor: pointer;
      }

      .sheet-actions a {
        color: #151311;
        background: linear-gradient(135deg, #e4bd78, #d8a2d9);
        border-color: transparent;
      }

      .sheet-actions button {
        color: var(--ink);
        background: rgba(246, 240, 230, 0.06);
      }

      @media (min-width: 760px) {
        body::before { background-size: min(883px, 58vw) auto; background-color: #161819; }
        .page { width: min(560px, 100%); }
        .bottom-nav { width: min(560px, 100%); }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="topbar" aria-label="Echoo">
        <a class="brand" href="index.html" aria-label="Echoo home">
          <span class="brand-mark" aria-hidden="true"><img src="assets/echoo-new-logo.jpg" alt=""></span>
          <span class="brand-name">Echoo</span>
        </a>
        <div class="top-actions">
          <button class="round-action search" id="focus-search" type="button" aria-label="Search Echoo"></button>
          <a class="round-action person" href="auth.html" aria-label="Open your profile"></a>
        </div>
      </header>

      <main class="hero">
        <section class="hero-center" aria-labelledby="landing-title">
          <div class="hero-logo" aria-hidden="true"><span></span></div>
          <h1 id="landing-title">Discover your city, your way.</h1>
          <p class="tagline">Find the plans people will actually say yes to.</p>
          <span class="city-pill">Toronto today</span>
        </section>

        <section class="control-stack" aria-label="Plan your day">
          <form class="prompt" id="search-form">
            <label for="city-search" class="sr-only" style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;">What do you want to do?</label>
            <input id="city-search" autocomplete="off" placeholder="What’s happening in Toronto today?" />
            <button class="send" type="submit" aria-label="Search plans"></button>
          </form>
          <button class="main-cta" id="weekend-plan" type="button">Plan my instant weekend</button>
          <button class="bored-cta" id="bored-plan" type="button">I’m bored. Surprise me.</button>
        </section>
      </main>
    </div>

    <nav class="bottom-nav" aria-label="Main navigation">
      <a class="nav-link active" href="index.html" aria-current="page"><span class="glyph home"></span><span>Home</span></a>
      <a class="nav-link" href="events.html"><span class="glyph discover"></span><span>Discover</span></a>
      <a class="nav-link" href="events.html?filter=dates"><span class="glyph weekend"></span><span>Weekend</span></a>
      <a class="nav-link" href="app.html"><span class="glyph people"></span><span>Friends</span></a>
      <a class="nav-link" href="auth.html"><span class="glyph profile"></span><span>Profile</span></a>
    </nav>

    <aside class="sheet" id="plan-sheet" aria-hidden="true" aria-live="polite">
      <h2 id="sheet-title">Weekend mode is ready.</h2>
      <p id="sheet-copy">We’ll start with a simple city plan: one anchor, one food stop, one easy backup if the group changes its mind.</p>
      <div class="sheet-actions">
        <a id="sheet-link" href="events.html?query=weekend">Show the plan</a>
        <button id="sheet-close" type="button">Close</button>
      </div>
    </aside>

    <script>
      const searchInput = document.getElementById("city-search");
      const sheet = document.getElementById("plan-sheet");
      const sheetTitle = document.getElementById("sheet-title");
      const sheetCopy = document.getElementById("sheet-copy");
      const sheetLink = document.getElementById("sheet-link");

      function openSheet(title, copy, href) {
        sheetTitle.textContent = title;
        sheetCopy.textContent = copy;
        sheetLink.href = href;
        sheet.classList.add("open");
        sheet.setAttribute("aria-hidden", "false");
      }

      document.getElementById("focus-search").addEventListener("click", () => searchInput.focus());

      document.getElementById("search-form").addEventListener("submit", (event) => {
        event.preventDefault();
        const query = searchInput.value.trim() || "Toronto today";
        window.location.href = `events.html?query=${encodeURIComponent(query)}`;
      });

      document.getElementById("weekend-plan").addEventListener("click", () => {
        openSheet("Your weekend can start now.", "A crisp plan with a place to meet, something worth doing, and somewhere comfortable after.", "events.html?query=instant weekend in Toronto");
      });

      document.getElementById("bored-plan").addEventListener("click", () => {
        openSheet("Let’s make boredom useful.", "We’ll skip the obvious list and give you three nearby ideas with different energy levels.", "events.html?query=surprise me tonight");
      });

      document.getElementById("sheet-close").addEventListener("click", () => {
        sheet.classList.remove("open");
        sheet.setAttribute("aria-hidden", "true");
      });
    </script>
  </body>
</html>
