<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>echoo app</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #080907;
        --panel: #11130f;
        --panel-2: #191b15;
        --ink: #f5f1e8;
        --muted: #a8a397;
        --dim: #706c62;
        --line: rgba(245, 241, 232, 0.13);
        --line-strong: rgba(245, 241, 232, 0.28);
        --signal: #e7c98e;
        --rose: #d8a2d9;
        --clay: #c87952;
        --blue: #91a7ff;
        --shadow: 0 24px 70px rgba(0, 0, 0, 0.42);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background:
          linear-gradient(
              90deg,
              rgba(245, 241, 232, 0.035) 1px,
              transparent 1px
            )
            0 0 / 34px 34px,
          radial-gradient(
            circle at 84% 0%,
            rgba(145, 167, 255, 0.12),
            transparent 26rem
          ),
          radial-gradient(
            circle at 8% 40%,
            rgba(216, 255, 95, 0.08),
            transparent 20rem
          ),
          var(--bg);
      }

      a {
        color: inherit;
        text-decoration: none;
      }
      button,
      input,
      select {
        font: inherit;
      }

      /* ── Topbar ── */
      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 18px;
        border-bottom: 1px solid var(--line);
        background: rgba(8, 9, 7, 0.94);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-weight: 950;
        font-size: 26px;
        letter-spacing: -0.05em;
      }

      .brand img {
        width: 44px;
        height: 44px;
        border: 1px solid var(--line);
        border-radius: 18px;
        object-fit: cover;
        object-position: 50% 0%;
      }

      .avatar {
        width: 42px;
        height: 42px;
        border: 1px solid var(--line-strong);
        border-radius: 50%;
        display: grid;
        place-items: center;
        color: #151311;
        background: linear-gradient(
          135deg,
          #e4bd78 0%,
          #f2ddb0 42%,
          var(--rose) 100%
        );
        font-size: 13px;
        font-weight: 950;
      }

      /* ── Shell ── */
      .shell {
        width: min(1160px, 100%);
        margin: 0 auto;
        padding: 18px 18px 106px;
      }

      /* ── Welcome ── */
      .welcome {
        display: grid;
        gap: 18px;
        padding: 22px 0;
      }

      .kicker {
        color: var(--signal);
        font-size: 12px;
        font-weight: 950;
        letter-spacing: 0.15em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(44px, 13vw, 92px);
        line-height: 0.88;
        letter-spacing: -0.075em;
      }

      .welcome p {
        margin: 0;
        max-width: 690px;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.45;
        font-weight: 650;
      }

      /* ── News Bubble Slider ── */
      .news-carousel-wrap {
        margin: 8px 0 20px;
        overflow: hidden;
        position: relative;
        width: 100%;
      }

      .news-carousel-wrap::before,
      .news-carousel-wrap::after {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 30px;
        z-index: 2;
        content: "";
        pointer-events: none;
      }
      .news-carousel-wrap::before {
        left: 0;
        background: linear-gradient(90deg, var(--bg) 0%, transparent 100%);
      }
      .news-carousel-wrap::after {
        right: 0;
        background: linear-gradient(-90deg, var(--bg) 0%, transparent 100%);
      }

      .news-slider {
        display: flex;
        overflow-x: auto;
        scrollbar-width: none;
        -ms-overflow-style: none;
        cursor: grab;
        user-select: none;
        touch-action: pan-x;
        scroll-behavior: auto;
      }
      .news-slider::-webkit-scrollbar {
        display: none;
      }
      .news-slider:active {
        cursor: grabbing;
      }

      .news-track {
        display: flex;
        gap: 10px;
        padding: 4px 8px;
      }

      .news-card {
        flex: 0 0 auto;
        height: 60px;
        padding: 6px 12px 6px 6px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        border-radius: 4px;
        border: 1px solid var(--line);
        background: var(--panel);
        transition:
          border-color 180ms ease,
          background-color 180ms ease;
      }

      .news-card:hover {
        border-color: var(--signal);
        background-color: var(--panel-2);
      }

      .news-card img {
        width: 48px;
        height: 48px;
        object-fit: cover;
        border-radius: 2px;
        flex-shrink: 0;
      }

      .news-card .news-info {
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 2px;
        text-align: left;
      }

      .news-card .tag {
        color: var(--signal);
        font-size: 10px;
        font-weight: 950;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .news-card .headline {
        color: var(--muted);
        font-size: 13px;
        font-weight: 750;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 260px;
        transition: color 180ms ease;
      }

      .news-card:hover .headline {
        color: var(--ink);
      }

      /* ── Ask card ── */
      .ask-card {
        display: grid;
        gap: 12px;
        padding: 14px;
        border: 1px solid var(--line);
        background: rgba(17, 19, 15, 0.9);
        box-shadow: var(--shadow);
      }

      .ask-card form {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }

      input,
      select {
        min-height: 58px;
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 0;
        outline: 0;
        background: rgba(8, 9, 7, 0.78);
        color: var(--ink);
        padding: 0 15px;
        font-weight: 750;
      }

      input:focus,
      select:focus {
        border-color: var(--signal);
      }

      .primary,
      .ghost {
        min-height: 58px;
        border: 1px solid var(--line);
        border-radius: 0;
        cursor: pointer;
        font-weight: 950;
        letter-spacing: -0.03em;
        transition:
          transform 180ms ease,
          border-color 180ms ease,
          background 180ms ease;
      }

      .primary {
        color: #10110e;
        background: linear-gradient(
          135deg,
          #e4bd78 0%,
          #f2ddb0 42%,
          var(--rose) 100%
        );
        border-color: transparent;
      }

      .ghost {
        color: var(--ink);
        background: rgba(245, 241, 232, 0.04);
      }

      .primary:hover,
      .ghost:hover {
        transform: translateY(-2px);
        border-color: var(--line-strong);
      }

      /* ── Module grid ── */
      .grid {
        display: grid;
        gap: 12px;
        margin-top: 18px;
      }

      .module {
        position: relative;
        min-height: 152px;
        padding: 16px;
        border: 1px solid var(--line);
        background: rgba(17, 19, 15, 0.84);
        overflow: hidden;
        transition:
          transform 180ms ease,
          border-color 180ms ease,
          background 180ms ease;
      }

      .module:hover {
        transform: translateY(-3px);
        border-color: var(--line-strong);
        background: rgba(25, 27, 21, 0.94);
      }

      .module::after {
        content: "";
        position: absolute;
        inset: auto 16px 16px auto;
        width: 54px;
        height: 1px;
        background: var(--signal);
      }

      .module strong {
        display: block;
        margin-bottom: 10px;
        font-size: 24px;
        line-height: 0.98;
        letter-spacing: -0.055em;
      }

      .module p {
        margin: 0;
        color: var(--muted);
        line-height: 1.4;
        font-size: 14px;
        font-weight: 650;
      }

      .module small {
        display: block;
        margin-bottom: 26px;
        color: var(--dim);
        font-size: 11px;
        font-weight: 950;
        letter-spacing: 0.13em;
        text-transform: uppercase;
      }

      /* ── Bottom nav ── */
      .bottom-nav {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 30;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        border-top: 1px solid var(--line);
        background: rgba(8, 9, 7, 0.96);
        transition: transform 260ms ease;
      }

      .bottom-nav a {
        display: grid;
        place-items: center;
        min-height: 68px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 850;
      }

      .bottom-nav a.active {
        color: var(--signal);
      }

      body.chat-open .bottom-nav {
        transform: translateY(100%);
      }

      /* ── Chat overlay ── */
      .chat-overlay {
        position: fixed;
        inset: 0;
        z-index: 40;
        display: flex;
        flex-direction: column;
        background: var(--bg);
        opacity: 0;
        pointer-events: none;
        transition: opacity 220ms ease;
      }

      .chat-overlay.open {
        opacity: 1;
        pointer-events: auto;
      }

      /* Chat header */
      .chat-header {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 14px 18px;
        border-bottom: 1px solid var(--line);
        background: rgba(8, 9, 7, 0.94);
      }

      .chat-close {
        width: 42px;
        height: 42px;
        border: 1px solid var(--line);
        border-radius: 0;
        background: transparent;
        color: var(--ink);
        font-size: 18px;
        font-weight: 950;
        cursor: pointer;
        display: grid;
        place-items: center;
        transition: border-color 180ms ease;
        flex-shrink: 0;
      }

      .chat-close:hover {
        border-color: var(--line-strong);
      }

      .chat-header-title {
        font-size: 14px;
        font-weight: 850;
        letter-spacing: -0.02em;
        color: var(--muted);
      }

      /* Chat body (scrollable) */
      .chat-body {
        flex: 1 1 0;
        overflow-y: auto;
        padding: 20px 16px 20px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-padding-bottom: 96px;
      }

      /* Bubbles */
      .bubble {
        max-width: 85%;
        padding: 14px 16px;
        font-size: 16px;
        line-height: 1.45;
        animation: bubbleIn 260ms ease both;
      }

      @keyframes bubbleIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .bubble.user {
        align-self: flex-end;
        max-width: 78%;
        background: linear-gradient(
          135deg,
          #e4bd78 0%,
          #f2ddb0 42%,
          var(--rose) 100%
        );
        color: #151311;
        font-weight: 750;
        border-radius: 2px 0 0 0;
      }

      .bubble.ai {
        align-self: flex-start;
        background: var(--panel);
        color: var(--ink);
        border: 1px solid var(--line);
        font-weight: 650;
        border-radius: 0;
      }

      /* Typing indicator */
      .typing {
        align-self: flex-start;
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 14px 18px;
        background: var(--panel);
        border: 1px solid var(--line);
        animation: bubbleIn 200ms ease both;
      }

      .typing-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--dim);
        animation: dotPulse 1.1s ease-in-out infinite;
      }

      .typing-dot:nth-child(2) {
        animation-delay: 150ms;
      }
      .typing-dot:nth-child(3) {
        animation-delay: 300ms;
      }

      @keyframes dotPulse {
        0%,
        100% {
          opacity: 0.3;
        }
        50% {
          opacity: 1;
        }
      }

      /* Location card */
      .loc-card {
        align-self: flex-start;
        width: min(560px, 100%);
        border: 1px solid var(--line);
        overflow: hidden;
        animation: bubbleIn 300ms ease both;
        position: relative;
      }

      .loc-card.hot {
        border-left: 3px solid var(--signal);
      }

      .loc-card picture,
      .loc-card img {
        display: block;
        width: 100%;
        height: 160px;
        object-fit: cover;
      }

      .loc-card-body {
        padding: 14px 16px 18px;
      }

      .loc-card-hot {
        display: inline-block;
        padding: 4px 10px;
        margin-bottom: 10px;
        border: 1px solid rgba(231, 201, 142, 0.3);
        background: rgba(231, 201, 142, 0.08);
        color: var(--signal);
        font-size: 10px;
        font-weight: 950;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .loc-card-tags {
        color: var(--signal);
        font-size: 11px;
        font-weight: 950;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin-bottom: 8px;
      }

      .loc-card-name {
        font-size: 20px;
        font-weight: 950;
        letter-spacing: -0.04em;
        line-height: 1.1;
        margin-bottom: 8px;
      }

      .loc-card-vibe {
        color: var(--muted);
        font-size: 14px;
        font-weight: 650;
        line-height: 1.4;
      }

      /* Connecting track */
      .track {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
        padding: 2px 0;
        align-self: flex-start;
        width: min(560px, 100%);
        animation: bubbleIn 240ms ease both;
      }

      .track-line {
        width: 2px;
        height: 18px;
        background: repeating-linear-gradient(
          to bottom,
          rgba(231, 201, 142, 0.4) 0px,
          rgba(231, 201, 142, 0.4) 4px,
          transparent 4px,
          transparent 8px
        );
      }

      .track-label {
        padding: 4px 12px;
        font-size: 11px;
        font-weight: 850;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--dim);
      }

      /* Quick action pills */
      .pills {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        width: min(560px, 100%);
        align-self: flex-start;
        padding-bottom: 4px;
        -webkit-overflow-scrolling: touch;
        animation: bubbleIn 200ms ease both;
      }

      .pills::-webkit-scrollbar {
        display: none;
      }

      .pill {
        flex: 0 0 auto;
        padding: 10px 16px;
        border: 1px solid var(--line);
        border-radius: 100px;
        background: transparent;
        color: var(--muted);
        font-size: 12px;
        font-weight: 850;
        letter-spacing: -0.01em;
        cursor: pointer;
        white-space: nowrap;
        transition:
          border-color 180ms ease,
          color 180ms ease;
      }

      .pill:hover,
      .pill:active {
        border-color: var(--signal);
        color: var(--ink);
      }

      .pill.tapped {
        border-color: var(--signal);
        color: var(--signal);
      }

      /* Chat input bar */
      .chat-input-bar {
        flex: 0 0 auto;
        display: flex;
        gap: 8px;
        padding: 12px 16px;
        border-top: 1px solid var(--line);
        background: rgba(8, 9, 7, 0.96);
        position: sticky;
        bottom: 0;
        z-index: 2;
      }

      .chat-input-bar input {
        flex: 1;
        min-height: 48px;
        font-size: 15px;
      }

      .chat-send {
        flex: 0 0 auto;
        min-height: 48px;
        padding: 0 20px;
        border: 1px solid transparent;
        border-radius: 0;
        background: linear-gradient(
          135deg,
          #e4bd78 0%,
          #f2ddb0 42%,
          var(--rose) 100%
        );
        color: #10110e;
        font-weight: 950;
        font-size: 14px;
        letter-spacing: -0.02em;
        cursor: pointer;
        transition: transform 180ms ease;
      }

      .chat-send:hover {
        transform: translateY(-1px);
      }

      /* ── Responsive ── */
      @media (min-width: 760px) {
        .shell {
          padding: 28px 28px 60px;
        }
        .welcome {
          grid-template-columns: 1fr 410px;
          align-items: end;
          padding: 54px 0 30px;
        }
        .ask-card {
          align-self: stretch;
        }
        .ask-card form {
          grid-template-columns: 1fr auto;
          align-items: end;
        }
        .grid {
          grid-template-columns: repeat(4, 1fr);
        }
        .bottom-nav {
          display: none;
        }

        .chat-body {
          padding: 28px 24px;
        }
        .chat-input-bar {
          padding: 14px 24px;
        }
        .bubble,
        .loc-card {
          max-width: 520px;
        }
        .track,
        .pills,
        .see-route-card {
          max-width: 520px;
        }
        .bubble.user {
          max-width: 420px;
        }
      }

      /* Full-screen Slide-up Map Overlay */
      .map-overlay {
        position: fixed;
        bottom: -100%;
        left: 0;
        width: 100%;
        height: 100%;
        background: #0d0d0d;
        z-index: 15000;
        transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        border-top: 1px solid var(--signal);
      }
      .map-overlay.open {
        transform: translateY(-100%);
      }
      .map-container {
        width: 100%;
        height: 100%;
      }
      /* Floating Close Button for Map */
      .map-close {
        position: absolute;
        top: 20px;
        right: 20px;
        width: 40px;
        height: 40px;
        border: 1px solid var(--line);
        background: rgba(13, 13, 13, 0.85);
        color: var(--ink);
        font-size: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 16000;
        border-radius: 4px;
        backdrop-filter: blur(4px);
        transition: all 0.2s ease;
      }
      .map-close:hover {
        border-color: var(--signal);
        color: var(--signal);
      }
      /* See Route on Map Chat Button Card */
      .see-route-card {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        align-self: flex-start;
        width: min(560px, 100%);
        padding: 14px;
        background: var(--panel-2);
        border: 1px dashed var(--signal);
        color: var(--signal);
        font-size: 13px;
        font-weight: bold;
        cursor: pointer;
        margin: 8px 0;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        animation: bubbleIn 240ms ease both;
        transition: all 0.2s ease;
      }
      .see-route-card:hover {
        background: var(--panel);
        border-style: solid;
      }
      /* Leaflet Dark Customizations */
      .leaflet-bar {
        border: 1px solid var(--line) !important;
      }
      .leaflet-bar a {
        background-color: var(--panel) !important;
        color: var(--ink) !important;
        border-bottom: 1px solid var(--line) !important;
      }
      .leaflet-bar a:hover {
        background-color: var(--panel-2) !important;
        color: var(--signal) !important;
      }
      /* ── Geo Failure Backdrop ── */
      .geo-backdrop {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(4px);
        z-index: 19000;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
      }
      .geo-backdrop.active {
        opacity: 1;
        pointer-events: auto;
      }

      /* ── Geo Settings Instruction Modal ── */
      .geo-settings-modal {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.95);
        width: calc(100% - 40px);
        max-width: 360px;
        background: var(--panel);
        border: 1px solid var(--signal);
        border-radius: 6px;
        padding: 24px;
        z-index: 20000;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.7);
        opacity: 0;
        pointer-events: none;
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .geo-settings-modal.active {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
        pointer-events: auto;
      }
      .geo-settings-modal h3 {
        font-size: 14px;
        margin-bottom: 8px;
        text-transform: uppercase;
        color: var(--signal);
        letter-spacing: 0.05em;
        font-weight: 900;
      }
      .geo-settings-modal p {
        font-size: 12px;
        line-height: 1.5;
        margin-bottom: 16px;
        color: var(--dim);
      }
      .geo-instructions {
        border-top: 1px solid var(--line);
        padding-top: 14px;
        margin-bottom: 16px;
      }
      .geo-instruction-title {
        font-size: 11px;
        font-weight: 850;
        text-transform: uppercase;
        margin-bottom: 6px;
        color: var(--ink);
      }
      .geo-instruction-list {
        font-size: 11px;
        color: var(--dim);
        padding-left: 16px;
        margin: 0 0 14px 0;
      }
      .geo-instruction-list li {
        margin-bottom: 5px;
      }
      .geo-modal-buttons {
        display: flex;
        gap: 12px;
        justify-content: flex-end;
      }
      .geo-modal-btn {
        padding: 9px 18px;
        font-size: 11px;
        font-weight: bold;
        border: 1px solid var(--line);
        background: var(--panel-2);
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .geo-modal-btn.primary {
        border-color: var(--signal);
        color: var(--signal);
      }
      .geo-modal-btn:hover {
        background: var(--panel);
      }
    </style>
    <link

      async function loadNewsSlider() {
        let displayNews = [];

        if (CONFIG.supabaseUrl && CONFIG.supabaseAnonKey && window.supabase) {
          try {
            const supabaseClient = window.supabase.createClient(
              CONFIG.supabaseUrl,
              CONFIG.supabaseAnonKey,
            );
            const { data, error } = await supabaseClient
              .from("news")
              .select("*")
              .or(`city.eq.${city},city.eq.Global`)
              .order("published_at", { ascending: false })
              .limit(12);

            if (!error && data && data.length > 0) {
              displayNews = data.map((item) => ({
                tag: item.tag,
                text: item.title,
                img:
                  item.image_url ||
                  "https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?auto=format&fit=crop&w=120&q=80",
              }));
              console.log("Echoo: Loaded real-time news from Supabase.");
            } else if (error) {
              console.warn(
                "Echoo: Supabase query error, falling back to mock news:",
                error.message,
              );
            }
          } catch (e) {
            console.warn(
              "Echoo: Failed to query Supabase, falling back to mock news:",
              e,
            );
          }
        }

        if (displayNews.length === 0) {
          const cityList = localNewsDb[city] || localNewsDb["Toronto"];
          const mixedNews = [];
          const maxLen = Math.max(cityList.length, worldNews.length);
          for (let i = 0; i < maxLen; i++) {
            if (i < cityList.length) mixedNews.push(cityList[i]);
            if (i < worldNews.length) mixedNews.push(worldNews[i]);
          }
          displayNews = mixedNews;
        }

        const newsTrack = document.getElementById("news-track");
        if (newsTrack) {
          const doubledNews = [...displayNews, ...displayNews];
          newsTrack.innerHTML = doubledNews
            .map(
              (item) => `
            <div class="news-card">
              <img src="${item.img}" alt="" loading="lazy">
              <div class="news-info">
                <span class="tag">${item.tag}</span>
                <span class="headline">${item.text}</span>
              </div>
            </div>
          `,
            )
            .join("");
        }
      }

      loadNewsSlider();

      // Marquee slider functionality
      const slider = document.getElementById("news-slider");
      let scrollSpeed = 0.18;
      let autoScrollActive = true;
      let interactionTimeout;
      let isDraggingNews = false;
      let newsStartX = 0;
      let newsStartScrollLeft = 0;
      let isProgrammaticScroll = false;

      function step() {
        if (autoScrollActive && slider) {
          isProgrammaticScroll = true;
          slider.scrollLeft += scrollSpeed;
          if (slider.scrollLeft >= slider.scrollWidth / 2) {
            slider.scrollLeft = 0;
          }
          requestAnimationFrame(() => {
            isProgrammaticScroll = false;
          });
        }
        requestAnimationFrame(step);
      }

      function pauseNewsAutoScroll(delay = 2600) {
        autoScrollActive = false;
        clearTimeout(interactionTimeout);
        interactionTimeout = setTimeout(() => {
          autoScrollActive = true;
        }, delay);
      }

      if (slider) {
        slider.addEventListener("pointerdown", (event) => {
          isDraggingNews = true;
          newsStartX = event.clientX;
          newsStartScrollLeft = slider.scrollLeft;
          slider.setPointerCapture?.(event.pointerId);
          pauseNewsAutoScroll(5000);
        });
        slider.addEventListener("pointermove", (event) => {
          if (!isDraggingNews) return;
          event.preventDefault();
          const delta = event.clientX - newsStartX;
          slider.scrollLeft = newsStartScrollLeft - delta;
        });
        ["pointerup", "pointercancel", "pointerleave"].forEach((type) => {
          slider.addEventListener(type, (event) => {
            if (!isDraggingNews) return;
            isDraggingNews = false;
            if (slider.hasPointerCapture?.(event.pointerId))
              slider.releasePointerCapture(event.pointerId);
            pauseNewsAutoScroll(1800);
          });
        });
        slider.addEventListener("wheel", () => pauseNewsAutoScroll(2200), {
          passive: true,
        });
        slider.addEventListener("scroll", () => {

          const map = L.map(elementId, { zoomControl: true }).setView(
            center,
            14,
          );
          L.tileLayer(
            "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
            {
              attribution: "&copy; OpenStreetMap",
            },
          ).addTo(map);
          this.mapInstance = map;
          return map;

              color: "#E7C98E",
              fillColor: "#000000",

              radius: 6,
              weight: 2,
            })
              .addTo(this.mapInstance)
              .bindPopup(`<b>Stop ${index + 1}: ${stop.name}</b>`);
          });
          L.polyline(coords, {
            color: "#E7C98E",
            weight: 3,
            opacity: 0.8,
            dashArray: "5, 5",
          }).addTo(this.mapInstance);
          this.mapInstance.fitBounds(coords, { padding: [40, 40] });

      };

      function parsePossibleAiJson(text) {
        const value = String(text || "").trim();
        if (!value) return "";
        const fenced = value.match(/```(?:json)?\s*([\s\S]*?)\s*```/i);
        const source = (fenced ? fenced[1] : value)
          .replace(/^```(?:json)?\s*/i, "")
          .replace(/\s*```$/i, "")
          .trim();
        const objectText = source.includes("{")
          ? source.slice(source.indexOf("{"), source.lastIndexOf("}") + 1)
          : source;
        try {
          const parsed = JSON.parse(objectText);
          if (typeof parsed === "string") return parsePossibleAiJson(parsed);
          return (
            parsed.assistantMessage || parsed.summary || parsed.routeTitle || ""
          );
        } catch (error) {
          const match = source.match(
            /"assistantMessage"\s*:\s*"((?:\\.|[^"\\])*)"/i,
          );
          if (!match) return value;
          try {
            return JSON.parse(`"${match[1]}"`);
          } catch (innerError) {
            return match[1].replace(/\\"/g, '"');
          }
        }
      }

      function displayAiCopy(text) {
        const value = parsePossibleAiJson(text).replace(/\s+/g, " ").trim();
        if (/^```|^\{/.test(value) || /"assistantMessage"\s*:/.test(value)) {
          return "";
        }
        return value;
      }

      async function fetchPreciseNearby(limit) {
        if (!Number.isFinite(preciseLat) || !Number.isFinite(preciseLng))
          return [];
        try {
          const response = await fetch(CONFIG.locationSearchUrl, {
            method: "POST",
            headers: window.EchooAuth
              ? await window.EchooAuth.authHeaders({
                  "Content-Type": "application/json",
                })
              : {
                  "Content-Type": "application/json",
                  Authorization: `Bearer ${CONFIG.supabaseAnonKey}`,
                  apikey: CONFIG.supabaseAnonKey,
                },
            body: JSON.stringify({
              lat: preciseLat,
              lng: preciseLng,
              radiusMeters: 25000,
              limit,
            }),
          });
          if (!response.ok) return [];
          const payload = await response.json();
          if (!payload.supported || !Array.isArray(payload.results)) return [];
          return payload.results.map((item) => ({
            detailId: item.entity_id || item.id,
            name: item.title,
            tags: `${item.category || item.entity_type || "Echoo"} · ${item.distance_meters ? Math.max(1, Math.round(item.distance_meters / 1000)) + " km away" : city}`,
            coords: [item.latitude, item.longitude],
            img: item.image_url || "assets/optimized/news-music-768.jpg",
            vibe:
              item.description ||
              "Verified nearby recommendation from Echoo location search.",
          }));
        } catch (error) {
          console.warn(
            "Echoo: precise nearby search failed, using curated local fallback.",
            error,
          );
          return [];
        }
      }

      let lastPlanEnginePayload = null;

      function planRequestBody(limit, queryText, mode = "build_plan") {
        const base = {
          query: queryText,
          mode,
          energy,
          budget,
          limit,
          profile: personalizationProfile,
          previousPlan: lastPlanEnginePayload
            ? {
                region: lastPlanEnginePayload.region,
                ai: lastPlanEnginePayload.ai,
                summary: lastPlanEnginePayload.summary,
                plans: Array.isArray(lastPlanEnginePayload.plans)
                  ? lastPlanEnginePayload.plans.slice(0, 4)
                  : [],
              }
            : null,
        };
        const resolved =
          Number.isFinite(preciseLat) && Number.isFinite(preciseLng)
            ? window.EchooLocationPlatform.resolveCoordinates(
                preciseLat,
                preciseLng,
              )
            : null;
        return resolved?.supported
          ? { ...base, lat: preciseLat, lng: preciseLng }
          : { ...base, city };
      }

      function mapPlanStops(payload) {
        if (!payload?.supported || !Array.isArray(payload.plans)) return [];
        return payload.plans
          .map((item) => ({
            detailId: item.entityId || item.id,
            name: item.title,
            tags: `${item.category || "Echoo"} · ${item.distanceMeters ? Math.max(1, Math.round(item.distanceMeters / 1000)) + " km away" : item.city || city}`,
            coords: [item.latitude, item.longitude],
            img: item.imageUrl || "assets/optimized/news-music-768.jpg",
            vibe:
              item.why ||
              item.description ||
              "Matched to your current location, time, and preferences.",
            timing: item.timing || "",
          }))
          .filter(
            (item) =>
              Number.isFinite(item.coords[0]) &&
              Number.isFinite(item.coords[1]),
          );
      }

      async function requestSmartPlan(limit, queryText, mode = "build_plan") {
        try {
          const authState = await authGate;
          if (authState && authState.ok === false)
            return {
              payload: null,
              stops: [],
              error: "Finish signup and onboarding to use Echoo AI.",
            };
          const response = await fetch(CONFIG.planEngineUrl, {
            method: "POST",
            headers: window.EchooAuth
              ? await window.EchooAuth.authHeaders({
                  "Content-Type": "application/json",
                })
              : {
                  "Content-Type": "application/json",
                  Authorization: `Bearer ${CONFIG.supabaseAnonKey}`,
                  apikey: CONFIG.supabaseAnonKey,
                },
            body: JSON.stringify(planRequestBody(limit, queryText, mode)),
          });
          const payload = await response.json();
          lastPlanEnginePayload = payload;
          if (!response.ok) {
            return {
              payload,
              stops: [],
              error:
                payload?.error ||
                "Echoo AI could not answer that cleanly. Try again in a moment.",
            };
          }
          if (payload?.supported === false) {
            return {
              payload,
              stops: [],
              error:
                "Echoo AI needs a Canadian launch city for live planning. I can use Toronto, Vancouver, Montreal, Calgary, Ottawa, or another supported Canadian city.",
            };
          }
          if (payload?.ai?.provider !== "gemini") {
            return {
              payload,
              stops: [],
              error:
                payload?.error ||
                "Echoo AI had trouble answering that. Try again in a moment.",
            };
          }
          const stops = mapPlanStops(payload);
          return { payload, stops };
        } catch (error) {
          console.warn("Echoo: smart plan engine failed.", error);
          return {
            payload: null,
            stops: [],
            error: "Echoo AI could not connect. Try again in a moment.",
          };
        }
      }

      async function fetchSmartPlan(limit, queryText, mode = "build_plan") {
        const result = await requestSmartPlan(limit, queryText, mode);
        return result.stops;
      }

      function resolveCity(lat, lng) {
        const resolved = window.EchooLocationPlatform.resolveCoordinates(
          lat,
          lng,
        );
        if (!resolved.supported) {
          return null;
        }
        return resolved.city.name;
      }

      function captureDeviceLocationOnAppLoad() {
        const prefs = window.EchooLocationPlatform.readPreferences();
        if (
          Number.isFinite(Number(prefs.lastLat)) &&
          Number.isFinite(Number(prefs.lastLng)) &&
          prefs.locationSupported !== false
        ) {
          preciseLat = Number(prefs.lastLat);
          preciseLng = Number(prefs.lastLng);
          return;
        }
        if (!navigator.geolocation) return;

        navigator.geolocation.getCurrentPosition(
          (position) => {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            const resolved = window.EchooLocationPlatform.resolveCoordinates(
              lat,
              lng,
            );
            if (!resolved.supported) {
              preciseLat = undefined;
              preciseLng = undefined;
              city = resolved.fallbackCity?.name || "Toronto";
              activityContext = getActivityContext();
              window.EchooLocationPlatform.writeLocationState({
                city,
                countryCode: "CA",
                locationSupported: true,
                locationPrecision: "manual_city",
                locationReason: resolved.reason,
              });
              return;
            }

            preciseLat = lat;
            preciseLng = lng;
            city = resolved.city.name;
            activityContext = getActivityContext();
            window.EchooLocationPlatform.writeLocationState({
              city,
              countryCode: "CA",
              locationSupported: true,
              locationPrecision: "gps",
              lastLat: lat,
              lastLng: lng,
            });
          },
          () => {},
          { enableHighAccuracy: true, timeout: 6000, maximumAge: 300000 },
        );
      }

      captureDeviceLocationOnAppLoad();

      function delay(ms) {
        return new Promise((r) => setTimeout(r, ms));

      async function presentSmartPlan(
        queryText,
        maxStops = 4,
        mode = "build_plan",
        typingAlreadyVisible = false,
      ) {
        if (!typingAlreadyVisible) addTyping();
        await delay(700);

        const planResult = await requestSmartPlan(maxStops, queryText, mode);
        if (planResult.error) {
          removeTyping();
          addBubble("ai", planResult.error);
          addPills(["Try again", "Change budget", "Start over"]);
          return;
        }
        const desiredStops =
          planResult.payload?.planShape?.stopCount ||
          Math.min(maxStops, Math.max(1, planResult.stops.length));
        const preciseStops = planResult.stops.slice(0, desiredStops);
        const ai = planResult.payload?.ai;
        if (!preciseStops.length) {
          removeTyping();
          addBubble(
            "ai",
            ai?.assistantMessage ||
              "I can answer that, but I need one more detail to make it useful.",
          );
          addPills(
            ai?.suggestedPills?.length
              ? ai.suggestedPills
              : ["Ask another question", "Build a plan", "Surprise me"],
          );
          return;
        }
        const usePreciseBase =
          Number.isFinite(preciseLat) && Number.isFinite(preciseLng);

        removeTyping();

        addBubble("ai", ai.assistantMessage);
        await delay(350);

        for (let i = 0; i < preciseStops.length; i++) {
          const stop = preciseStops[i];
          addLocationCard(
            stop.img,
            stop.img,
            stop.name,
            `${stop.tags} · ${budget}`,
            stop.timing ? `${stop.vibe} ${stop.timing}` : stop.vibe,
            i === 0,
            stop.detailId,
          );

          if (i < preciseStops.length - 1) {
            await delay(280);
            const minutes = usePreciseBase ? (i + 1) * 5 + 3 : (i + 1) * 6 + 4;
            const distance = usePreciseBase
              ? (i + 1) * 350 + 150
              : (i + 1) * 450 + 200;
            addTrack(`${minutes} min · ${distance}m walk`);
          }
          await delay(360);
        }

        const summary = displayAiCopy(planResult.payload?.summary);
        const assistantCopy = displayAiCopy(ai.assistantMessage);
        if (summary && summary !== assistantCopy) {
          addBubble("ai", summary);
          await delay(180);
        }

        addSeeRouteButton(preciseStops);
        await delay(200);
        addPills(ai.suggestedPills);
      }

        if (/free|cheap|\$/.test(text) && !/\$\$/.test(text)) return "$";
        if (/special|premium|splurge|\$\$\$/.test(text)) return "$$$";
        if (/mid|comfortable|reasonable|\$\$/.test(text)) return "$$";
        return "";

      function askBudgetBeforeSurprise(queryText, userLabel = "Surprise me") {
        chatBody.innerHTML = "";
        pendingBudgetIntent = { query: queryText, mode: "surprise" };
        addBubble("user", userLabel);
        addBubble(
          "ai",
          "Before I surprise you, what budget should I respect for this outing?",
        );
        addPills([
          "Keep it free or cheap",
          "Comfortable mid-range",
          "Make it special",
        ]);
      }

      async function runConversation(userText) {
        // Clear chat body
        chatBody.innerHTML = "";

        // If starting fresh (opening default chat window)
        if (!userText) {
          activityContext = getActivityContext();
          addBubble(
            "ai",
            `hey there. i can build something that fits ${activityContext.label} in ${city}, check local showtimes, or recommend food nearby.`,
          );
          addPills(["Build my plan", "Recommend food", "Show movie times"]);
          return;
        }

        // Add user bubble
        addBubble("user", userText);
        await delay(500);
        addTyping();
        await presentSmartPlan(userText, 4, "chat", true);
      }

      /* ── Pill tap handler ── */
      let pillBusy = false;
      async function handlePillTap(btn) {
        if (pillBusy) return;
        pillBusy = true;

        btn.classList.add("tapped");
        const text = btn.textContent;
        addBubble("user", text);

        await delay(400);
        addTyping();

        const selectedBudget = budgetFromLabel(text);
        if (pendingBudgetIntent && selectedBudget) {
          setBudgetPreference(selectedBudget);
          const intent = pendingBudgetIntent;
          pendingBudgetIntent = null;
          await presentSmartPlan(
            `${intent.query} budget ${selectedBudget}`,
            4,
            intent.mode,
            true,
          );
          pillBusy = false;
          return;
        }

        if (/change budget/i.test(text)) {
          removeTyping();
          askBudgetBeforeSurprise(
            activityContext.defaultQuery,
            "Change budget",
          );
          pillBusy = false;
          return;
        }

        if (/clear route|start over/i.test(text)) {
          await delay(300);
          removeTyping();
          addBubble("ai", "Tell me what you want to do next.");
          await delay(200);
          addPills(["Food nearby", "Events tonight", "Surprise me"]);
          pillBusy = false;
          return;
        }

        if (/make it cheaper/i.test(text)) {
          setBudgetPreference("$");
        }

        const queryForPill =
          text === "Build my plan"
            ? activityContext.defaultQuery
            : text === "Recommend food"
              ? `food nearby in ${city}`
              : text === "Show movie times"
                ? `movie times and a simple plan near ${city}`
                : text === "Try again"
                  ? activityContext.defaultQuery
                  : text;
        await presentSmartPlan(
          queryForPill,
          /one stop|shorter/i.test(text) ? 1 : /third|food/i.test(text) ? 3 : 4,
          /surprise|something else/i.test(text) ? "surprise" : "build_plan",
          true,
        );

        pillBusy = false;
      }

      async function sendFollowUp(text) {
        addBubble("user", text);
        await delay(500);
        addTyping();
        await presentSmartPlan(text, 4, "chat", true);
      }

      /* ── Chat input submit ── */
      function handleChatSend() {
        const text = chatInput.value.trim();
        if (!text) return;
        chatInput.value = "";
        sendFollowUp(text);
      }

      chatSend.addEventListener("click", handleChatSend);
      chatInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          handleChatSend();
        }
      });

      /* ── Form / button triggers ── */
      document.getElementById("plan-form").addEventListener("submit", (e) => {
        e.preventDefault();
        const q =
          document.getElementById("plan-query").value.trim() ||
          activityContext.defaultQuery;
        openChat(q);
      });

      document.getElementById("surprise").addEventListener("click", () => {
        overlay.classList.add("open");
        document.body.classList.add("chat-open");
        askBudgetBeforeSurprise(
          "honestly just need to get out of the house",
          "Surprise me",
        );
      });

      /* ── Nav plan link ── */
      document.getElementById("nav-plan").addEventListener("click", (e) => {
        e.preventDefault();
        document.getElementById("plan-query").focus();
      });

      /* ── Module card actions ── */
      document.querySelectorAll("[data-action]").forEach((button) => {
        button.addEventListener("click", () => {
          const action = button.dataset.action;
          if (action === "nearby") {
            openChat("what's good and open near me right now");
          } else if (action === "date") {
            openChat("plan a date route worth remembering");
          } else if (action === "tickets") {
            openChat("any good shows or events with seats available");
          } else if (action === "crew") {
            openChat("need a plan my friends will actually agree on");
          }
        });
      });
    </script>
  </body>
</html>
