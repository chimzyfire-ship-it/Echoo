<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>echoo app</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #080907;
        --panel: #11130f;
        --panel-2: #191b15;
        --ink: #f5f1e8;
        --muted: #a8a397;
        --dim: #706c62;
        --line: rgba(245, 241, 232, 0.13);
        --line-strong: rgba(245, 241, 232, 0.28);
        --signal: #e7c98e;
        --rose: #d8a2d9;
        --clay: #c87952;
        --blue: #91a7ff;
        --shadow: 0 24px 70px rgba(0, 0, 0, 0.42);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background:
          linear-gradient(90deg, rgba(245,241,232,0.035) 1px, transparent 1px) 0 0 / 34px 34px,
          radial-gradient(circle at 84% 0%, rgba(145,167,255,0.12), transparent 26rem),
          radial-gradient(circle at 8% 40%, rgba(216,255,95,0.08), transparent 20rem),
          var(--bg);
      }

      a { color: inherit; text-decoration: none; }
      button, input, select { font: inherit; }

      /* ── Topbar ── */
      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 18px;
        border-bottom: 1px solid var(--line);
        background: rgba(8, 9, 7, 0.94);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-weight: 950;
        font-size: 26px;
        letter-spacing: -0.05em;
      }

      .brand img {
        width: 44px;
        height: 44px;
        border: 1px solid var(--line);
        border-radius: 18px;
        object-fit: cover;
        object-position: 50% 0%;
      }

      .avatar {
        width: 42px;
        height: 42px;
        border: 1px solid var(--line-strong);
        border-radius: 50%;
        display: grid;
        place-items: center;
        color: #151311;
        background: linear-gradient(135deg, #e4bd78 0%, #f2ddb0 42%, var(--rose) 100%);
        font-size: 13px;
        font-weight: 950;
      }

      /* ── Shell ── */
      .shell {
        width: min(1160px, 100%);
        margin: 0 auto;
        padding: 18px 18px 106px;
      }

      /* ── Welcome ── */
      .welcome {
        display: grid;
        gap: 18px;
        padding: 22px 0;
      }

      .kicker {
        color: var(--signal);
        font-size: 12px;
        font-weight: 950;
        letter-spacing: 0.15em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(44px, 13vw, 92px);
        line-height: 0.88;
        letter-spacing: -0.075em;
      }

      .welcome p {
        margin: 0;
        max-width: 690px;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.45;
        font-weight: 650;
      }

      /* ── News Bubble Slider ── */
      .news-carousel-wrap {
        margin: 8px 0 20px;
        overflow: hidden;
        position: relative;
        width: 100%;
      }

      .news-carousel-wrap::before,
      .news-carousel-wrap::after {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 30px;
        z-index: 2;
        content: "";
        pointer-events: none;
      }
      .news-carousel-wrap::before {
        left: 0;
        background: linear-gradient(90deg, var(--bg) 0%, transparent 100%);
      }
      .news-carousel-wrap::after {
        right: 0;
        background: linear-gradient(-90deg, var(--bg) 0%, transparent 100%);
      }

      .news-slider {
        display: flex;
        overflow-x: auto;
        scrollbar-width: none;
        -ms-overflow-style: none;
        cursor: grab;
        user-select: none;
      }
      .news-slider::-webkit-scrollbar {
        display: none;
      }
      .news-slider:active {
        cursor: grabbing;
      }

      .news-track {
        display: flex;
        gap: 10px;
        padding: 4px 8px;
      }

      .news-card {
        flex: 0 0 auto;
        height: 60px;
        padding: 6px 12px 6px 6px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        border-radius: 4px;
        border: 1px solid var(--line);
        background: var(--panel);
        transition: border-color 180ms ease, background-color 180ms ease;
      }

      .news-card:hover {
        border-color: var(--signal);
        background-color: var(--panel-2);
      }

      .news-card img {
        width: 48px;
        height: 48px;
        object-fit: cover;
        border-radius: 2px;
        flex-shrink: 0;
      }

      .news-card .news-info {
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 2px;
        text-align: left;
      }

      .news-card .tag {
        color: var(--signal);
        font-size: 10px;
        font-weight: 950;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .news-card .headline {
        color: var(--muted);
        font-size: 13px;
        font-weight: 750;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 260px;
        transition: color 180ms ease;
      }

      .news-card:hover .headline {
        color: var(--ink);
      }

      /* ── Ask card ── */
      .ask-card {
        display: grid;
        gap: 12px;
        padding: 14px;
        border: 1px solid var(--line);
        background: rgba(17, 19, 15, 0.9);
        box-shadow: var(--shadow);
      }

      .ask-card form {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }

      input, select {
        min-height: 58px;
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 0;
        outline: 0;
        background: rgba(8, 9, 7, 0.78);
        color: var(--ink);
        padding: 0 15px;
        font-weight: 750;
      }

      input:focus, select:focus { border-color: var(--signal); }

      .primary,
      .ghost {
        min-height: 58px;
        border: 1px solid var(--line);
        border-radius: 0;
        cursor: pointer;
        font-weight: 950;
        letter-spacing: -0.03em;
        transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
      }

      .primary {
        color: #10110e;
        background: linear-gradient(135deg, #e4bd78 0%, #f2ddb0 42%, var(--rose) 100%);
        border-color: transparent;
      }

      .ghost {
        color: var(--ink);
        background: rgba(245, 241, 232, 0.04);
      }

      .primary:hover,
      .ghost:hover {
        transform: translateY(-2px);
        border-color: var(--line-strong);
      }

      /* ── Module grid ── */
      .grid {
        display: grid;
        gap: 12px;
        margin-top: 18px;
      }

      .module {
        position: relative;
        min-height: 152px;
        padding: 16px;
        border: 1px solid var(--line);
        background: rgba(17, 19, 15, 0.84);
        overflow: hidden;
        transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
      }

      .module:hover {
        transform: translateY(-3px);
        border-color: var(--line-strong);
        background: rgba(25, 27, 21, 0.94);
      }

      .module::after {
        content: "";
        position: absolute;
        inset: auto 16px 16px auto;
        width: 54px;
        height: 1px;
        background: var(--signal);
      }

      .module strong {
        display: block;
        margin-bottom: 10px;
        font-size: 24px;
        line-height: 0.98;
        letter-spacing: -0.055em;
      }

      .module p {
        margin: 0;
        color: var(--muted);
        line-height: 1.4;
        font-size: 14px;
        font-weight: 650;
      }

      .module small {
        display: block;
        margin-bottom: 26px;
        color: var(--dim);
        font-size: 11px;
        font-weight: 950;
        letter-spacing: 0.13em;
        text-transform: uppercase;
      }

      /* ── Bottom nav ── */
      .bottom-nav {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 30;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        border-top: 1px solid var(--line);
        background: rgba(8, 9, 7, 0.96);
        transition: transform 260ms ease;
      }

      .bottom-nav a {
        display: grid;
        place-items: center;
        min-height: 68px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 850;
      }

      .bottom-nav a.active { color: var(--signal); }

      body.chat-open .bottom-nav { transform: translateY(100%); }

      /* ── Chat overlay ── */
      .chat-overlay {
        position: fixed;
        inset: 0;
        z-index: 40;
        display: flex;
        flex-direction: column;
        background: var(--bg);
        opacity: 0;
        pointer-events: none;
        transition: opacity 220ms ease;
      }

      .chat-overlay.open {
        opacity: 1;
        pointer-events: auto;
      }

      /* Chat header */
      .chat-header {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 14px 18px;
        border-bottom: 1px solid var(--line);
        background: rgba(8, 9, 7, 0.94);
      }

      .chat-close {
        width: 42px;
        height: 42px;
        border: 1px solid var(--line);
        border-radius: 0;
        background: transparent;
        color: var(--ink);
        font-size: 18px;
        font-weight: 950;
        cursor: pointer;
        display: grid;
        place-items: center;
        transition: border-color 180ms ease;
        flex-shrink: 0;
      }

      .chat-close:hover { border-color: var(--line-strong); }

      .chat-header-title {
        font-size: 14px;
        font-weight: 850;
        letter-spacing: -0.02em;
        color: var(--muted);
      }

      /* Chat body (scrollable) */
      .chat-body {
        flex: 1 1 0;
        overflow-y: auto;
        padding: 20px 16px 20px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
      }

      /* Bubbles */
      .bubble {
        max-width: 85%;
        padding: 14px 16px;
        font-size: 16px;
        line-height: 1.45;
        animation: bubbleIn 260ms ease both;
      }

      @keyframes bubbleIn {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .bubble.user {
        align-self: flex-end;
        max-width: 78%;
        background: linear-gradient(135deg, #e4bd78 0%, #f2ddb0 42%, var(--rose) 100%);
        color: #151311;
        font-weight: 750;
        border-radius: 2px 0 0 0;
      }

      .bubble.ai {
        align-self: flex-start;
        background: var(--panel);
        color: var(--ink);
        border: 1px solid var(--line);
        font-weight: 650;
        border-radius: 0;
      }

      /* Typing indicator */
      .typing {
        align-self: flex-start;
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 14px 18px;
        background: var(--panel);
        border: 1px solid var(--line);
        animation: bubbleIn 200ms ease both;
      }

      .typing-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--dim);
        animation: dotPulse 1.1s ease-in-out infinite;
      }

      .typing-dot:nth-child(2) { animation-delay: 150ms; }
      .typing-dot:nth-child(3) { animation-delay: 300ms; }

      @keyframes dotPulse {
        0%, 100% { opacity: 0.3; }
        50%      { opacity: 1; }
      }

      /* Location card */
      .loc-card {
        align-self: stretch;
        border: 1px solid var(--line);
        overflow: hidden;
        animation: bubbleIn 300ms ease both;
        position: relative;
      }

      .loc-card.hot {
        border-left: 3px solid var(--signal);
      }

      .loc-card picture,
      .loc-card img {
        display: block;
        width: 100%;
        height: 160px;
        object-fit: cover;
      }

      .loc-card-body {
        padding: 14px 16px 18px;
      }

      .loc-card-hot {
        display: inline-block;
        padding: 4px 10px;
        margin-bottom: 10px;
        border: 1px solid rgba(231, 201, 142, 0.3);
        background: rgba(231, 201, 142, 0.08);
        color: var(--signal);
        font-size: 10px;
        font-weight: 950;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .loc-card-tags {
        color: var(--signal);
        font-size: 11px;
        font-weight: 950;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin-bottom: 8px;
      }

      .loc-card-name {
        font-size: 20px;
        font-weight: 950;
        letter-spacing: -0.04em;
        line-height: 1.1;
        margin-bottom: 8px;
      }

      .loc-card-vibe {
        color: var(--muted);
        font-size: 14px;
        font-weight: 650;
        line-height: 1.4;
      }

      /* Connecting track */
      .track {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
        padding: 2px 0;
        align-self: stretch;
        animation: bubbleIn 240ms ease both;
      }

      .track-line {
        width: 2px;
        height: 18px;
        background: repeating-linear-gradient(
          to bottom,
          rgba(231, 201, 142, 0.4) 0px,
          rgba(231, 201, 142, 0.4) 4px,
          transparent 4px,
          transparent 8px
        );
      }

      .track-label {
        padding: 4px 12px;
        font-size: 11px;
        font-weight: 850;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--dim);
      }

      /* Quick action pills */
      .pills {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding-bottom: 4px;
        -webkit-overflow-scrolling: touch;
        animation: bubbleIn 200ms ease both;
      }

      .pills::-webkit-scrollbar { display: none; }

      .pill {
        flex: 0 0 auto;
        padding: 10px 16px;
        border: 1px solid var(--line);
        border-radius: 100px;
        background: transparent;
        color: var(--muted);
        font-size: 12px;
        font-weight: 850;
        letter-spacing: -0.01em;
        cursor: pointer;
        white-space: nowrap;
        transition: border-color 180ms ease, color 180ms ease;
      }

      .pill:hover,
      .pill:active {
        border-color: var(--signal);
        color: var(--ink);
      }

      .pill.tapped {
        border-color: var(--signal);
        color: var(--signal);
      }

      /* Chat input bar */
      .chat-input-bar {
        flex: 0 0 auto;
        display: flex;
        gap: 8px;
        padding: 12px 16px;
        border-top: 1px solid var(--line);
        background: rgba(8, 9, 7, 0.96);
      }

      .chat-input-bar input {
        flex: 1;
        min-height: 48px;
        font-size: 15px;
      }

      .chat-send {
        flex: 0 0 auto;
        min-height: 48px;
        padding: 0 20px;
        border: 1px solid transparent;
        border-radius: 0;
        background: linear-gradient(135deg, #e4bd78 0%, #f2ddb0 42%, var(--rose) 100%);
        color: #10110e;
        font-weight: 950;
        font-size: 14px;
        letter-spacing: -0.02em;
        cursor: pointer;
        transition: transform 180ms ease;
      }

      .chat-send:hover { transform: translateY(-1px); }

      /* ── Responsive ── */
      @media (min-width: 760px) {
        .shell { padding: 28px 28px 60px; }
        .welcome {
          grid-template-columns: 1fr 410px;
          align-items: end;
          padding: 54px 0 30px;
        }
        .ask-card { align-self: stretch; }
        .ask-card form { grid-template-columns: 1fr auto; align-items: end; }
        .grid { grid-template-columns: repeat(4, 1fr); }
        .bottom-nav { display: none; }

        .chat-body { padding: 28px 24px; }
        .chat-input-bar { padding: 14px 24px; }
        .bubble, .loc-card { max-width: 520px; }
        .bubble.user { max-width: 420px; }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="index.html">
        <img src="assets/echoo-new-logo.jpg" alt="">
        <span>echoo</span>
      </a>
      <div class="avatar" id="avatar">PU</div>
    </header>

    <main class="shell" id="dashboard">
      <section class="welcome">
        <div>
          <div class="kicker">Powered by AI</div>
          <h1 id="headline">What are you in the mood for?</h1>
          <p id="subhead">Tell us what you're feeling. Echoo finds the places, plans the route, and connects the dots.</p>
        </div>

        <!-- News Carousel Section -->
        <div class="news-carousel-wrap">
          <div class="news-slider" id="news-slider">
            <div class="news-track" id="news-track"></div>
          </div>
        </div>

        <div class="ask-card">
          <form id="plan-form">
            <input id="plan-query" placeholder="feeling low and need a pick-me-up..." />
            <button class="primary" type="submit">Find my night</button>
          </form>
          <button class="ghost" id="surprise">Surprise me</button>
        </div>
      </section>

      <section class="grid" aria-label="Quick actions">
        <button class="module" data-action="nearby">
          <small>Nearby</small>
          <strong>What's open around me</strong>
          <p>Real places within walking distance, filtered by what's actually open right now.</p>
        </button>
        <button class="module" data-action="date">
          <small>Date night</small>
          <strong>Plan something worth remembering</strong>
          <p>Dinner, an experience, and a backup spot — all connected and timed.</p>
        </button>
        <button class="module" data-action="tickets">
          <small>Tickets</small>
          <strong>Lock in the good seats</strong>
          <p>Events, shows, and screenings with availability right now.</p>
        </button>
        <button class="module" data-action="crew">
          <small>Group plan</small>
          <strong>Get everyone to say yes</strong>
          <p>Share a short list your friends can vote on instead of another group chat.</p>
        </button>
      </section>
    </main>

    <!-- Chat overlay -->
    <div class="chat-overlay" id="chat-overlay">
      <div class="chat-header">
        <button class="chat-close" id="chat-close" aria-label="Close chat">&#x2715;</button>
        <span class="chat-header-title">echoo is thinking with you</span>
      </div>
      <div class="chat-body" id="chat-body"></div>
      <div class="chat-input-bar">
        <input type="text" id="chat-input" placeholder="say more..." />
        <button class="chat-send" id="chat-send">Send</button>
      </div>
    </div>

    <nav class="bottom-nav" aria-label="Primary">
      <a class="active" href="app.html">Home</a>
      <a href="events.html">Explore</a>
      <a href="#" id="nav-plan">Plan</a>
      <a href="index.html">Exit</a>
    </nav>

    <script>
      /* Diagnostic logger for redirects */
      window.addEventListener('beforeunload', () => {
        const history = JSON.parse(sessionStorage.getItem('echoo_unload_log') || '[]');
        history.push({ time: new Date().toISOString(), url: window.location.href, stack: new Error().stack });
        sessionStorage.setItem('echoo_unload_log', JSON.stringify(history.slice(-10)));
      });

      /* ── Preferences retrieval ── */
      const params = new URLSearchParams(window.location.search);
      let name = params.get("name");
      let city = params.get("city");
      let vibes = params.get("vibes");
      let budget = params.get("budget");
      let energy = params.get("energy");
      let tone = params.get("tone");

      if (!name) {
        const stored = localStorage.getItem("echoo_preferences");
        if (stored) {
          try {
            const prefs = JSON.parse(stored);
            name = prefs.name;
            city = prefs.city;
            vibes = prefs.vibes;
            budget = prefs.budget;
            energy = prefs.energy;
            tone = prefs.tone;
          } catch (e) {}
        }
      }

      name = name || "Preview User";
      city = city || "Toronto";
      vibes = vibes ? vibes.split(",") : [];
      budget = budget || "$";
      energy = energy || "chill";
      tone = tone || "direct";

      /* ── Set up name / avatar ── */
      const initials = name.split(" ").filter(Boolean).map((p) => p[0]).join("").slice(0, 2).toUpperCase() || "PU";
      document.getElementById("avatar").textContent = initials;
      const firstName = name.split(" ")[0] || "You";

      /* ── Customize Dashboard copy based on Onboarding ── */
      const headlineEl = document.getElementById("headline");
      const subheadEl = document.getElementById("subhead");
      
      let customHeadline = `${firstName}, what are you in the mood for?`;
      let customSubhead = `Tailoring plans for your vibe in ${city}.`;

      if (vibes.length > 0) {
        const firstVibe = vibes[0].toLowerCase();
        if (energy === "hype") {
          customHeadline = `${firstName}, ready for a high-energy night?`;
          customSubhead = `Finding loud spots, sports bars, or active crawls in ${city} matching "${firstVibe}".`;
        } else if (energy === "chill") {
          customHeadline = `${firstName}, keeping it relaxed tonight?`;
          customSubhead = `Curating cozy lounge spots, acoustic sets, or quiet dates in ${city} matching "${firstVibe}".`;
        } else {
          customHeadline = `${firstName}, what sounds good in ${city}?`;
          customSubhead = `Exploring interesting, spontaneous ideas matching "${firstVibe}" for you.`;
        }
      } else {
        if (energy === "hype") {
          customHeadline = `${firstName}, what's the move tonight?`;
          customSubhead = `Tracking high-energy live shows, events, and late-night spots in ${city}.`;
        } else if (energy === "chill") {
          customHeadline = `${firstName}, looking to unwind?`;
          customSubhead = `Finding cozy date spots, hidden bars, and quiet listening rooms in ${city}.`;
        }
      }
      headlineEl.textContent = customHeadline;
      subheadEl.textContent = customSubhead;

      // Customize Grid Cards based on onboarding preferences
      const cards = document.querySelectorAll(".grid .module");
      if (cards.length >= 4) {
        // Card 1: Nearby
        const nearbyStrong = cards[0].querySelector("strong");
        const nearbyP = cards[0].querySelector("p");
        if (nearbyStrong && nearbyP) {
          nearbyStrong.textContent = `Open near you in ${city}`;
          nearbyP.textContent = `Places within walking distance. Budget comfort: ${budget}.`;
        }

        // Card 2: Date Night
        const dateStrong = cards[1].querySelector("strong");
        const dateP = cards[1].querySelector("p");
        if (dateStrong && dateP) {
          if (vibes.includes("Cozy date spots")) {
            dateStrong.textContent = "Your Curated Date Night";
            dateP.textContent = `Cozy date itineraries in ${city} tailored to ${energy} energy.`;
          } else {
            dateStrong.textContent = "Custom Date Route";
            dateP.textContent = `Dinner, an experience, and a fallback — all matched to ${energy} vibes.`;
          }
        }

        // Card 3: Tickets
        const ticketsStrong = cards[2].querySelector("strong");
        const ticketsP = cards[2].querySelector("p");
        if (ticketsStrong && ticketsP) {
          let ticketTopic = "live concerts";
          if (vibes.includes("Late-night cinema")) ticketTopic = "cinema screenings";
          else if (vibes.includes("Sports")) ticketTopic = "sports events";
          else if (vibes.includes("Art & galleries")) ticketTopic = "gallery exhibitions";
          
          ticketsStrong.textContent = `Available slots in ${city}`;
          ticketsP.textContent = `Lock in tickets for nearby ${ticketTopic} that fit your budget.`;
        }

        // Card 4: Group plan
        const crewStrong = cards[3].querySelector("strong");
        if (crewStrong) {
          crewStrong.textContent = `Group invite for ${city}`;
        }
      }

      /* ── News Slider Database ── */
      const localNewsDb = {
        "Toronto": [
          { tag: "TIFF", text: "Midnight Madness lineups announced for September", img: "https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?auto=format&fit=crop&w=120&q=80" },
          { tag: "Patio", text: "Kensington Market tests weekend pedestrian-only zones", img: "https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?auto=format&fit=crop&w=120&q=80" },
          { tag: "Jazz", text: "Queen West jazz club hosts unannounced late basement set", img: "https://images.unsplash.com/photo-1486591978090-58e619d37fe7?auto=format&fit=crop&w=120&q=80" },
          { tag: "Food", text: "Ossington street crawl reveals new underground ramen spot", img: "https://images.unsplash.com/photo-1569718212165-3a8278d5f624?auto=format&fit=crop&w=120&q=80" },
          { tag: "Sports", text: "Scotiabank Arena hosts outdoor pre-game rally tonight", img: "https://images.unsplash.com/photo-1508098682722-e99c43a406b2?auto=format&fit=crop&w=120&q=80" },
          { tag: "Rooftop", text: "Broadview Hotel opens winterized rooftop deck early for sunset", img: "https://images.unsplash.com/photo-1570126688111-97771e19412a?auto=format&fit=crop&w=120&q=80" }
        ],
        "Vancouver": [
          { tag: "Beach", text: "Kitsilano beach bonfire permits extended for summer weekends", img: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=120&q=80" },
          { tag: "Theatre", text: "Granville Island waterfront stage premieres new indie play", img: "https://images.unsplash.com/photo-1503095396549-807759245b35?auto=format&fit=crop&w=120&q=80" },
          { tag: "Cocktails", text: "Gastown lounge rated top 50 in North America for mixology", img: "https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?auto=format&fit=crop&w=120&q=80" },
          { tag: "Ride", text: "Stanley Park night cycle ride draws record five hundred riders", img: "https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&w=120&q=80" },
          { tag: "Food", text: "Richmond Night Market expands late fusion food stands", img: "https://images.unsplash.com/photo-1563245372-f21724e3856d?auto=format&fit=crop&w=120&q=80" }
        ],
        "Montreal": [
          { tag: "Jazz", text: "Montreal Jazz Fest reveals free outdoor street show lineup", img: "https://images.unsplash.com/photo-1511192336575-5a79af67a629?auto=format&fit=crop&w=120&q=80" },
          { tag: "Bagels", text: "Mile End food crawl introduces late-night wood-fired bakery", img: "https://images.unsplash.com/photo-1509440159596-0249088772ff?auto=format&fit=crop&w=120&q=80" },
          { tag: "Art", text: "Plateau Mont-Royal street art murals expand down Saint-Laurent", img: "https://images.unsplash.com/photo-156121318594-a4f657f68c17?auto=format&fit=crop&w=120&q=80" },
          { tag: "Speakeasy", text: "Old Montreal speakeasy hidden behind vintage phone booth", img: "https://images.unsplash.com/photo-1498654896293-37aacf113fd9?auto=format&fit=crop&w=120&q=80" },
          { tag: "Music", text: "Saint-Denis underground electronic gig sells out in record minutes", img: "https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?auto=format&fit=crop&w=120&q=80" }
        ]
      };

      const worldNews = [
        { tag: "Outdoor", text: "National parks report massive surge in summer night hikers", img: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=120&q=80" },
        { tag: "Gaming", text: "Indie retro arcades and console lounges trending globally", img: "https://images.unsplash.com/photo-1538481199705-c710c4e965fc?auto=format&fit=crop&w=120&q=80" },
        { tag: "Coffee", text: "Slow-drip specialty coffee crawls taking over urban neighborhoods", img: "https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&w=120&q=80" },
        { tag: "Concert", text: "Major outdoor music festival tours announce carbon-neutral lineups", img: "https://images.unsplash.com/photo-1470229722913-7c0e2dbbafd3?auto=format&fit=crop&w=120&q=80" },
        { tag: "Museum", text: "Historic virtual-reality exhibitions open globally at science centers", img: "https://images.unsplash.com/photo-1566121318594-a4f657f68c17?auto=format&fit=crop&w=120&q=80" }
      ];

      // Populate mixed news: alternating local and world news
      const cityList = localNewsDb[city] || localNewsDb["Toronto"];
      const mixedNews = [];
      const maxLen = Math.max(cityList.length, worldNews.length);
      for (let i = 0; i < maxLen; i++) {
        if (i < cityList.length) mixedNews.push(cityList[i]);
        if (i < worldNews.length) mixedNews.push(worldNews[i]);
      }

      const newsTrack = document.getElementById("news-track");
      if (newsTrack) {
        const displayNews = [...mixedNews, ...mixedNews];
        newsTrack.innerHTML = displayNews.map(item => `
          <div class="news-card">
            <img src="${item.img}" alt="" loading="lazy">
            <div class="news-info">
              <span class="tag">${item.tag}</span>
              <span class="headline">${item.text}</span>
            </div>
          </div>
        `).join("");
      }

      // Marquee slider functionality
      const slider = document.getElementById("news-slider");
      let scrollSpeed = 0.45;
      let autoScrollActive = true;
      let interactionTimeout;

      function step() {
        if (autoScrollActive && slider) {
          slider.scrollLeft += scrollSpeed;
          if (slider.scrollLeft >= slider.scrollWidth / 2) {
            slider.scrollLeft = 0;
          }
        }
        requestAnimationFrame(step);
      }

      function resetAutoScroll() {
        autoScrollActive = false;
        clearTimeout(interactionTimeout);
        interactionTimeout = setTimeout(() => {
          autoScrollActive = true;
        }, 4000);
      }

      if (slider) {
        slider.addEventListener("mousedown", () => autoScrollActive = false);
        slider.addEventListener("touchstart", () => autoScrollActive = false);
        slider.addEventListener("scroll", resetAutoScroll);

        let isDown = false;
        let startX;
        let scrollLeftVal;
        slider.addEventListener("mousedown", (e) => {
          isDown = true;
          startX = e.pageX - slider.offsetLeft;
          scrollLeftVal = slider.scrollLeft;
        });
        slider.addEventListener("mouseleave", () => isDown = false);
        slider.addEventListener("mouseup", () => isDown = false);
        slider.addEventListener("mousemove", (e) => {
          if (!isDown) return;
          e.preventDefault();
          const x = e.pageX - slider.offsetLeft;
          const walk = (x - startX) * 1.5;
          slider.scrollLeft = scrollLeftVal - walk;
        });

        requestAnimationFrame(step);
      }

      /* ── DOM refs ── */
      const overlay  = document.getElementById("chat-overlay");
      const chatBody = document.getElementById("chat-body");
      const chatInput = document.getElementById("chat-input");
      const chatSend  = document.getElementById("chat-send");

      /* ── Chat helpers ── */
      function scrollChat() {
        chatBody.scrollTo({ top: chatBody.scrollHeight, behavior: "smooth" });
      }

      function addBubble(type, text) {
        const el = document.createElement("div");
        el.className = `bubble ${type}`;
        el.textContent = text;
        chatBody.appendChild(el);
        scrollChat();
        return el;
      }

      function addTyping() {
        const el = document.createElement("div");
        el.className = "typing";
        el.id = "typing-current";
        el.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
        chatBody.appendChild(el);
        scrollChat();
        return el;
      }

      function removeTyping() {
        const el = document.getElementById("typing-current");
        if (el) el.remove();
      }

      function addLocationCard(img, imgWebp, placeName, tags, vibe, hot) {
        const card = document.createElement("div");
        card.className = hot ? "loc-card hot" : "loc-card";
        const hotBadge = hot ? '<div class="loc-card-hot">Trending now</div>' : '';
        card.innerHTML = `
          <picture>
            <source srcset="${imgWebp}" type="image/webp">
            <img src="${img}" alt="${placeName}" loading="lazy" decoding="async">
          </picture>
          <div class="loc-card-body">
            ${hotBadge}
            <div class="loc-card-tags">${tags}</div>
            <div class="loc-card-name">${placeName}</div>
            <div class="loc-card-vibe">${vibe}</div>
          </div>`;
        chatBody.appendChild(card);
        scrollChat();
      }

      function addTrack(label) {
        const el = document.createElement("div");
        el.className = "track";
        el.innerHTML = `<div class="track-line"></div><div class="track-label">${label}</div><div class="track-line"></div>`;
        chatBody.appendChild(el);
        scrollChat();
      }

      function addPills(labels) {
        const wrap = document.createElement("div");
        wrap.className = "pills";
        labels.forEach((text) => {
          const btn = document.createElement("button");
          btn.className = "pill";
          btn.textContent = text;
          btn.addEventListener("click", () => handlePillTap(btn));
          wrap.appendChild(btn);
        });
        chatBody.appendChild(wrap);
        scrollChat();
      }

      /* ── Open / close ── */
      function openChat(userText) {
        chatBody.innerHTML = "";
        overlay.classList.add("open");
        document.body.classList.add("chat-open");
        runConversation(userText);
      }

      function closeChat() {
        overlay.classList.remove("open");
        document.body.classList.remove("chat-open");
      }

      document.getElementById("chat-close").addEventListener("click", closeChat);

      /* ── Simulated conversation ── */
      function delay(ms) {
        return new Promise((r) => setTimeout(r, ms));
      }

      async function runConversation(userText) {
        /* 1. User bubble */
        addBubble("user", userText);

        /* 2. Typing */
        await delay(600);
        addTyping();

        /* Determine locations and copy dynamically */
        let loc1Name = "The Listening Room";
        let loc1Tags = `Live jazz · Kensington · Open now`;
        let loc1Vibe = "Dimly lit, vinyl-forward, seats at the bar";
        
        let loc2Name = "Late Kitchen on Dundas";
        let loc2Tags = `Comfort food · Open til 2am · ${budget}`;
        let loc2Vibe = "Counter seats, soft playlist, no reservations needed";
        let trackDistance = "12 min · 850m walk";

        if (city === "Vancouver") {
          loc1Name = "The Granville Lounge";
          loc1Tags = `Vinyl sets · Gastown · Open now`;
          loc2Name = "West Coast Bites on Davie";
          loc2Tags = `Local eats · Open til 1am · ${budget}`;
          trackDistance = "15 min · 1.1km walk";
        } else if (city === "Montreal") {
          loc1Name = "Café Saint-Denis";
          loc1Tags = `Acoustic sets · Plateau · Open now`;
          loc2Name = "Late Crepes on Saint-Laurent";
          loc2Tags = `Late snacks · Open til 3am · ${budget}`;
          trackDistance = "9 min · 650m walk";
        }

        // Adjust vibes based on energy choice
        if (energy === "hype") {
          loc1Vibe = "Upbeat crowd, loud speakers, standing space only";
          loc2Vibe = "Bustling open kitchen, lively playlist, high energy";
        } else if (energy === "chill") {
          loc1Vibe = "Dimly lit, low volume, quiet cozy booths";
          loc2Vibe = "Intimate counter seats, mellow playlist, relaxed spacing";
        } else if (energy === "curious") {
          loc1Vibe = "Secret entrance, unexpected decor, rare vinyl selection";
          loc2Vibe = "Rotating chef specials, eclectic setup, interactive kitchen";
        }

        // AI intro copy based on tone and energy
        let aiIntro = "i hear you. let’s start easy — there’s a spot that’s been getting a lot of love lately.";
        let aiOutro = "two stops, low effort, good energy. want me to adjust anything?";

        if (tone === "direct") {
          aiIntro = "got it. here's a solid 2-stop route that fits.";
          aiOutro = "fits the vibe. should I swap anything?";
        } else {
          // detailed
          aiIntro = `understood. since you're looking for a ${energy} speed in ${city}, i've mapped out a seamless pair of locations. let's start with a vinyl-focused anchor.`;
          aiOutro = `both spots align with your ${budget} budget preference and have verified seating available right now. let me know if you want to swap the order or add a third stop.`;
        }

        /* 3. AI response */
        await delay(1200);
        removeTyping();
        addBubble("ai", aiIntro);

        /* 4. Location card 1 */
        await delay(400);
        addLocationCard(
          "assets/optimized/news-music-768.jpg",
          "assets/optimized/news-music-768.webp",
          loc1Name,
          loc1Tags,
          loc1Vibe,
          true
        );

        /* 5. Connecting track */
        await delay(300);
        addTrack(trackDistance);

        /* 6. Location card 2 */
        await delay(400);
        addLocationCard(
          "assets/optimized/news-date-768.jpg",
          "assets/optimized/news-date-768.webp",
          loc2Name,
          loc2Tags,
          loc2Vibe
        );

        /* 7. AI follow-up */
        await delay(500);
        addBubble("ai", aiOutro);

        /* 8. Quick action pills */
        await delay(200);
        addPills(["Make it cheaper", "Add a third stop", "Show me something else"]);
      }

      /* ── Pill tap handler ── */
      let pillBusy = false;
      async function handlePillTap(btn) {
        if (pillBusy) return;
        pillBusy = true;

        btn.classList.add("tapped");
        addBubble("user", btn.textContent);

        await delay(400);
        addTyping();

        await delay(1000);
        removeTyping();
        addBubble("ai", "got it \u2014 here\u2019s another angle.");

        pillBusy = false;
      }

      /* ── Chat input submit ── */
      function handleChatSend() {
        const text = chatInput.value.trim();
        if (!text) return;
        chatInput.value = "";
        sendFollowUp(text);
      }

      chatSend.addEventListener("click", handleChatSend);
      chatInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") { e.preventDefault(); handleChatSend(); }
      });

      async function sendFollowUp(text) {
        addBubble("user", text);
        await delay(500);
        addTyping();
        await delay(1100);
        removeTyping();
        addBubble("ai", "noted. let me pull something that fits that a little better.");
      }

      /* ── Form / button triggers ── */
      document.getElementById("plan-form").addEventListener("submit", (e) => {
        e.preventDefault();
        const q = document.getElementById("plan-query").value.trim() || "something fun tonight";
        openChat(q);
      });

      document.getElementById("surprise").addEventListener("click", () => {
        openChat("honestly just need to get out of the house");
      });

      /* ── Nav plan link ── */
      document.getElementById("nav-plan").addEventListener("click", (e) => {
        e.preventDefault();
        document.getElementById("plan-query").focus();
      });

      /* ── Module card actions ── */
      document.querySelectorAll("[data-action]").forEach((button) => {
        button.addEventListener("click", () => {
          const action = button.dataset.action;
          if (action === "nearby") {
            openChat("what's good and open near me right now");
          } else if (action === "date") {
            openChat("plan a date night worth remembering");
          } else if (action === "tickets") {
            openChat("any good shows or events with seats available");
          } else if (action === "crew") {
            openChat("need a plan my friends will actually agree on");
          }
        });
      });
    </script>
  </body>
</html>
