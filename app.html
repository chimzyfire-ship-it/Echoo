<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>echoo app</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #080907;
        --panel: #11130f;
        --panel-2: #191b15;
        --ink: #f5f1e8;
        --muted: #a8a397;
        --dim: #706c62;
        --line: rgba(245, 241, 232, 0.13);
        --line-strong: rgba(245, 241, 232, 0.28);
        --signal: #e7c98e;
        --rose: #d8a2d9;
        --clay: #c87952;
        --blue: #91a7ff;
        --shadow: 0 24px 70px rgba(0, 0, 0, 0.42);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background:
          linear-gradient(90deg, rgba(245,241,232,0.035) 1px, transparent 1px) 0 0 / 34px 34px,
          radial-gradient(circle at 84% 0%, rgba(145,167,255,0.12), transparent 26rem),
          radial-gradient(circle at 8% 40%, rgba(216,255,95,0.08), transparent 20rem),
          var(--bg);
      }

      a { color: inherit; text-decoration: none; }
      button, input, select { font: inherit; }

      /* ── Topbar ── */
      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 18px;
        border-bottom: 1px solid var(--line);
        background: rgba(8, 9, 7, 0.94);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-weight: 950;
        font-size: 26px;
        letter-spacing: -0.05em;
      }

      .brand img {
        width: 44px;
        height: 44px;
        border: 1px solid var(--line);
        border-radius: 18px;
        object-fit: cover;
        object-position: 50% 0%;
      }

      .avatar {
        width: 42px;
        height: 42px;
        border: 1px solid var(--line-strong);
        border-radius: 50%;
        display: grid;
        place-items: center;
        color: #151311;
        background: linear-gradient(135deg, #e4bd78 0%, #f2ddb0 42%, var(--rose) 100%);
        font-size: 13px;
        font-weight: 950;
      }

      /* ── Shell ── */
      .shell {
        width: min(1160px, 100%);
        margin: 0 auto;
        padding: 18px 18px 106px;
      }

      /* ── Welcome ── */
      .welcome {
        display: grid;
        gap: 18px;
        padding: 22px 0;
      }

      .kicker {
        color: var(--signal);
        font-size: 12px;
        font-weight: 950;
        letter-spacing: 0.15em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(44px, 13vw, 92px);
        line-height: 0.88;
        letter-spacing: -0.075em;
      }

      .welcome p {
        margin: 0;
        max-width: 690px;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.45;
        font-weight: 650;
      }

      /* ── Ask card ── */
      .ask-card {
        display: grid;
        gap: 12px;
        padding: 14px;
        border: 1px solid var(--line);
        background: rgba(17, 19, 15, 0.9);
        box-shadow: var(--shadow);
      }

      .ask-card form {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }

      input, select {
        min-height: 58px;
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 0;
        outline: 0;
        background: rgba(8, 9, 7, 0.78);
        color: var(--ink);
        padding: 0 15px;
        font-weight: 750;
      }

      input:focus, select:focus { border-color: var(--signal); }

      .primary,
      .ghost {
        min-height: 58px;
        border: 1px solid var(--line);
        border-radius: 0;
        cursor: pointer;
        font-weight: 950;
        letter-spacing: -0.03em;
        transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
      }

      .primary {
        color: #10110e;
        background: linear-gradient(135deg, #e4bd78 0%, #f2ddb0 42%, var(--rose) 100%);
        border-color: transparent;
      }

      .ghost {
        color: var(--ink);
        background: rgba(245, 241, 232, 0.04);
      }

      .primary:hover,
      .ghost:hover {
        transform: translateY(-2px);
        border-color: var(--line-strong);
      }

      /* ── Module grid ── */
      .grid {
        display: grid;
        gap: 12px;
        margin-top: 18px;
      }

      .module {
        position: relative;
        min-height: 152px;
        padding: 16px;
        border: 1px solid var(--line);
        background: rgba(17, 19, 15, 0.84);
        overflow: hidden;
        transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
      }

      .module:hover {
        transform: translateY(-3px);
        border-color: var(--line-strong);
        background: rgba(25, 27, 21, 0.94);
      }

      .module::after {
        content: "";
        position: absolute;
        inset: auto 16px 16px auto;
        width: 54px;
        height: 1px;
        background: var(--signal);
      }

      .module strong {
        display: block;
        margin-bottom: 10px;
        font-size: 24px;
        line-height: 0.98;
        letter-spacing: -0.055em;
      }

      .module p {
        margin: 0;
        color: var(--muted);
        line-height: 1.4;
        font-size: 14px;
        font-weight: 650;
      }

      .module small {
        display: block;
        margin-bottom: 26px;
        color: var(--dim);
        font-size: 11px;
        font-weight: 950;
        letter-spacing: 0.13em;
        text-transform: uppercase;
      }

      /* ── Bottom nav ── */
      .bottom-nav {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 30;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        border-top: 1px solid var(--line);
        background: rgba(8, 9, 7, 0.96);
        transition: transform 260ms ease;
      }

      .bottom-nav a {
        display: grid;
        place-items: center;
        min-height: 68px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 850;
      }

      .bottom-nav a.active { color: var(--signal); }

      body.chat-open .bottom-nav { transform: translateY(100%); }

      /* ── Chat overlay ── */
      .chat-overlay {
        position: fixed;
        inset: 0;
        z-index: 40;
        display: flex;
        flex-direction: column;
        background: var(--bg);
        opacity: 0;
        pointer-events: none;
        transition: opacity 220ms ease;
      }

      .chat-overlay.open {
        opacity: 1;
        pointer-events: auto;
      }

      /* Chat header */
      .chat-header {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 14px 18px;
        border-bottom: 1px solid var(--line);
        background: rgba(8, 9, 7, 0.94);
      }

      .chat-close {
        width: 42px;
        height: 42px;
        border: 1px solid var(--line);
        border-radius: 0;
        background: transparent;
        color: var(--ink);
        font-size: 18px;
        font-weight: 950;
        cursor: pointer;
        display: grid;
        place-items: center;
        transition: border-color 180ms ease;
        flex-shrink: 0;
      }

      .chat-close:hover { border-color: var(--line-strong); }

      .chat-header-title {
        font-size: 14px;
        font-weight: 850;
        letter-spacing: -0.02em;
        color: var(--muted);
      }

      /* Chat body (scrollable) */
      .chat-body {
        flex: 1 1 0;
        overflow-y: auto;
        padding: 20px 16px 20px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
      }

      /* Bubbles */
      .bubble {
        max-width: 85%;
        padding: 14px 16px;
        font-size: 16px;
        line-height: 1.45;
        animation: bubbleIn 260ms ease both;
      }

      @keyframes bubbleIn {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .bubble.user {
        align-self: flex-end;
        max-width: 78%;
        background: linear-gradient(135deg, #e4bd78 0%, #f2ddb0 42%, var(--rose) 100%);
        color: #151311;
        font-weight: 750;
        border-radius: 2px 0 0 0;
      }

      .bubble.ai {
        align-self: flex-start;
        background: var(--panel);
        color: var(--ink);
        border: 1px solid var(--line);
        font-weight: 650;
        border-radius: 0;
      }

      /* Typing indicator */
      .typing {
        align-self: flex-start;
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 14px 18px;
        background: var(--panel);
        border: 1px solid var(--line);
        animation: bubbleIn 200ms ease both;
      }

      .typing-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--dim);
        animation: dotPulse 1.1s ease-in-out infinite;
      }

      .typing-dot:nth-child(2) { animation-delay: 150ms; }
      .typing-dot:nth-child(3) { animation-delay: 300ms; }

      @keyframes dotPulse {
        0%, 100% { opacity: 0.3; }
        50%      { opacity: 1; }
      }

      /* Location card */
      .loc-card {
        align-self: stretch;
        border: 1px solid var(--line);
        overflow: hidden;
        animation: bubbleIn 300ms ease both;
        position: relative;
      }

      .loc-card.hot {
        border-left: 3px solid var(--signal);
      }

      .loc-card picture,
      .loc-card img {
        display: block;
        width: 100%;
        height: 160px;
        object-fit: cover;
      }

      .loc-card-body {
        padding: 14px 16px 18px;
      }

      .loc-card-hot {
        display: inline-block;
        padding: 4px 10px;
        margin-bottom: 10px;
        border: 1px solid rgba(231, 201, 142, 0.3);
        background: rgba(231, 201, 142, 0.08);
        color: var(--signal);
        font-size: 10px;
        font-weight: 950;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .loc-card-tags {
        color: var(--signal);
        font-size: 11px;
        font-weight: 950;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin-bottom: 8px;
      }

      .loc-card-name {
        font-size: 20px;
        font-weight: 950;
        letter-spacing: -0.04em;
        line-height: 1.1;
        margin-bottom: 8px;
      }

      .loc-card-vibe {
        color: var(--muted);
        font-size: 14px;
        font-weight: 650;
        line-height: 1.4;
      }

      /* Connecting track */
      .track {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
        padding: 2px 0;
        align-self: stretch;
        animation: bubbleIn 240ms ease both;
      }

      .track-line {
        width: 2px;
        height: 18px;
        background: repeating-linear-gradient(
          to bottom,
          rgba(231, 201, 142, 0.4) 0px,
          rgba(231, 201, 142, 0.4) 4px,
          transparent 4px,
          transparent 8px
        );
      }

      .track-label {
        padding: 4px 12px;
        font-size: 11px;
        font-weight: 850;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--dim);
      }

      /* Quick action pills */
      .pills {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding-bottom: 4px;
        -webkit-overflow-scrolling: touch;
        animation: bubbleIn 200ms ease both;
      }

      .pills::-webkit-scrollbar { display: none; }

      .pill {
        flex: 0 0 auto;
        padding: 10px 16px;
        border: 1px solid var(--line);
        border-radius: 100px;
        background: transparent;
        color: var(--muted);
        font-size: 12px;
        font-weight: 850;
        letter-spacing: -0.01em;
        cursor: pointer;
        white-space: nowrap;
        transition: border-color 180ms ease, color 180ms ease;
      }

      .pill:hover,
      .pill:active {
        border-color: var(--signal);
        color: var(--ink);
      }

      .pill.tapped {
        border-color: var(--signal);
        color: var(--signal);
      }

      /* Chat input bar */
      .chat-input-bar {
        flex: 0 0 auto;
        display: flex;
        gap: 8px;
        padding: 12px 16px;
        border-top: 1px solid var(--line);
        background: rgba(8, 9, 7, 0.96);
      }

      .chat-input-bar input {
        flex: 1;
        min-height: 48px;
        font-size: 15px;
      }

      .chat-send {
        flex: 0 0 auto;
        min-height: 48px;
        padding: 0 20px;
        border: 1px solid transparent;
        border-radius: 0;
        background: linear-gradient(135deg, #e4bd78 0%, #f2ddb0 42%, var(--rose) 100%);
        color: #10110e;
        font-weight: 950;
        font-size: 14px;
        letter-spacing: -0.02em;
        cursor: pointer;
        transition: transform 180ms ease;
      }

      .chat-send:hover { transform: translateY(-1px); }

      /* ── Responsive ── */
      @media (min-width: 760px) {
        .shell { padding: 28px 28px 60px; }
        .welcome {
          grid-template-columns: 1fr 410px;
          align-items: end;
          padding: 54px 0 30px;
        }
        .ask-card { align-self: stretch; }
        .ask-card form { grid-template-columns: 1fr auto; align-items: end; }
        .grid { grid-template-columns: repeat(4, 1fr); }
        .bottom-nav { display: none; }

        .chat-body { padding: 28px 24px; }
        .chat-input-bar { padding: 14px 24px; }
        .bubble, .loc-card { max-width: 520px; }
        .bubble.user { max-width: 420px; }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="index.html">
        <img src="assets/echoo-new-logo.jpg" alt="">
        <span>echoo</span>
      </a>
      <div class="avatar" id="avatar">PU</div>
    </header>

    <main class="shell" id="dashboard">
      <section class="welcome">
        <div>
          <div class="kicker">Powered by AI</div>
          <h1 id="headline">What are you in the mood for?</h1>
          <p>Tell us what you're feeling. Echoo finds the places, plans the route, and connects the dots.</p>
        </div>
        <div class="ask-card">
          <form id="plan-form">
            <input id="plan-query" placeholder="feeling low and need a pick-me-up..." />
            <button class="primary" type="submit">Find my night</button>
          </form>
          <button class="ghost" id="surprise">Surprise me</button>
        </div>
      </section>

      <section class="grid" aria-label="Quick actions">
        <button class="module" data-action="nearby">
          <small>Nearby</small>
          <strong>What's open around me</strong>
          <p>Real places within walking distance, filtered by what's actually open right now.</p>
        </button>
        <button class="module" data-action="date">
          <small>Date night</small>
          <strong>Plan something worth remembering</strong>
          <p>Dinner, an experience, and a backup spot — all connected and timed.</p>
        </button>
        <button class="module" data-action="tickets">
          <small>Tickets</small>
          <strong>Lock in the good seats</strong>
          <p>Events, shows, and screenings with availability right now.</p>
        </button>
        <button class="module" data-action="crew">
          <small>Group plan</small>
          <strong>Get everyone to say yes</strong>
          <p>Share a short list your friends can vote on instead of another group chat.</p>
        </button>
      </section>
    </main>

    <!-- Chat overlay -->
    <div class="chat-overlay" id="chat-overlay">
      <div class="chat-header">
        <button class="chat-close" id="chat-close" aria-label="Close chat">&#x2715;</button>
        <span class="chat-header-title">echoo is thinking with you</span>
      </div>
      <div class="chat-body" id="chat-body"></div>
      <div class="chat-input-bar">
        <input type="text" id="chat-input" placeholder="say more..." />
        <button class="chat-send" id="chat-send">Send</button>
      </div>
    </div>

    <nav class="bottom-nav" aria-label="Primary">
      <a class="active" href="app.html">Home</a>
      <a href="events.html">Explore</a>
      <a href="#" id="nav-plan">Plan</a>
      <a href="index.html">Exit</a>
    </nav>

    <script>
      /* ── Name / avatar ── */
      const params = new URLSearchParams(window.location.search);
      const name = params.get("name") || "Preview User";
      const initials = name.split(" ").filter(Boolean).map((p) => p[0]).join("").slice(0, 2).toUpperCase() || "PU";
      document.getElementById("avatar").textContent = initials;
      const firstName = name.split(" ")[0] || "You";
      document.getElementById("headline").textContent = `${firstName}, what are you in the mood for?`;

      /* ── DOM refs ── */
      const overlay  = document.getElementById("chat-overlay");
      const chatBody = document.getElementById("chat-body");
      const chatInput = document.getElementById("chat-input");
      const chatSend  = document.getElementById("chat-send");

      /* ── Chat helpers ── */
      function scrollChat() {
        chatBody.scrollTo({ top: chatBody.scrollHeight, behavior: "smooth" });
      }

      function addBubble(type, text) {
        const el = document.createElement("div");
        el.className = `bubble ${type}`;
        el.textContent = text;
        chatBody.appendChild(el);
        scrollChat();
        return el;
      }

      function addTyping() {
        const el = document.createElement("div");
        el.className = "typing";
        el.id = "typing-current";
        el.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
        chatBody.appendChild(el);
        scrollChat();
        return el;
      }

      function removeTyping() {
        const el = document.getElementById("typing-current");
        if (el) el.remove();
      }

      function addLocationCard(img, imgWebp, placeName, tags, vibe, hot) {
        const card = document.createElement("div");
        card.className = hot ? "loc-card hot" : "loc-card";
        const hotBadge = hot ? '<div class="loc-card-hot">Trending now</div>' : '';
        card.innerHTML = `
          <picture>
            <source srcset="${imgWebp}" type="image/webp">
            <img src="${img}" alt="${placeName}" loading="lazy" decoding="async">
          </picture>
          <div class="loc-card-body">
            ${hotBadge}
            <div class="loc-card-tags">${tags}</div>
            <div class="loc-card-name">${placeName}</div>
            <div class="loc-card-vibe">${vibe}</div>
          </div>`;
        chatBody.appendChild(card);
        scrollChat();
      }

      function addTrack(label) {
        const el = document.createElement("div");
        el.className = "track";
        el.innerHTML = `<div class="track-line"></div><div class="track-label">${label}</div><div class="track-line"></div>`;
        chatBody.appendChild(el);
        scrollChat();
      }

      function addPills(labels) {
        const wrap = document.createElement("div");
        wrap.className = "pills";
        labels.forEach((text) => {
          const btn = document.createElement("button");
          btn.className = "pill";
          btn.textContent = text;
          btn.addEventListener("click", () => handlePillTap(btn));
          wrap.appendChild(btn);
        });
        chatBody.appendChild(wrap);
        scrollChat();
      }

      /* ── Open / close ── */
      function openChat(userText) {
        chatBody.innerHTML = "";
        overlay.classList.add("open");
        document.body.classList.add("chat-open");
        runConversation(userText);
      }

      function closeChat() {
        overlay.classList.remove("open");
        document.body.classList.remove("chat-open");
      }

      document.getElementById("chat-close").addEventListener("click", closeChat);

      /* ── Simulated conversation ── */
      function delay(ms) {
        return new Promise((r) => setTimeout(r, ms));
      }

      async function runConversation(userText) {
        /* 1. User bubble */
        addBubble("user", userText);

        /* 2. Typing */
        await delay(600);
        addTyping();

        /* 3. AI response */
        await delay(1200);
        removeTyping();
        addBubble("ai", "i hear you. let\u2019s start easy \u2014 there\u2019s a spot that\u2019s been getting a lot of love lately.");

        /* 4. Location card 1 */
        await delay(400);
        addLocationCard(
          "assets/optimized/news-music-768.jpg",
          "assets/optimized/news-music-768.webp",
          "The Listening Room",
          "Live jazz \u00b7 Kensington \u00b7 Open now",
          "Dimly lit, vinyl-forward, seats at the bar",
          true
        );

        /* 5. Connecting track */
        await delay(300);
        addTrack("12 min \u00b7 850m walk");

        /* 6. Location card 2 */
        await delay(400);
        addLocationCard(
          "assets/optimized/news-date-768.jpg",
          "assets/optimized/news-date-768.webp",
          "Late Kitchen on Dundas",
          "Comfort food \u00b7 Open til 2am \u00b7 $",
          "Counter seats, soft playlist, no reservations needed"
        );

        /* 7. AI follow-up */
        await delay(500);
        addBubble("ai", "two stops, low effort, good energy. want me to adjust anything?");

        /* 8. Quick action pills */
        await delay(200);
        addPills(["Make it cheaper", "Add a third stop", "Show me something else"]);
      }

      /* ── Pill tap handler ── */
      let pillBusy = false;
      async function handlePillTap(btn) {
        if (pillBusy) return;
        pillBusy = true;

        btn.classList.add("tapped");
        addBubble("user", btn.textContent);

        await delay(400);
        addTyping();

        await delay(1000);
        removeTyping();
        addBubble("ai", "got it \u2014 here\u2019s another angle.");

        pillBusy = false;
      }

      /* ── Chat input submit ── */
      function handleChatSend() {
        const text = chatInput.value.trim();
        if (!text) return;
        chatInput.value = "";
        sendFollowUp(text);
      }

      chatSend.addEventListener("click", handleChatSend);
      chatInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") { e.preventDefault(); handleChatSend(); }
      });

      async function sendFollowUp(text) {
        addBubble("user", text);
        await delay(500);
        addTyping();
        await delay(1100);
        removeTyping();
        addBubble("ai", "noted. let me pull something that fits that a little better.");
      }

      /* ── Form / button triggers ── */
      document.getElementById("plan-form").addEventListener("submit", (e) => {
        e.preventDefault();
        const q = document.getElementById("plan-query").value.trim() || "something fun tonight";
        openChat(q);
      });

      document.getElementById("surprise").addEventListener("click", () => {
        openChat("honestly just need to get out of the house");
      });

      /* ── Nav plan link ── */
      document.getElementById("nav-plan").addEventListener("click", (e) => {
        e.preventDefault();
        document.getElementById("plan-query").focus();
      });

      /* ── Module card actions ── */
      document.querySelectorAll("[data-action]").forEach((button) => {
        button.addEventListener("click", () => {
          const action = button.dataset.action;
          if (action === "nearby") {
            openChat("what's good and open near me right now");
          } else if (action === "date") {
            openChat("plan a date night worth remembering");
          } else if (action === "tickets") {
            openChat("any good shows or events with seats available");
          } else if (action === "crew") {
            openChat("need a plan my friends will actually agree on");
          }
        });
      });
    </script>
  </body>
</html>
