<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Echoo Location Review</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #090a0c;
        --panel: #121417;
        --line: rgba(255,255,255,0.12);
        --text: #f4efe7;
        --muted: rgba(244,239,231,0.68);
        --gold: #e7c98e;
        --danger: #ef7777;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      main {
        max-width: 1040px;
        margin: 0 auto;
        padding: 32px 18px 80px;
      }
      header {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: end;
        margin-bottom: 24px;
      }
      h1 { margin: 0; font-size: clamp(28px, 5vw, 42px); }
      p { color: var(--muted); line-height: 1.5; }
      .controls {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        margin-bottom: 18px;
      }
      input, button {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        color: var(--text);
        min-height: 42px;
        padding: 0 12px;
        font: inherit;
      }
      button {
        cursor: pointer;
        font-weight: 800;
      }
      button.primary {
        background: var(--gold);
        color: #111;
        border-color: transparent;
      }
      .grid {
        display: grid;
        gap: 12px;
      }
      .place {
        display: grid;
        gap: 10px;
        padding: 16px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
      }
      .place-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
      }
      .place h2 {
        margin: 0;
        font-size: 18px;
      }
      .meta {
        color: var(--muted);
        font-size: 13px;
      }
      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .danger { color: var(--danger); }
      .empty {
        padding: 22px;
        border: 1px dashed var(--line);
        border-radius: 8px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Location Review</h1>
          <p>Review normalized places before they enter live map search.</p>
        </div>
      </header>

      <div class="controls">
        <input id="admin-token" type="password" autocomplete="off" placeholder="Location admin token">
        <button class="primary" id="load-btn" type="button">Load</button>
      </div>

      <section class="grid" id="places"></section>
    </main>

    <script>
      const ENDPOINT = "https://dlezregdjpdqmooubwvl.supabase.co/functions/v1/location-review";
      const placesEl = document.getElementById("places");
      const tokenEl = document.getElementById("admin-token");

      tokenEl.value = localStorage.getItem("echoo_location_admin_token") || "";

      async function request(path = "", options = {}) {
        const token = tokenEl.value.trim();
        localStorage.setItem("echoo_location_admin_token", token);
        const response = await fetch(`${ENDPOINT}${path}`, {
          ...options,
          headers: {
            "Content-Type": "application/json",
            "x-admin-token": token,
            ...(options.headers || {})
          }
        });
        const json = await response.json();
        if (!response.ok) throw new Error(json.error || "Location review request failed");
        return json;
      }

      function render(places) {
        if (!places.length) {
          placesEl.innerHTML = '<div class="empty">No places waiting for review.</div>';
          return;
        }

        placesEl.innerHTML = places.map((place) => `
          <article class="place">
            <div class="place-head">
              <div>
                <h2>${place.formatted_address || "Untitled place"}</h2>
                <div class="meta">${place.city || "Unknown city"}, ${place.admin_area_1 || "CA"} · ${Number(place.latitude).toFixed(4)}, ${Number(place.longitude).toFixed(4)}</div>
              </div>
              <div class="meta">Confidence ${Number(place.confidence_score || 0).toFixed(2)}</div>
            </div>
            <div class="meta">Provider: ${place.place_provider || "manual"} ${place.place_provider_id || ""}</div>
            <div class="actions">
              <button class="primary" data-action="published" data-id="${place.id}">Approve</button>
              <button data-action="needs_review" data-id="${place.id}">Keep Review</button>
              <button class="danger" data-action="archived" data-id="${place.id}">Archive</button>
            </div>
          </article>
        `).join("");
      }

      async function load() {
        placesEl.innerHTML = '<div class="empty">Loading...</div>';
        try {
          const data = await request("?status=needs_review&limit=50");
          render(data.places || []);
        } catch (error) {
          placesEl.innerHTML = `<div class="empty danger">${error.message}</div>`;
        }
      }

      document.getElementById("load-btn").addEventListener("click", load);
      placesEl.addEventListener("click", async (event) => {
        const button = event.target.closest("[data-action]");
        if (!button) return;
        button.disabled = true;
        try {
          await request("", {
            method: "PATCH",
            body: JSON.stringify({ placeId: button.dataset.id, status: button.dataset.action })
          });
          await load();
        } catch (error) {
          alert(error.message);
          button.disabled = false;
        }
      });
    </script>
  </body>
</html>
