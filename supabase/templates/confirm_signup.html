<!doctype html>
<html>
  <body style="margin:0;background:#0b0b0b;padding:0;font-family:Arial,sans-serif;color:#f8f5ef;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#0b0b0b;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#121212;border:1px solid rgba(248,245,239,0.12);border-radius:20px;overflow:hidden;">
            <tr>
              <td style="padding:28px 28px 18px;border-bottom:1px solid rgba(248,245,239,0.08);">
                <div style="font-size:12px;letter-spacing:0.18em;text-transform:uppercase;color:#f7d5b2;font-weight:700;margin-bottom:12px;">Echoo</div>
                <h1 style="margin:0 0 10px;font-size:28px;line-height:1.1;color:#f8f5ef;">Confirm your Echoo account.</h1>
                <p style="margin:0;color:#aaa29a;font-size:16px;line-height:1.5;">Confirm your email to finish creating your account.</p>
              </td>
            </tr>
            <tr>
              <td style="padding:28px;">
                <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:16px 22px;background:#f7d5b2;color:#111111;font-size:18px;font-weight:800;text-decoration:none;border-radius:14px;margin-bottom:18px;">Confirm my email</a>
                <p style="margin:0;color:#aaa29a;font-size:13px;line-height:1.5;">This link expires soon and works only once. If you did not request it, you can safely ignore this email.</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
