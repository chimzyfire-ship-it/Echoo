<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>echoo — sign in</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #080907;
        --panel: #11130f;
        --panel-2: #191b15;
        --ink: #f5f1e8;
        --muted: #a8a397;
        --dim: #706c62;
        --line: rgba(245, 241, 232, 0.13);
        --line-strong: rgba(245, 241, 232, 0.28);
        --signal: #e7c98e;
        --signal-2: #9f8cff;
        --green: #9bd4b4;
        --rose: #d8a2d9;
        --shadow: 0 24px 70px rgba(0, 0, 0, 0.42);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100svh;
        color: var(--ink);
        background:
          linear-gradient(180deg, rgba(8, 9, 7, 0.5), rgba(8, 9, 7, 0.94)),
          url("assets/optimized/echoo-mobile-bg-768.jpg") center / cover
            no-repeat,
          var(--bg);
        background:
          linear-gradient(180deg, rgba(8, 9, 7, 0.5), rgba(8, 9, 7, 0.94)),
          url("assets/optimized/echoo-mobile-bg-768.webp") center / cover
            no-repeat,
          var(--bg);
        display: grid;
        place-items: center;
        padding: 16px;
      }

      a {
        color: inherit;
        text-decoration: none;
      }
      button,
      input {
        font: inherit;
      }

      button:focus-visible,
      input:focus-visible,
      a:focus-visible {
        outline: 3px solid rgba(231, 201, 142, 0.82);
        outline-offset: 3px;
      }

      /* ---- Auth shell ---- */
      .auth-shell {
        width: min(720px, 100%);
      }

      .back {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 14px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 850;
      }

      .back::before {
        content: "";
        width: 24px;
        height: 1px;
        background: currentColor;
      }

      .panel {
        border: 1px solid var(--line);
        background: rgba(17, 19, 15, 0.92);
        box-shadow: var(--shadow);
      }

      .auth-head {
        padding: 22px;
        border-bottom: 1px solid var(--line);
      }

      .brand {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 38px;
      }

      .brand-logo {
        width: 44px;
        height: 44px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(245, 241, 232, 0.06);
        overflow: hidden;
      }

      .brand-logo img {
        width: 124px;
        height: 88px;
        object-fit: cover;
        object-position: 50% 0%;
        transform: translate(-41px, -8px);
      }

      .mode {
        display: inline-grid;
        grid-template-columns: 1fr 1fr;
        gap: 3px;
        padding: 3px;
        border: 1px solid var(--line);
        background: rgba(8, 9, 7, 0.76);
      }

      .mode button {
        min-height: 36px;
        border: 0;
        padding: 0 12px;
        color: var(--muted);
        background: transparent;
        font-size: 12px;
        font-weight: 900;
        cursor: pointer;
      }

      .mode button.active {
        color: #10110e;
        background: var(--ink);
      }

      h1 {
        margin: 0;
        max-width: 320px;
        font-size: clamp(42px, 13vw, 64px);
        line-height: 0.9;
        letter-spacing: -0.075em;
      }

      .sub {
        margin: 12px 0 0;
        color: var(--muted);
        line-height: 1.45;
        font-weight: 650;
      }

      form {
        display: grid;
        gap: 14px;
        padding: 18px;
      }

      .field {
        display: grid;
        gap: 7px;
      }

      label {
        color: var(--dim);
        font-size: 11px;
        font-weight: 950;
        letter-spacing: 0.13em;
        text-transform: uppercase;
      }

      input {
        width: 100%;
        min-height: 58px;
        border: 1px solid var(--line);
        border-radius: 0;
        outline: 0;
        background: rgba(8, 9, 7, 0.78);
        color: var(--ink);
        padding: 0 15px;
        font-size: 16px;
        font-weight: 750;
        transition:
          border-color 160ms ease,
          background 160ms ease;
      }

      input:focus {
        border-color: var(--signal);
        background: rgba(8, 9, 7, 0.95);
      }

      .meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 750;
      }

      .submit,
      .provider {
        min-height: 58px;
        border: 1px solid var(--line);
        border-radius: 0;
        cursor: pointer;
        font-weight: 950;
        letter-spacing: -0.03em;
        transition:
          transform 180ms ease,
          border-color 180ms ease,
          background 180ms ease;
      }

      .submit {
        background: linear-gradient(
          135deg,
          #e4bd78 0%,
          #f2ddb0 42%,
          var(--rose) 100%
        );
        color: #151311;
        font-size: 18px;
      }

      .submit:hover,
      .provider:hover {
        transform: translateY(-2px);
        border-color: var(--line-strong);
      }

      .divider {
        display: flex;
        align-items: center;
        gap: 12px;
        color: var(--dim);
        font-size: 11px;
        font-weight: 950;
        letter-spacing: 0.13em;
        text-transform: uppercase;
      }

      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--line);
      }

      .provider {
        background: rgba(245, 241, 232, 0.035);
        color: var(--ink);
      }

      .signup-only {
        display: none;
      }
      .signup .signup-only {
        display: grid;
      }

      /* ---- Fade utility ---- */
      .fade-out {
        opacity: 0;
        transform: translateY(-6px);
        pointer-events: none;
        transition:
          opacity 220ms ease,
          transform 220ms ease;
      }

      .fade-in-up {
        animation: fadeInUp 280ms ease both;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ---- Onboarding ---- */
      .onboarding {
        display: none;
      }

      .onboarding.visible {
        display: block;
      }

      .ob-progress {
        display: grid;
        grid-template-columns: repeat(8, 1fr);
        gap: 4px;
        margin-bottom: 14px;
      }

      .ob-bar {
        flex: 1;
        height: 3px;
        border: 1px solid var(--line);
        background: transparent;
        transition:
          background 260ms ease,
          border-color 260ms ease;
      }

      .ob-bar.past {
        background: var(--muted);
        border-color: var(--muted);
      }

      .ob-bar.current {
        background: var(--signal);
        border-color: var(--signal);
      }

      .ob-panel {
        border: 1px solid var(--line);
        background:
          linear-gradient(145deg, rgba(159, 140, 255, 0.1), transparent 34%),
          linear-gradient(180deg, rgba(245, 241, 232, 0.045), transparent 44%),
          rgba(17, 19, 15, 0.94);
        box-shadow: var(--shadow);
      }

      .ob-head {
        padding: 24px;
        border-bottom: 1px solid var(--line);
      }

      .ob-head h1 {
        max-width: 540px;
        font-size: clamp(36px, 8vw, 58px);
      }

      .ob-body {
        padding: 20px;
        display: grid;
        gap: 16px;
      }

      .ob-scroll {
        max-height: min(57svh, 600px);
        overflow: auto;
        padding: 2px 5px 2px 0;
        scrollbar-color: rgba(245, 241, 232, 0.24) transparent;
      }

      .ob-step {
        display: none;
      }

      .ob-step.active {
        display: block;
      }

      .ob-step.active .ob-step-inner {
        animation: fadeInUp 280ms ease both;
      }

      /* Chips */
      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 9px;
      }

      .chip {
        position: relative;
        min-height: 42px;
        padding: 10px 15px;
        border: 1px solid var(--line);
        background: rgba(8, 9, 7, 0.48);
        color: var(--ink);
        font-size: 14px;
        font-weight: 850;
        letter-spacing: -0.02em;
        cursor: pointer;
        border-radius: 999px;
        transition:
          border-color 160ms ease,
          background 160ms ease,
          color 160ms ease,
          transform 160ms ease;
        user-select: none;
      }

      .chip:hover {
        border-color: var(--line-strong);
        transform: translateY(-1px);
      }

      .chip.selected {
        border-color: rgba(159, 140, 255, 0.85);
        background: rgba(159, 140, 255, 0.2);
        color: #f7f3ff;
        box-shadow: inset 0 0 0 1px rgba(245, 241, 232, 0.1);
      }

      .chip.selected::after {
        content: "";
        display: inline-block;
        width: 7px;
        height: 7px;
        margin-left: 10px;
        border-radius: 50%;
        background: var(--signal);
        vertical-align: 1px;
      }

      /* City pills */
      .city-pills {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 4px;
      }

      .city-pill {
        padding: 8px 16px;
        border: 1px solid var(--line);
        border-radius: 100px;
        background: transparent;
        color: var(--muted);
        font-size: 13px;
        font-weight: 750;
        cursor: pointer;
        transition:
          border-color 160ms ease,
          color 160ms ease,
          background 160ms ease;
      }

      .city-pill:hover {
        border-color: var(--line-strong);
        color: var(--ink);
      }

      .city-pill.selected {
        border-color: var(--signal);
        background: rgba(231, 201, 142, 0.08);
        color: var(--signal);
      }

      /* Onboarding selection cards */
      .ob-cards {
        display: grid;
        gap: 10px;
      }

      .ob-cards.two {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .ob-card {
        min-height: 88px;
        padding: 16px;
        border: 1px solid var(--line);
        background: rgba(8, 9, 7, 0.4);
        cursor: pointer;
        text-align: left;
        transition:
          border-color 160ms ease,
          background 160ms ease,
          transform 160ms ease;
      }

      .ob-card:hover {
        border-color: var(--line-strong);
      }

      .ob-card.selected {
        border-color: rgba(231, 201, 142, 0.72);
        background: rgba(231, 201, 142, 0.1);
      }

      .ob-card .ob-card-name {
        display: block;
        color: var(--ink);
        font-size: 16px;
        font-weight: 850;
        letter-spacing: -0.03em;
        margin-bottom: 5px;
      }

      .ob-card .ob-card-desc {
        display: block;
        color: var(--muted);
        font-size: 14px;
        font-weight: 650;
        line-height: 1.4;
      }

      .ob-section {
        display: grid;
        gap: 11px;
        margin-bottom: 22px;
      }

      .ob-section:last-child {
        margin-bottom: 0;
      }

      .ob-section-title {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--ink);
        font-size: 16px;
        font-weight: 950;
        letter-spacing: -0.03em;
      }

      .ob-section-title::before {
        content: "";
        width: 18px;
        height: 1px;
        background: var(--signal-2);
      }

      .preference-fieldset {
        min-width: 0;
        margin: 0;
        padding: 0;
        border: 0;
      }

      .screen-reader {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0 0 0 0);
        white-space: nowrap;
      }

      .custom-field {
        display: flex;
        align-items: center;
        gap: 10px;
        width: fit-content;
        min-height: 44px;
        max-width: 100%;
        border: 1px solid var(--line);
        background: rgba(8, 9, 7, 0.62);
        padding: 0 14px;
        border-radius: 999px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 850;
      }

      .custom-field input {
        min-height: 42px;
        width: min(220px, 54vw);
        border: 0;
        background: transparent;
        padding: 0;
        font-size: 14px;
      }

      .identity-grid {
        display: grid;
        gap: 12px;
      }

      .privacy-note {
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
        line-height: 1.45;
      }

      .ob-continue {
        width: 100%;
        min-height: 58px;
        border: 1px solid var(--line);
        border-radius: 0;
        background: linear-gradient(
          135deg,
          #e4bd78 0%,
          #f2ddb0 42%,
          var(--rose) 100%
        );
        color: #151311;
        font-size: 18px;
        font-weight: 950;
        letter-spacing: -0.03em;
        cursor: pointer;
        transition:
          transform 180ms ease,
          border-color 180ms ease;
        margin-top: 4px;
      }

      .ob-continue:hover {
        transform: translateY(-2px);
        border-color: var(--line-strong);
      }

      .ob-skip {
        width: 100%;
        min-height: 42px;
        border: 0;
        border-radius: 0;
        background: transparent;
        color: var(--dim);
        font-size: 13px;
        font-weight: 750;
        cursor: pointer;
        transition: color 160ms ease;
      }

      .ob-skip:hover {
        color: var(--muted);
      }

      @media (max-width: 560px) {
        body {
          align-items: start;
          place-items: start center;
        }

        .auth-shell {
          width: 100%;
        }

        .ob-cards.two {
          grid-template-columns: 1fr;
        }

        .ob-head,
        .ob-body {
          padding: 18px;
        }

        .ob-scroll {
          max-height: 54svh;
        }
      }
    </style>
  </head>
  <body>
    <main class="auth-shell">
      <a class="back" href="index.html">Back home</a>

      <!-- AUTH PANEL -->
      <section class="panel" id="auth-panel">
        <div class="auth-head">
          <div class="brand">
            <span class="brand-logo" aria-hidden="true"
              ><img src="assets/echoo-new-logo.jpg" alt=""
            /></span>
            <div class="mode" aria-label="Authentication mode">
              <button class="active" id="signin-tab" type="button">
                Sign in
              </button>
              <button id="signup-tab" type="button">Join</button>
            </div>
          </div>
          <h1 id="title">Step back into the city.</h1>
          <p class="sub" id="copy">
            Your saved places, plans, and conversations are waiting.
          </p>
        </div>

        <form id="auth-form">
          <div class="field signup-only">
            <label for="name">Name</label>
            <input id="name" autocomplete="name" placeholder="Your name" />
          </div>
          <div class="field">
            <label for="email">Email</label>
            <input
              id="email"
              autocomplete="email"
              placeholder="name@example.com"
            />
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input
              id="password"
              type="password"
              autocomplete="current-password"
              placeholder="Password"
            />
          </div>
          <div class="meta">
            <span>Secured by Echoo</span>
            <a href="#">Need help?</a>
          </div>
          <button class="submit" type="submit" id="submit-label">
            Open my city
          </button>
          <div class="divider">or</div>
          <button class="provider" type="button" data-provider="Google">
            Continue with Google
          </button>
          <button class="provider" type="button" data-provider="Apple">
            Continue with Apple
          </button>
        </form>
      </section>

      <!-- ONBOARDING PANEL -->
      <section class="onboarding" id="onboarding">
        <div class="ob-progress" id="ob-progress" aria-hidden="true"></div>
        <div class="ob-panel">
          <div class="ob-head">
            <h1 id="ob-title">What draws you out?</h1>
            <p class="sub" id="ob-sub">
              Pick what sounds like your kind of night.
            </p>
          </div>
          <div class="ob-body">
            <div id="ob-steps"></div>
            <button type="button" class="ob-continue" id="ob-next">Next</button>
          </div>
        </div>
      </section>
    </main>

    <script src="assets/location-platform.js"></script>
    <script>
      /* Diagnostic logger for redirects */
      window.addEventListener("beforeunload", () => {
        const history = JSON.parse(
          sessionStorage.getItem("echoo_unload_log") || "[]",
        );
        history.push({
          time: new Date().toISOString(),
          url: window.location.href,
          stack: new Error().stack,
        });
        sessionStorage.setItem(
          "echoo_unload_log",
          JSON.stringify(history.slice(-10)),
        );
      });

      // Check stored preference for pre-detected city
      let preDetectedCity = "Toronto";
      try {
        const stored = localStorage.getItem("echoo_preferences");
        if (stored) {
          preDetectedCity = JSON.parse(stored).city || "Toronto";
        }
      } catch (e) {}
      preDetectedCity =
        window.EchooLocationPlatform.cityByName(preDetectedCity)?.name ||
        "Toronto";

      /* ---- State ---- */
      const state = {
        mode: "signin", // "signin" | "signup"
        obStep: 0,
        vibes: new Set(),
        eventStyles: new Set(),
        audiences: new Set(),
        motivations: new Set(),
        customInterest: "",
        customEventStyle: "",
        customAudience: "",
        customMotivation: "",
        budget: "$",
        energy: "chill",
        city: preDetectedCity,
        gender: "Prefer not to say",
        dob: "",
        tone: "direct",
        userName: "",
        userEmail: "",
      };

      /* ---- DOM refs ---- */
      const authPanel = document.getElementById("auth-panel");
      const onboarding = document.getElementById("onboarding");
      const title = document.getElementById("title");
      const copy = document.getElementById("copy");
      const signInTab = document.getElementById("signin-tab");
      const signUpTab = document.getElementById("signup-tab");
      const submitLabel = document.getElementById("submit-label");
      const obTitle = document.getElementById("ob-title");
      const obSub = document.getElementById("ob-sub");
      const obNext = document.getElementById("ob-next");
      const obProgress = document.getElementById("ob-progress");
      const obStepsWrap = document.getElementById("ob-steps");
      let obBars = [];
      let obSteps = [];
      let cityInput;

      /* ---- Copy maps ---- */
      const COPY = {
        signin: {
          title: "Step back into the city.",

        {

          customKey: "customEventStyle",

      const INTEREST_SECTIONS = [
        {

          options: [

            "Creativity",
            "Artists",
            "Performing Arts",
            "Collaboration Between Creative Minds",
            "Theater",
            "Painting",
            "Cultural Activities",
            "Museum",
          ],
        },
        {
          title: "Career & Business",
          options: [
            "Entrepreneurship",
            "Professional Networking",
            "Startup Businesses",
            "Business Strategy",
            "Professional Development",
            "Investing",
            "Leadership",
            "Innovation",
            "Online Marketing",
            "Professional Women",
            "Young Professionals",
            "Musicians",
            "Fashion Design",
          ],
        },
        {
          title: "Community & Environment",
          options: [
            "Community Building",
            "Community Service",
            "Sustainability",
          ],
        },
        {
          title: "Dancing",
          options: [
            "Dancing",
            "Social Dancing",
            "Dance Lessons",
            "Latin Dance",
            "Salsa",
          ],
        },
        {
          title: "Games",
          options: [
            "Game Night",
            "Board Games",
            "Games",
            "Gaming",
            "Card Games",
            "Video Games",
          ],
        },
        {
          title: "Health & Wellbeing",
          options: [
            "Wellness",
            "Meditation",
            "Healthy Living",
            "Energy Healing",
            "Yoga",
            "Alternative Medicine",
            "Nutrition",
            "Healthy Eating",
          ],
        },
        {
          title: "More Signals",
          options: [
            "Hobbies & Passions",
            "Identity & Language",
            "Music",
            "Parents & Family",
            "Pets & Animals",
            "Religion & Spirituality",
            "Science & Education",
            "Social Activities",
            "Sports & Fitness",
          ],
        },
      ];

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function chip(label, key) {
        return `<button type="button" class="chip" data-multi="${escapeHtml(key)}" data-value="${escapeHtml(label)}" aria-pressed="false">${escapeHtml(label)}</button>`;
      }

      function renderCustomInput(id, label) {
        return `
          <label class="custom-field" for="${id}">
            <span>${escapeHtml(label)}</span>
            <input id="${id}" data-custom="${id}" placeholder="Type here">
          </label>
        `;
      }

      function renderOnboardingUI() {
        obProgress.innerHTML = OB_STEPS.map(
          (_, i) =>
            `<div class="ob-bar${i === 0 ? " current" : ""}" data-step="${i}"></div>`,
        ).join("");
        obProgress.style.gridTemplateColumns = `repeat(${OB_STEPS.length}, 1fr)`;

        obStepsWrap.innerHTML = OB_STEPS.map((step, index) => {
          let body = "";

          if (step.type === "interest-map") {
            body = `
              <div class="ob-scroll">
                <fieldset class="preference-fieldset">
                  <legend class="screen-reader">Interest categories</legend>
                  ${INTEREST_SECTIONS.map(
                    (section) => `
                    <div class="ob-section">
                      <div class="ob-section-title">${escapeHtml(section.title)}</div>
                      <div class="chips">${section.options.map((option) => chip(option, "vibes")).join("")}</div>
                    </div>
                  `,
                  ).join("")}
                  ${renderCustomInput("customInterest", "Add another interest")}
                </fieldset>
              </div>
            `;
          }

          if (step.type === "multi") {
            body = `
              <fieldset class="preference-fieldset">
                <legend class="screen-reader">${escapeHtml(step.title)}</legend>
                <div class="chips">${step.options.map((option) => chip(option, step.key)).join("")}</div>
                ${renderCustomInput(step.customKey, step.customLabel)}
              </fieldset>
            `;
          }

          if (step.type === "cards") {
            body = `
              <div class="ob-cards two" role="radiogroup" aria-label="${escapeHtml(step.title)}">
                ${step.options
                  .map(
                    (option) => `
                  <button type="button" class="ob-card${state[step.key] === option.value ? " selected" : ""}" data-single="${escapeHtml(step.key)}" data-value="${escapeHtml(option.value)}" role="radio" aria-checked="${state[step.key] === option.value ? "true" : "false"}">
                    <span class="ob-card-name">${escapeHtml(option.name)}</span>
                    <span class="ob-card-desc">${escapeHtml(option.desc)}</span>
                  </button>
                `,
                  )
                  .join("")}
              </div>
            `;
          }

          if (step.type === "city") {
            body = `
              <div class="field">
                <label for="ob-city">Your city</label>
                <input id="ob-city" type="text" value="${escapeHtml(state.city)}" placeholder="Your city" autocomplete="address-level2">
              </div>
              <div class="city-pills" role="radiogroup" aria-label="Supported cities">
                ${[
                  "Toronto",
                  "Vancouver",
                  "Montreal",
                  "Calgary",
                  "Edmonton",
                  "Ottawa",
                  "Winnipeg",
                  "Quebec City",
                  "Halifax",
                  "Victoria",
                ]
                  .map(
                    (cityName) => `
                  <button type="button" class="city-pill${state.city === cityName ? " selected" : ""}" data-city="${escapeHtml(cityName)}" role="radio" aria-checked="${state.city === cityName ? "true" : "false"}">${escapeHtml(cityName)}</button>
                `,
                  )
                  .join("")}
              </div>
            `;
          }

          if (step.type === "identity") {
            body = `
              <div class="identity-grid">
                <p class="privacy-note">Use this only for personalization. Avoiding the question is always valid.</p>
                <div class="ob-cards" role="radiogroup" aria-label="Gender">
                  ${[
                    "Prefer not to say",
                    "Female",
                    "Male",
                    "Nonbinary",
                    "Not Listed",
                  ]
                    .map(
                      (option) => `
                    <button type="button" class="ob-card${state.gender === option ? " selected" : ""}" data-single="gender" data-value="${escapeHtml(option)}" role="radio" aria-checked="${state.gender === option ? "true" : "false"}">
                      <span class="ob-card-name">${escapeHtml(option)}</span>
                    </button>
                  `,
                    )
                    .join("")}
                </div>
                <div class="field">
                  <label for="dob">Date of birth</label>
                  <input id="dob" type="date" value="${escapeHtml(state.dob)}" autocomplete="bday">
                </div>
              </div>
            `;
          }

          return `
            <div class="ob-step${index === 0 ? " active" : ""}" data-ob-step="${index}" aria-hidden="${index === 0 ? "false" : "true"}">
              <div class="ob-step-inner">${body}</div>
            </div>
          `;
        }).join("");

        obBars = [...document.querySelectorAll(".ob-bar")];
        obSteps = [...document.querySelectorAll(".ob-step")];
        cityInput = document.getElementById("ob-city");
        bindOnboardingControls();
      }

      /* ---- Mode switching ---- */
      function setMode(mode) {
        state.mode = mode;
        const joining = mode === "signup";
        authPanel.classList.toggle("signup", joining);
        signInTab.classList.toggle("active", !joining);
        signUpTab.classList.toggle("active", joining);

        const c = joining ? COPY.signup : COPY.signin;
        title.textContent = c.title;
        copy.textContent = c.sub;
        submitLabel.textContent = c.btn;
      }

      signInTab.addEventListener("click", () => setMode("signin"));
      signUpTab.addEventListener("click", () => setMode("signup"));

      /* ---- Auth submit ---- */
      function captureUser(providerName) {
        state.userName =
          document.getElementById("name").value.trim() || providerName || "";
        state.userEmail = document.getElementById("email").value.trim();
      }

      function finishSignIn(providerName) {
        const name =
          document.getElementById("name").value.trim() ||
          providerName ||
          "User";
        const email = document.getElementById("email").value.trim();
        window.location.href = `app.html?name=${encodeURIComponent(name)}&email=${encodeURIComponent(email)}`;
      }

      function startOnboarding(providerName) {
        captureUser(providerName);
        authPanel.classList.add("fade-out");
        setTimeout(() => {
          authPanel.style.display = "none";
          onboarding.classList.add("visible");
          renderObStep(0);
        }, 240);
      }

      document.getElementById("auth-form").addEventListener("submit", (e) => {
        e.preventDefault();
        if (state.mode === "signup") {
          startOnboarding("");
        } else {
          finishSignIn("");
        }
      });

      document.querySelectorAll("[data-provider]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const prov = btn.dataset.provider + " User";
          if (state.mode === "signup") {
            startOnboarding(prov);
          } else {
            finishSignIn(prov);
          }
        });
      });

      /* ---- Onboarding steps ---- */
      function renderObStep(index) {
        state.obStep = index;
        const step = OB_STEPS[index];

        obTitle.textContent = step.title;
        obSub.textContent = step.sub;
        obNext.textContent = step.btn;

        obBars.forEach((bar, i) => {
          bar.classList.remove("past", "current");
          if (i < index) bar.classList.add("past");
          else if (i === index) bar.classList.add("current");
        });

        obSteps.forEach((s) => {
          s.classList.remove("active");
          s.setAttribute("aria-hidden", "true");
          const inner = s.querySelector(".ob-step-inner");
          if (inner) inner.style.animation = "none";
        });

        const target = document.querySelector(`[data-ob-step="${index}"]`);
        /* Force reflow for re-triggering animation */
        void target.offsetWidth;
        target.classList.add("active");
        target.setAttribute("aria-hidden", "false");
        const inner = target.querySelector(".ob-step-inner");
        if (inner) inner.style.animation = "";

        const focusTarget = target.querySelector("button, input");
        if (focusTarget)
          setTimeout(() => focusTarget.focus({ preventScroll: true }), 80);
      }

      obNext.addEventListener("click", () => {
        if (state.obStep < OB_STEPS.length - 1) {
          renderObStep(state.obStep + 1);
        } else {
          finishOnboarding();
        }
      });

      function updatePressedState(button, selected) {
        button.classList.toggle("selected", selected);
        if (button.hasAttribute("aria-pressed"))
          button.setAttribute("aria-pressed", selected ? "true" : "false");
      }

      function updateRadioState(key, value) {
        state[key] = value;
        document.querySelectorAll(`[data-single="${key}"]`).forEach((card) => {
          const selected = card.dataset.value === value;
          card.classList.toggle("selected", selected);
          card.setAttribute("aria-checked", selected ? "true" : "false");
        });
      }

      function bindOnboardingControls() {
        obStepsWrap.addEventListener("click", (event) => {
          const multi = event.target.closest("[data-multi]");
          if (multi) {
            const key = multi.dataset.multi;
            const value = multi.dataset.value;
            const bucket = state[key];
            if (!bucket || typeof bucket.has !== "function") return;
            if (bucket.has(value)) {
              bucket.delete(value);
              updatePressedState(multi, false);
            } else {
              bucket.add(value);
              updatePressedState(multi, true);
            }
            return;
          }

          const single = event.target.closest("[data-single]");
          if (single) {
            updateRadioState(single.dataset.single, single.dataset.value);
            return;
          }

          const cityPill = event.target.closest("[data-city]");
          if (cityPill) {
            state.city = cityPill.dataset.city;
            if (cityInput) cityInput.value = state.city;
            document.querySelectorAll(".city-pill").forEach((pill) => {
              const selected = pill.dataset.city === state.city;
              pill.classList.toggle("selected", selected);
              pill.setAttribute("aria-checked", selected ? "true" : "false");
            });
          }
        });

        obStepsWrap.addEventListener("input", (event) => {
          if (event.target.id === "ob-city") {
            state.city = event.target.value;
            document.querySelectorAll(".city-pill").forEach((pill) => {
              const selected = pill.dataset.city === state.city;
              pill.classList.toggle("selected", selected);
              pill.setAttribute("aria-checked", selected ? "true" : "false");
            });
          }

          if (event.target.id === "dob") {
            state.dob = event.target.value;
          }

          if (event.target.dataset.custom) {
            state[event.target.dataset.custom] = event.target.value.trim();
          }
        });
      }

      renderOnboardingUI();

      /* ---- Finish onboarding ---- */
      function finishOnboarding() {
        const name = state.userName || "User";
        const email = state.userEmail;
        const customInterest = state.customInterest
          ? [state.customInterest]
          : [];
        const customEventStyle = state.customEventStyle
          ? [state.customEventStyle]
          : [];
        const customAudience = state.customAudience
          ? [state.customAudience]
          : [];
        const customMotivation = state.customMotivation
          ? [state.customMotivation]
          : [];
        const interests = [...state.vibes, ...customInterest];
        const eventStyles = [...state.eventStyles, ...customEventStyle];
        const audiences = [...state.audiences, ...customAudience];
        const motivations = [...state.motivations, ...customMotivation];
        const vibes = interests.join(",");
        const budget = state.budget || "$";
        const energy = state.energy || "chill";
        const selectedCity = window.EchooLocationPlatform.cityByName(
          state.city || cityInput.value,
        );
        const city = selectedCity
          ? selectedCity.name
          : (state.city || cityInput?.value || "Toronto").trim();
        const tone = state.tone || "direct";
        const gender = state.gender || "Prefer not to say";
        const dob = state.dob || "";
        const personalizationProfile = {
          interests,
          eventStyles,
          audiences,
          motivations,
          budget,
          energy,
          city,
          gender,
          dob,
          tone,
        };

        const prefs = {
          name,
          email,
          vibes,
          interests,
          eventStyles,
          audiences,
          motivations,
          budget,
          energy,
          city,
          gender,
          dob,
          tone,
          personalizationProfile,
        };
        localStorage.setItem("echoo_preferences", JSON.stringify(prefs));

        const params = new URLSearchParams({
          name,
          email,
          vibes,
          budget,
          energy,
          city,
          tone,
        });
        window.location.href = `app.html?${params.toString()}`;
      }
    </script>
  </body>
</html>
