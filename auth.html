<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>echoo sign in</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #080907;
        --panel: #11130f;
        --panel-2: #191b15;
        --ink: #f5f1e8;
        --muted: #a8a397;
        --dim: #706c62;
        --line: rgba(245, 241, 232, 0.13);
        --line-strong: rgba(245, 241, 232, 0.28);
        --signal: #e7c98e;
        --rose: #d8a2d9;
        --shadow: 0 24px 70px rgba(0, 0, 0, 0.42);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100svh;
        color: var(--ink);
        background:
          linear-gradient(180deg, rgba(8, 9, 7, 0.5), rgba(8, 9, 7, 0.94)),
          url("assets/echoo-mobile-bg.png") center / cover no-repeat,
          var(--bg);
        display: grid;
        place-items: center;
        padding: 16px;
      }

      a { color: inherit; text-decoration: none; }
      button, input { font: inherit; }

      .auth-shell {
        width: min(460px, 100%);
      }

      .back {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 14px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 850;
      }

      .back::before {
        content: "";
        width: 24px;
        height: 1px;
        background: currentColor;
      }

      .panel {
        border: 1px solid var(--line);
        background: rgba(17, 19, 15, 0.92);
        box-shadow: var(--shadow);
      }

      .auth-head {
        padding: 22px;
        border-bottom: 1px solid var(--line);
      }

      .brand {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 38px;
      }

      .brand-logo {
        width: 44px;
        height: 44px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(245, 241, 232, 0.06);
        overflow: hidden;
      }

      .brand-logo img {
        width: 124px;
        height: 88px;
        object-fit: cover;
        object-position: 50% 0%;
        transform: translate(-41px, -8px);
      }

      .mode {
        display: inline-grid;
        grid-template-columns: 1fr 1fr;
        gap: 3px;
        padding: 3px;
        border: 1px solid var(--line);
        background: rgba(8, 9, 7, 0.76);
      }

      .mode button {
        min-height: 36px;
        border: 0;
        padding: 0 12px;
        color: var(--muted);
        background: transparent;
        font-size: 12px;
        font-weight: 900;
        cursor: pointer;
      }

      .mode button.active {
        color: #10110e;
        background: var(--ink);
      }

      h1 {
        margin: 0;
        max-width: 320px;
        font-size: clamp(42px, 13vw, 64px);
        line-height: 0.9;
        letter-spacing: -0.075em;
      }

      .sub {
        margin: 12px 0 0;
        color: var(--muted);
        line-height: 1.45;
        font-weight: 650;
      }

      form {
        display: grid;
        gap: 14px;
        padding: 18px;
      }

      .field {
        display: grid;
        gap: 7px;
      }

      label {
        color: var(--dim);
        font-size: 11px;
        font-weight: 950;
        letter-spacing: 0.13em;
        text-transform: uppercase;
      }

      input {
        width: 100%;
        min-height: 58px;
        border: 1px solid var(--line);
        border-radius: 0;
        outline: 0;
        background: rgba(8, 9, 7, 0.78);
        color: var(--ink);
        padding: 0 15px;
        font-size: 16px;
        font-weight: 750;
        transition: border-color 160ms ease, background 160ms ease;
      }

      input:focus {
        border-color: var(--signal);
        background: rgba(8, 9, 7, 0.95);
      }

      .meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 750;
      }

      .submit,
      .provider {
        min-height: 58px;
        border: 1px solid var(--line);
        border-radius: 0;
        cursor: pointer;
        font-weight: 950;
        letter-spacing: -0.03em;
        transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
      }

      .submit {
        background: linear-gradient(135deg, #e4bd78 0%, #f2ddb0 42%, var(--rose) 100%);
        color: #151311;
        font-size: 18px;
      }

      .submit:hover,
      .provider:hover {
        transform: translateY(-2px);
        border-color: var(--line-strong);
      }

      .divider {
        display: flex;
        align-items: center;
        gap: 12px;
        color: var(--dim);
        font-size: 11px;
        font-weight: 950;
        letter-spacing: 0.13em;
        text-transform: uppercase;
      }

      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--line);
      }

      .provider {
        background: rgba(245, 241, 232, 0.035);
        color: var(--ink);
      }

      .signup-only { display: none; }
      .signup .signup-only { display: grid; }
    </style>
  </head>
  <body>
    <main class="auth-shell">
      <a class="back" href="index.html">Back home</a>
      <section class="panel" id="panel">
        <div class="auth-head">
          <div class="brand">
            <span class="brand-logo" aria-hidden="true"><img src="assets/echoo-new-logo.jpg" alt=""></span>
            <div class="mode" aria-label="Authentication mode">
              <button class="active" id="signin-tab" type="button">Sign in</button>
              <button id="signup-tab" type="button">Join</button>
            </div>
          </div>
          <h1 id="title">Step back into the city.</h1>
          <p class="sub" id="copy">Try the preview instantly. You can leave the fields empty until the backend is connected.</p>
        </div>

        <form id="auth-form">
          <div class="field signup-only">
            <label for="name">Name</label>
            <input id="name" autocomplete="name" placeholder="Your name">
          </div>
          <div class="field">
            <label for="email">Email</label>
            <input id="email" autocomplete="email" placeholder="name@example.com">
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input id="password" type="password" autocomplete="current-password" placeholder="Anything, or nothing">
          </div>
          <div class="meta">
            <span>Preview access</span>
            <a href="#">Need help?</a>
          </div>
          <button class="submit" type="submit" id="submit-label">Open my city</button>
          <div class="divider">or</div>
          <button class="provider" type="button" data-provider="Google">Continue with Google</button>
          <button class="provider" type="button" data-provider="Apple">Continue with Apple</button>
        </form>
      </section>
    </main>

    <script>
      const panel = document.getElementById("panel");
      const title = document.getElementById("title");
      const copy = document.getElementById("copy");
      const signIn = document.getElementById("signin-tab");
      const signUp = document.getElementById("signup-tab");
      const submitLabel = document.getElementById("submit-label");

      function setMode(mode) {
        const joining = mode === "signup";
        panel.classList.toggle("signup", joining);
        signIn.classList.toggle("active", !joining);
        signUp.classList.toggle("active", joining);
        title.textContent = joining ? "Make your city feel closer." : "Step back into the city.";
        copy.textContent = joining ? "Start a preview profile for the places, plans, and people you want nearby." : "Try the preview instantly. You can leave the fields empty until the backend is connected.";
        submitLabel.textContent = joining ? "Start my preview" : "Open my city";
      }

      function finish(provider) {
        const name = document.getElementById("name").value.trim() || provider || "Preview User";
        const email = document.getElementById("email").value.trim();
        window.location.href = `app.html?name=${encodeURIComponent(name)}&email=${encodeURIComponent(email)}`;
      }

      signIn.addEventListener("click", () => setMode("signin"));
      signUp.addEventListener("click", () => setMode("signup"));
      document.getElementById("auth-form").addEventListener("submit", (event) => {
        event.preventDefault();
        finish("");
      });
      document.querySelectorAll("[data-provider]").forEach((button) => {
        button.addEventListener("click", () => finish(`${button.dataset.provider} User`));
      });
    </script>
  </body>
</html>
