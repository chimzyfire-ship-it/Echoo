<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>echoo — sign in</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #080907;
        --panel: #11130f;
        --panel-2: #191b15;
        --ink: #f5f1e8;
        --muted: #a8a397;
        --dim: #706c62;
        --line: rgba(245, 241, 232, 0.13);
        --line-strong: rgba(245, 241, 232, 0.28);
        --signal: #e7c98e;
        --rose: #d8a2d9;
        --shadow: 0 24px 70px rgba(0, 0, 0, 0.42);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100svh;
        color: var(--ink);
        background:
          linear-gradient(180deg, rgba(8, 9, 7, 0.5), rgba(8, 9, 7, 0.94)),
          url("assets/optimized/echoo-mobile-bg-768.jpg") center / cover no-repeat,
          var(--bg);
        background:
          linear-gradient(180deg, rgba(8, 9, 7, 0.5), rgba(8, 9, 7, 0.94)),
          url("assets/optimized/echoo-mobile-bg-768.webp") center / cover no-repeat,
          var(--bg);
        display: grid;
        place-items: center;
        padding: 16px;
      }

      a { color: inherit; text-decoration: none; }
      button, input { font: inherit; }

      /* ---- Auth shell ---- */
      .auth-shell {
        width: min(460px, 100%);
      }

      .back {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 14px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 850;
      }

      .back::before {
        content: "";
        width: 24px;
        height: 1px;
        background: currentColor;
      }

      .panel {
        border: 1px solid var(--line);
        background: rgba(17, 19, 15, 0.92);
        box-shadow: var(--shadow);
      }

      .auth-head {
        padding: 22px;
        border-bottom: 1px solid var(--line);
      }

      .brand {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 38px;
      }

      .brand-logo {
        width: 44px;
        height: 44px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(245, 241, 232, 0.06);
        overflow: hidden;
      }

      .brand-logo img {
        width: 124px;
        height: 88px;
        object-fit: cover;
        object-position: 50% 0%;
        transform: translate(-41px, -8px);
      }

      .mode {
        display: inline-grid;
        grid-template-columns: 1fr 1fr;
        gap: 3px;
        padding: 3px;
        border: 1px solid var(--line);
        background: rgba(8, 9, 7, 0.76);
      }

      .mode button {
        min-height: 36px;
        border: 0;
        padding: 0 12px;
        color: var(--muted);
        background: transparent;
        font-size: 12px;
        font-weight: 900;
        cursor: pointer;
      }

      .mode button.active {
        color: #10110e;
        background: var(--ink);
      }

      h1 {
        margin: 0;
        max-width: 320px;
        font-size: clamp(42px, 13vw, 64px);
        line-height: 0.9;
        letter-spacing: -0.075em;
      }

      .sub {
        margin: 12px 0 0;
        color: var(--muted);
        line-height: 1.45;
        font-weight: 650;
      }

      form {
        display: grid;
        gap: 14px;
        padding: 18px;
      }

      .field {
        display: grid;
        gap: 7px;
      }

      label {
        color: var(--dim);
        font-size: 11px;
        font-weight: 950;
        letter-spacing: 0.13em;
        text-transform: uppercase;
      }

      input {
        width: 100%;
        min-height: 58px;
        border: 1px solid var(--line);
        border-radius: 0;
        outline: 0;
        background: rgba(8, 9, 7, 0.78);
        color: var(--ink);
        padding: 0 15px;
        font-size: 16px;
        font-weight: 750;
        transition: border-color 160ms ease, background 160ms ease;
      }

      input:focus {
        border-color: var(--signal);
        background: rgba(8, 9, 7, 0.95);
      }

      .meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 750;
      }

      .submit,
      .provider {
        min-height: 58px;
        border: 1px solid var(--line);
        border-radius: 0;
        cursor: pointer;
        font-weight: 950;
        letter-spacing: -0.03em;
        transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
      }

      .submit {
        background: linear-gradient(135deg, #e4bd78 0%, #f2ddb0 42%, var(--rose) 100%);
        color: #151311;
        font-size: 18px;
      }

      .submit:hover,
      .provider:hover {
        transform: translateY(-2px);
        border-color: var(--line-strong);
      }

      .divider {
        display: flex;
        align-items: center;
        gap: 12px;
        color: var(--dim);
        font-size: 11px;
        font-weight: 950;
        letter-spacing: 0.13em;
        text-transform: uppercase;
      }

      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--line);
      }

      .provider {
        background: rgba(245, 241, 232, 0.035);
        color: var(--ink);
      }

      .signup-only { display: none; }
      .signup .signup-only { display: grid; }

      /* ---- Fade utility ---- */
      .fade-out {
        opacity: 0;
        transform: translateY(-6px);
        pointer-events: none;
        transition: opacity 220ms ease, transform 220ms ease;
      }

      .fade-in-up {
        animation: fadeInUp 280ms ease both;
      }

      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* ---- Onboarding ---- */
      .onboarding {
        display: none;
      }

      .onboarding.visible {
        display: block;
      }

      .ob-progress {
        display: flex;
        gap: 4px;
        margin-bottom: 18px;
      }

      .ob-bar {
        flex: 1;
        height: 3px;
        border: 1px solid var(--line);
        background: transparent;
        transition: background 260ms ease, border-color 260ms ease;
      }

      .ob-bar.past {
        background: var(--muted);
        border-color: var(--muted);
      }

      .ob-bar.current {
        background: var(--signal);
        border-color: var(--signal);
      }

      .ob-panel {
        border: 1px solid var(--line);
        background: rgba(17, 19, 15, 0.92);
        box-shadow: var(--shadow);
      }

      .ob-head {
        padding: 22px;
        border-bottom: 1px solid var(--line);
      }

      .ob-head h1 {
        max-width: 360px;
        font-size: clamp(34px, 10vw, 50px);
      }

      .ob-body {
        padding: 22px;
        display: grid;
        gap: 18px;
      }

      .ob-step {
        display: none;
      }

      .ob-step.active {
        display: block;
      }

      .ob-step.active .ob-step-inner {
        animation: fadeInUp 280ms ease both;
      }

      /* Chips */
      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .chip {
        padding: 12px 18px;
        border: 1px solid var(--line);
        background: transparent;
        color: var(--ink);
        font-size: 14px;
        font-weight: 750;
        letter-spacing: -0.02em;
        cursor: pointer;
        border-radius: 0;
        transition: border-color 160ms ease, background 160ms ease;
        user-select: none;
      }

      .chip:hover {
        border-color: var(--line-strong);
      }

      .chip.selected {
        border-color: var(--signal);
        background: rgba(231, 201, 142, 0.08);
        color: var(--signal);
      }

      /* City pills */
      .city-pills {
        display: flex;
        gap: 8px;
        margin-top: 4px;
      }

      .city-pill {
        padding: 8px 16px;
        border: 1px solid var(--line);
        border-radius: 100px;
        background: transparent;
        color: var(--muted);
        font-size: 13px;
        font-weight: 750;
        cursor: pointer;
        transition: border-color 160ms ease, color 160ms ease, background 160ms ease;
      }

      .city-pill:hover {
        border-color: var(--line-strong);
        color: var(--ink);
      }

      .city-pill.selected {
        border-color: var(--signal);
        background: rgba(231, 201, 142, 0.08);
        color: var(--signal);
      }

      /* Onboarding selection cards */
      .ob-cards {
        display: grid;
        gap: 10px;
      }

      .ob-card {
        padding: 16px;
        border: 1px solid var(--line);
        background: transparent;
        cursor: pointer;
        text-align: left;
        transition: border-color 160ms ease, background 160ms ease;
      }

      .ob-card:hover {
        border-color: var(--line-strong);
      }

      .ob-card.selected {
        border-color: var(--signal);
        background: rgba(231, 201, 142, 0.08);
      }

      .ob-card .ob-card-name {
        display: block;
        color: var(--ink);
        font-size: 16px;
        font-weight: 850;
        letter-spacing: -0.03em;
        margin-bottom: 5px;
      }

      .ob-card .ob-card-desc {
        display: block;
        color: var(--muted);
        font-size: 14px;
        font-weight: 650;
        line-height: 1.4;
      }

      .ob-continue {
        width: 100%;
        min-height: 58px;
        border: 1px solid var(--line);
        border-radius: 0;
        background: linear-gradient(135deg, #e4bd78 0%, #f2ddb0 42%, var(--rose) 100%);
        color: #151311;
        font-size: 18px;
        font-weight: 950;
        letter-spacing: -0.03em;
        cursor: pointer;
        transition: transform 180ms ease, border-color 180ms ease;
        margin-top: 4px;
      }

      .ob-continue:hover {
        transform: translateY(-2px);
        border-color: var(--line-strong);
      }

      .ob-skip {
        width: 100%;
        min-height: 42px;
        border: 0;
        border-radius: 0;
        background: transparent;
        color: var(--dim);
        font-size: 13px;
        font-weight: 750;
        cursor: pointer;
        transition: color 160ms ease;
      }

      .ob-skip:hover {
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="auth-shell">
      <a class="back" href="index.html">Back home</a>

      <!-- AUTH PANEL -->
      <section class="panel" id="auth-panel">
        <div class="auth-head">
          <div class="brand">
            <span class="brand-logo" aria-hidden="true"><img src="assets/echoo-new-logo.jpg" alt=""></span>
            <div class="mode" aria-label="Authentication mode">
              <button class="active" id="signin-tab" type="button">Sign in</button>
              <button id="signup-tab" type="button">Join</button>
            </div>
          </div>
          <h1 id="title">Step back into the city.</h1>
          <p class="sub" id="copy">Your saved places, plans, and conversations are waiting.</p>
        </div>

        <form id="auth-form">
          <div class="field signup-only">
            <label for="name">Name</label>
            <input id="name" autocomplete="name" placeholder="Your name">
          </div>
          <div class="field">
            <label for="email">Email</label>
            <input id="email" autocomplete="email" placeholder="name@example.com">
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input id="password" type="password" autocomplete="current-password" placeholder="Password">
          </div>
          <div class="meta">
            <span>Secured by Echoo</span>
            <a href="#">Need help?</a>
          </div>
          <button class="submit" type="submit" id="submit-label">Open my city</button>
          <div class="divider">or</div>
          <button class="provider" type="button" data-provider="Google">Continue with Google</button>
          <button class="provider" type="button" data-provider="Apple">Continue with Apple</button>
        </form>
      </section>

      <!-- ONBOARDING PANEL -->
      <section class="onboarding" id="onboarding">
        <div class="ob-progress">
          <div class="ob-bar current" data-step="0"></div>
          <div class="ob-bar" data-step="1"></div>
          <div class="ob-bar" data-step="2"></div>
          <div class="ob-bar" data-step="3"></div>
          <div class="ob-bar" data-step="4"></div>
        </div>
        <div class="ob-panel">
          <div class="ob-head">
            <h1 id="ob-title">What draws you out?</h1>
            <p class="sub" id="ob-sub">Pick what sounds like your kind of night.</p>
          </div>
          <div class="ob-body">

            <!-- Step 1: Vibes -->
            <div class="ob-step active" data-ob-step="0">
              <div class="ob-step-inner">
                <div class="chips">
                  <button type="button" class="chip" data-vibe="Nightclubs &amp; DJs">Nightclubs &amp; DJs</button>
                  <button type="button" class="chip" data-vibe="Hiking &amp; Outdoor">Hiking &amp; Outdoor</button>
                  <button type="button" class="chip" data-vibe="Gaming &amp; Arcades">Gaming &amp; Arcades</button>
                  <button type="button" class="chip" data-vibe="Speakeasies &amp; Cocktails">Speakeasies &amp; Cocktails</button>
                  <button type="button" class="chip" data-vibe="Coffee Shop Crawls">Coffee Shop Crawls</button>
                  <button type="button" class="chip" data-vibe="Concerts &amp; Festivals">Concerts &amp; Festivals</button>
                  <button type="button" class="chip" data-vibe="Beaches &amp; Parks">Beaches &amp; Parks</button>
                  <button type="button" class="chip" data-vibe="Museums &amp; History">Museums &amp; History</button>
                  <button type="button" class="chip" data-vibe="Live music">Live music</button>
                  <button type="button" class="chip" data-vibe="Late-night cinema">Late-night cinema</button>
                  <button type="button" class="chip" data-vibe="Cozy date spots">Cozy date spots</button>
                  <button type="button" class="chip" data-vibe="Rooftop bars">Rooftop bars</button>
                  <button type="button" class="chip" data-vibe="Art &amp; galleries">Art &amp; galleries</button>
                  <button type="button" class="chip" data-vibe="Street food crawls">Street food crawls</button>
                  <button type="button" class="chip" data-vibe="Sports">Sports</button>
                </div>
              </div>
            </div>

            <!-- Step 2: Budget -->
            <div class="ob-step" data-ob-step="1">
              <div class="ob-step-inner">
                <div class="ob-cards">
                  <button type="button" class="ob-card selected" data-budget="$">
                    <span class="ob-card-name">Low-key &amp; cheap ($)</span>
                    <span class="ob-card-desc">Casual hangs. Street bites, local pubs, free galleries.</span>
                  </button>
                  <button type="button" class="ob-card" data-budget="$$">
                    <span class="ob-card-name">Mid-range &amp; curated ($$)</span>
                    <span class="ob-card-desc">Reasonable spends. Cozy dining, coffee dates, indie shows.</span>
                  </button>
                  <button type="button" class="ob-card" data-budget="$$$">
                    <span class="ob-card-name">Premium &amp; splurge ($$$)</span>
                    <span class="ob-card-desc">High-end experiences. Speakeasies, fine dining, live theater.</span>
                  </button>
                </div>
              </div>
            </div>

            <!-- Step 3: Energy Level -->
            <div class="ob-step" data-ob-step="2">
              <div class="ob-step-inner">
                <div class="ob-cards">
                  <button type="button" class="ob-card selected" data-energy="chill">
                    <span class="ob-card-name">Chill &amp; Intimate</span>
                    <span class="ob-card-desc">Soft music, quiet conversation, comfortable lounge seating.</span>
                  </button>
                  <button type="button" class="ob-card" data-energy="hype">
                    <span class="ob-card-name">Vibrant &amp; Loud</span>
                    <span class="ob-card-desc">Live performance, high volume, crowded spaces, games.</span>
                  </button>
                  <button type="button" class="ob-card" data-energy="curious">
                    <span class="ob-card-name">Spontaneous &amp; Mixed</span>
                    <span class="ob-card-desc">Exploratory crawls, surprise detours, a mix of quiet and loud.</span>
                  </button>
                </div>
              </div>
            </div>

            <!-- Step 4: City -->
            <div class="ob-step" data-ob-step="3">
              <div class="ob-step-inner">
                <div class="field">
                  <label for="ob-city">Your city</label>
                  <input id="ob-city" type="text" value="Toronto" placeholder="Your city">
                </div>
                <div class="city-pills">
                  <button type="button" class="city-pill selected" data-city="Toronto">Toronto</button>
                  <button type="button" class="city-pill" data-city="Vancouver">Vancouver</button>
                  <button type="button" class="city-pill" data-city="Montreal">Montreal</button>
                </div>
              </div>
            </div>

            <!-- Step 5: Tone -->
            <div class="ob-step" data-ob-step="4">
              <div class="ob-step-inner">
                <div class="ob-cards">
                  <button type="button" class="ob-card selected" data-tone="direct">
                    <span class="ob-card-name">Direct &amp; chill</span>
                    <span class="ob-card-desc">Short answers. No fluff. Just the move.</span>
                  </button>
                  <button type="button" class="ob-card" data-tone="detailed">
                    <span class="ob-card-name">Detailed curator</span>
                    <span class="ob-card-desc">Context, alternatives, and the full picture.</span>
                  </button>
                </div>
              </div>
            </div>

            <button type="button" class="ob-continue" id="ob-next">Next</button>
          </div>
        </div>
      </section>
    </main>

    <script>
      /* Diagnostic logger for redirects */
      window.addEventListener('beforeunload', () => {
        const history = JSON.parse(sessionStorage.getItem('echoo_unload_log') || '[]');
        history.push({ time: new Date().toISOString(), url: window.location.href, stack: new Error().stack });
        sessionStorage.setItem('echoo_unload_log', JSON.stringify(history.slice(-10)));
      });

      // Check stored preference for pre-detected city
      let preDetectedCity = "Toronto";
      try {
        const stored = localStorage.getItem("echoo_preferences");
        if (stored) {
          preDetectedCity = JSON.parse(stored).city || "Toronto";
        }
      } catch(e) {}

      /* ---- State ---- */
      const state = {
        mode: "signin",        // "signin" | "signup"
        obStep: 0,
        vibes: new Set(),
        budget: "$",
        energy: "chill",
        city: preDetectedCity,
        tone: "direct",
        userName: "",
        userEmail: "",
      };

      /* ---- DOM refs ---- */
      const authPanel   = document.getElementById("auth-panel");
      const onboarding  = document.getElementById("onboarding");
      const title       = document.getElementById("title");
      const copy        = document.getElementById("copy");
      const signInTab   = document.getElementById("signin-tab");
      const signUpTab   = document.getElementById("signup-tab");
      const submitLabel = document.getElementById("submit-label");
      const obTitle     = document.getElementById("ob-title");
      const obSub       = document.getElementById("ob-sub");
      const obNext      = document.getElementById("ob-next");
      const obBars      = document.querySelectorAll(".ob-bar");
      const obSteps     = document.querySelectorAll(".ob-step");
      const cityInput   = document.getElementById("ob-city");

      /* ---- Copy maps ---- */
      const COPY = {
        signin: {
          title: "Step back into the city.",
          sub: "Your saved places, plans, and conversations are waiting.",
          btn: "Open my city",
        },
        signup: {
          title: "Make your city feel closer.",
          sub: "Curate your taste, sync with friends, and discover plans worth saying yes to.",
          btn: "Start exploring",
        },
      };

      const OB_STEPS = [
        { title: "What draws you out?",           sub: "Pick what sounds like your kind of night.", btn: "Next" },
        { title: "What's the budget vibe?",       sub: "We'll tailor suggestions to your spend comfort.", btn: "Next" },
        { title: "What's your energy speed?",     sub: "Tell us the pace you want to keep.", btn: "Next" },
        { title: "Where's home base?",            sub: "We'll find what's close and worth it.",   btn: "Next" },
        { title: "How should Echoo talk to you?",  sub: "Pick a voice for your recommendations.",   btn: "Let's go" },
      ];

      /* ---- Mode switching ---- */
      function setMode(mode) {
        state.mode = mode;
        const joining = mode === "signup";
        authPanel.classList.toggle("signup", joining);
        signInTab.classList.toggle("active", !joining);
        signUpTab.classList.toggle("active", joining);

        const c = joining ? COPY.signup : COPY.signin;
        title.textContent       = c.title;
        copy.textContent        = c.sub;
        submitLabel.textContent = c.btn;
      }

      signInTab.addEventListener("click", () => setMode("signin"));
      signUpTab.addEventListener("click", () => setMode("signup"));

      /* ---- Auth submit ---- */
      function captureUser(providerName) {
        state.userName  = document.getElementById("name").value.trim() || providerName || "";
        state.userEmail = document.getElementById("email").value.trim();
      }

      function finishSignIn(providerName) {
        const name  = document.getElementById("name").value.trim() || providerName || "User";
        const email = document.getElementById("email").value.trim();
        window.location.href = `app.html?name=${encodeURIComponent(name)}&email=${encodeURIComponent(email)}`;
      }

      function startOnboarding(providerName) {
        captureUser(providerName);
        authPanel.classList.add("fade-out");
        setTimeout(() => {
          authPanel.style.display = "none";
          onboarding.classList.add("visible");
          renderObStep(0);
        }, 240);
      }

      document.getElementById("auth-form").addEventListener("submit", (e) => {
        e.preventDefault();
        if (state.mode === "signup") {
          startOnboarding("");
        } else {
          finishSignIn("");
        }
      });

      document.querySelectorAll("[data-provider]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const prov = btn.dataset.provider + " User";
          if (state.mode === "signup") {
            startOnboarding(prov);
          } else {
            finishSignIn(prov);
          }
        });
      });

      /* ---- Onboarding steps ---- */
      function renderObStep(index) {
        state.obStep = index;
        const step = OB_STEPS[index];

        obTitle.textContent = step.title;
        obSub.textContent   = step.sub;
        obNext.textContent  = step.btn;

        obBars.forEach((bar, i) => {
          bar.classList.remove("past", "current");
          if (i < index)      bar.classList.add("past");
          else if (i === index) bar.classList.add("current");
        });

        obSteps.forEach((s) => {
          s.classList.remove("active");
          const inner = s.querySelector(".ob-step-inner");
          if (inner) inner.style.animation = "none";
        });

        const target = document.querySelector(`[data-ob-step="${index}"]`);
        /* Force reflow for re-triggering animation */
        void target.offsetWidth;
        target.classList.add("active");
        const inner = target.querySelector(".ob-step-inner");
        if (inner) inner.style.animation = "";
      }

      obNext.addEventListener("click", () => {
        if (state.obStep < 4) {
          renderObStep(state.obStep + 1);
        } else {
          finishOnboarding();
        }
      });

      /* ---- Chip selection (vibes) ---- */
      document.querySelectorAll(".chip").forEach((chip) => {
        chip.addEventListener("click", () => {
          const v = chip.dataset.vibe;
          if (state.vibes.has(v)) {
            state.vibes.delete(v);
            chip.classList.remove("selected");
          } else {
            state.vibes.add(v);
            chip.classList.add("selected");
          }
        });
      });

      /* ---- Budget selection ---- */
      document.querySelectorAll("[data-budget]").forEach((card) => {
        card.addEventListener("click", () => {
          state.budget = card.dataset.budget;
          document.querySelectorAll("[data-budget]").forEach((c) => c.classList.remove("selected"));
          card.classList.add("selected");
        });
      });

      /* ---- Energy selection ---- */
      document.querySelectorAll("[data-energy]").forEach((card) => {
        card.addEventListener("click", () => {
          state.energy = card.dataset.energy;
          document.querySelectorAll("[data-energy]").forEach((c) => c.classList.remove("selected"));
          card.classList.add("selected");
        });
      });

      /* ---- City pills ---- */
      document.querySelectorAll(".city-pill").forEach((pill) => {
        pill.addEventListener("click", () => {
          state.city = pill.dataset.city;
          cityInput.value = pill.dataset.city;
          document.querySelectorAll(".city-pill").forEach((p) => p.classList.remove("selected"));
          pill.classList.add("selected");
        });
      });

      cityInput.addEventListener("input", () => {
        state.city = cityInput.value;
        document.querySelectorAll(".city-pill").forEach((p) => {
          p.classList.toggle("selected", p.dataset.city === cityInput.value);
        });
      });

      /* ---- Tone selection ---- */
      document.querySelectorAll("[data-tone]").forEach((card) => {
        card.addEventListener("click", () => {
          state.tone = card.dataset.tone;
          document.querySelectorAll("[data-tone]").forEach((c) => c.classList.remove("selected"));
          card.classList.add("selected");
        });
      });

      // Initialize city input and pills selection based on pre-detected city
      if (cityInput) {
        cityInput.value = state.city;
        document.querySelectorAll(".city-pill").forEach((p) => {
          p.classList.toggle("selected", p.dataset.city === state.city);
        });
      }

      /* ---- Finish onboarding ---- */
      function finishOnboarding() {
        const name  = state.userName || "User";
        const email = state.userEmail;
        const vibes = [...state.vibes].join(",");
        const budget = state.budget || "$";
        const energy = state.energy || "chill";
        const city  = state.city || cityInput.value || "Toronto";
        const tone  = state.tone || "direct";

        const prefs = { name, email, vibes, budget, energy, city, tone };
        localStorage.setItem("echoo_preferences", JSON.stringify(prefs));

        const params = new URLSearchParams(prefs);
        window.location.href = `app.html?${params.toString()}`;
      }
    </script>
  </body>
</html>
