<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>echoo profile</title>
    <style>
      :root {
        color-scheme: dark;
        --ink: #f8f5ef;
        --muted: #aaa29a;
        --soft: rgba(248, 245, 239, 0.72);
        --line: rgba(248, 245, 239, 0.12);
        --line-strong: rgba(248, 245, 239, 0.2);
        --glass: rgba(30, 30, 29, 0.72);
        --peach: #f7d5b2;
        --black: #050505;
        --panel: #131313;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      /* ── Viewport stability: lock horizontal scroll + native-app feel ── */
      html,
      body {
        max-width: 100%;
        overflow-x: hidden;
        overflow-x: clip;
        overscroll-behavior-y: none;
        -webkit-text-size-adjust: 100%;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        position: relative;
        overflow-wrap: break-word;
      }
      img,
      video,
      svg,
      canvas,
      iframe,
      table {
        max-width: 100%;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
        background: #000;
        color: var(--ink);
      }

      body {
        min-height: 100svh;
        display: grid;
        justify-items: center;
        align-items: start;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        -webkit-tap-highlight-color: transparent;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      /* ── App shell ── */
      .app-shell {
        width: min(100vw, 430px);
        min-height: 100svh;
        position: relative;
        isolation: isolate;
        overflow: hidden;
        background:
          radial-gradient(
            circle at 50% -4%,
            rgba(255, 255, 255, 0.14),
            transparent 18rem
          ),
          radial-gradient(
            circle at 16% 46%,
            rgba(255, 212, 166, 0.08),
            transparent 14rem
          ),
          linear-gradient(145deg, #161716 0%, #080808 44%, #030303 100%);
      }

      .app-shell::after {
        position: absolute;
        inset: 0;
        z-index: -1;
        content: "";
        background:
          linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.035),
            transparent 18%,
            transparent 82%,
            rgba(255, 255, 255, 0.028)
          ),
          radial-gradient(
            ellipse at center,
            transparent 48%,
            rgba(0, 0, 0, 0.62) 100%
          );
        pointer-events: none;
      }

      /* ── Topbar ── */
      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: calc(14px + env(safe-area-inset-top)) 27px 12px;
        background: rgba(8, 8, 8, 0.6);
        backdrop-filter: blur(22px);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        width: 96px;
        height: 34px;
        overflow: hidden;
      }

      .brand img {
        display: block;
        width: 96px;
        height: auto;
        filter: brightness(1.2) contrast(1.05);
      }

      .profile-link {
        width: 34px;
        height: 34px;
        border: 2px solid rgba(248, 245, 239, 0.7);
        border-radius: 50%;
        position: relative;
        opacity: 0.9;
      }

      .profile-link::before {
        position: absolute;
        top: 6px;
        left: 50%;
        width: 8px;
        height: 8px;
        border: 2px solid currentColor;
        border-radius: 50%;
        content: "";
        transform: translateX(-50%);
      }

      .profile-link::after {
        position: absolute;
        left: 7px;
        right: 7px;
        bottom: 6px;
        height: 10px;
        border: 2px solid currentColor;
        border-bottom: 0;
        border-radius: 14px 14px 0 0;
        content: "";
      }

      /* ── Shell ── */
      .shell {
        padding: 18px 27px calc(110px + env(safe-area-inset-bottom));
      }

      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }

      h1 {
        margin-bottom: 0;
        font-size: clamp(42px, 13vw, 56px);
        line-height: 1.02;
        font-weight: 820;
        letter-spacing: 0;
        text-wrap: balance;
      }

      /* ═══════════════════════════════════════════════
         AUTH PANEL (sign in / sign up)
         ═══════════════════════════════════════════════ */
      .auth-section {
        display: grid;
        gap: 18px;
        padding: 10px 0 0;
      }

      .auth-card {
        border-radius: 14px;
        background: rgba(248, 245, 239, 0.05);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
        overflow: hidden;
      }

      .auth-head {
        padding: 22px;
        border-bottom: 1px solid var(--line);
      }

      .mode {
        display: inline-grid;
        grid-template-columns: 1fr 1fr;
        gap: 3px;
        padding: 3px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(8, 8, 8, 0.6);
        margin-bottom: 24px;
      }

      .mode button {
        min-height: 36px;
        border: 0;
        padding: 0 14px;
        color: rgba(248, 245, 239, 0.52);
        background: transparent;
        font-size: 12px;
        font-weight: 650;
        cursor: pointer;
        border-radius: 999px;
        transition:
          color 180ms ease,
          background 180ms ease;
      }

      .mode button.active {
        color: #111;
        background: var(--ink);
      }

      .auth-head .sub {
        margin: 12px 0 0;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.42;
        font-weight: 520;
      }

      .auth-form {
        display: grid;
        gap: 14px;
        padding: 18px 22px;
      }

      .field {
        display: grid;
        gap: 7px;
      }

      .field label {
        color: rgba(248, 245, 239, 0.5);
        font-size: 12px;
        font-weight: 650;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      input {
        width: 100%;
        min-height: 54px;
        border: 1px solid var(--line);
        border-radius: 0;
        outline: 0;
        background: rgba(8, 8, 8, 0.6);
        color: var(--ink);
        padding: 0 15px;
        font-size: 16px;
        font-weight: 560;
        transition:
          border-color 180ms ease,
          background 180ms ease;
      }

      input:focus {
        border-color: var(--peach);
        background: rgba(8, 8, 8, 0.9);
      }

      input::placeholder {
        color: rgba(248, 245, 239, 0.38);
        opacity: 1;
      }

      .auth-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        color: rgba(248, 245, 239, 0.42);
        font-size: 11px;
        font-weight: 520;
      }

      .auth-status {
        min-height: 18px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 560;
        line-height: 1.4;
      }

      .auth-status.error {
        color: #ffb4a8;
      }

      .submit-btn {
        min-height: 50px;
        border: 0;
        border-radius: 999px;
        cursor: pointer;
        font-weight: 680;
        font-size: 15px;
        letter-spacing: 0;
        background: var(--peach);
        color: #111;
        transition:
          transform 180ms ease,
          opacity 180ms ease;
      }

      .submit-btn:hover {
        transform: translateY(-2px);
      }

      .submit-btn:active {
        transform: translateY(0);
      }

      .divider {
        display: flex;
        align-items: center;
        gap: 12px;
        color: rgba(248, 245, 239, 0.36);
        font-size: 11px;
        font-weight: 620;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--line);
      }

      .provider-btn {
        min-height: 50px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(248, 245, 239, 0.05);
        color: var(--ink);
        cursor: pointer;
        font-weight: 620;
        font-size: 14px;
        transition:
          transform 180ms ease,
          border-color 180ms ease,
          background 180ms ease;
      }

      .provider-btn:hover {
        transform: translateY(-2px);
        border-color: var(--line-strong);
        background: rgba(248, 245, 239, 0.08);
      }

      .signup-only {
        display: none;
      }
      .signup .signup-only {
        display: grid;
      }

      /* ── Fade utility ── */
      .fade-out {
        opacity: 0;
        transform: translateY(-6px);
        pointer-events: none;
        transition:
          opacity 220ms ease,
          transform 220ms ease;
      }

      .fade-in-up {
        animation: fadeInUp 280ms ease both;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ═══════════════════════════════════════════════
         ONBOARDING
         ═══════════════════════════════════════════════ */
      .onboarding {
        display: none;
      }

      .onboarding.visible {
        display: block;
      }

      .ob-progress {
        display: grid;
        gap: 4px;
        margin-bottom: 14px;
      }

      .ob-bar {
        flex: 1;
        height: 3px;
        border-radius: 999px;
        background: rgba(248, 245, 239, 0.1);
        transition: background 260ms ease;
      }

      .ob-bar.past {
        background: var(--muted);
      }

      .ob-bar.current {
        background: var(--peach);
      }

      .ob-panel {
        border-radius: 14px;
        background:
          linear-gradient(135deg, rgba(247, 213, 178, 0.08), transparent 34%),
          rgba(248, 245, 239, 0.05);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
        overflow: hidden;
      }

      .ob-head {
        padding: 22px;
        border-bottom: 1px solid var(--line);
      }

      .ob-head h1 {
        max-width: 540px;
        font-size: clamp(32px, 8vw, 48px);
      }

      .ob-body {
        padding: 20px 22px;
        display: grid;
        gap: 16px;
      }

      .ob-scroll {
        max-height: min(57svh, 600px);
        overflow: auto;
        padding: 2px 5px 2px 0;
        scrollbar-color: rgba(248, 245, 239, 0.24) transparent;
      }

      .ob-step {
        display: none;
      }

      .ob-step.active {
        display: block;
      }

      .ob-step.active .ob-step-inner {
        animation: fadeInUp 280ms ease both;
      }

      /* Chips */
      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 9px;
      }

      .chip {
        position: relative;
        min-height: 42px;
        padding: 10px 15px;
        border: 1px solid var(--line);
        background: rgba(8, 8, 8, 0.4);
        color: var(--ink);
        font-size: 14px;
        font-weight: 620;
        letter-spacing: -0.02em;
        cursor: pointer;
        border-radius: 999px;
        transition:
          border-color 180ms ease,
          background 180ms ease,
          color 180ms ease,
          transform 180ms ease;
        user-select: none;
      }

      .chip:hover {
        border-color: var(--line-strong);
        transform: translateY(-1px);
      }

      .chip.selected {
        border-color: rgba(247, 213, 178, 0.72);
        background: rgba(247, 213, 178, 0.12);
        color: var(--peach);
      }

      .chip.selected::after {
        content: "";
        display: inline-block;
        width: 7px;
        height: 7px;
        margin-left: 10px;
        border-radius: 50%;
        background: var(--peach);
        vertical-align: 1px;
      }

      /* City pills */
      .city-pills {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 4px;
      }

      .city-pill {
        padding: 8px 16px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: transparent;
        color: var(--muted);
        font-size: 13px;
        font-weight: 620;
        cursor: pointer;
        transition:
          border-color 180ms ease,
          color 180ms ease,
          background 180ms ease;
      }

      .city-pill:hover {
        border-color: var(--line-strong);
        color: var(--ink);
      }

      .city-pill.selected {
        border-color: var(--peach);
        background: rgba(247, 213, 178, 0.08);
        color: var(--peach);
      }

      /* Onboarding selection cards */
      .ob-cards {
        display: grid;
        gap: 10px;
      }

      .ob-cards.two {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .ob-card {
        min-height: 88px;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: rgba(8, 8, 8, 0.4);
        cursor: pointer;
        text-align: left;
        transition:
          border-color 180ms ease,
          background 180ms ease,
          transform 180ms ease;
      }

      .ob-card:hover {
        border-color: var(--line-strong);
      }

      .ob-card.selected {
        border-color: rgba(247, 213, 178, 0.72);
        background: rgba(247, 213, 178, 0.1);
      }

      .ob-card .ob-card-name {
        display: block;
        color: var(--ink);
        font-size: 16px;
        font-weight: 680;
        letter-spacing: -0.03em;
        margin-bottom: 5px;
      }

      .ob-card .ob-card-desc {
        display: block;
        color: var(--muted);
        font-size: 13px;
        font-weight: 520;
        line-height: 1.4;
      }

      .ob-section {
        display: grid;
        gap: 11px;
        margin-bottom: 22px;
      }

      .ob-section:last-child {
        margin-bottom: 0;
      }

      .ob-section-title {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--ink);
        font-size: 15px;
        font-weight: 680;
        letter-spacing: -0.03em;
      }

      .ob-section-title::before {
        content: "";
        width: 18px;
        height: 1px;
        background: var(--peach);
      }

      .preference-fieldset {
        min-width: 0;
        margin: 0;
        padding: 0;
        border: 0;
      }

      .custom-field {
        display: flex;
        align-items: center;
        gap: 10px;
        width: fit-content;
        min-height: 44px;
        max-width: 100%;
        border: 1px solid var(--line);
        background: rgba(8, 8, 8, 0.5);
        padding: 0 14px;
        border-radius: 999px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 620;
        margin-top: 8px;
      }

      .custom-field input {
        min-height: 42px;
        width: min(220px, 54vw);
        border: 0;
        background: transparent;
        padding: 0;
        font-size: 14px;
      }

      .identity-grid {
        display: grid;
        gap: 12px;
      }

      .privacy-note {
        color: var(--muted);
        font-size: 13px;
        font-weight: 560;
        line-height: 1.45;
      }

      .ob-continue {
        width: 100%;
        min-height: 50px;
        border: 0;
        border-radius: 999px;
        background: var(--peach);
        color: #111;
        font-size: 15px;
        font-weight: 680;
        cursor: pointer;
        transition:
          transform 180ms ease,
          opacity 180ms ease;
        margin-top: 4px;
      }

      .ob-continue:hover {
        transform: translateY(-2px);
      }

      .ob-skip {
        width: 100%;
        min-height: 42px;
        border: 0;
        border-radius: 0;
        background: transparent;
        color: rgba(248, 245, 239, 0.42);
        font-size: 13px;
        font-weight: 560;
        cursor: pointer;
        transition: color 180ms ease;
      }

      .ob-skip:hover {
        color: var(--muted);
      }

      /* ═══════════════════════════════════════════════
         PROFILE DASHBOARD
         ═══════════════════════════════════════════════ */
      .profile-section {
        display: none;
        padding: 10px 0 0;
      }

      .profile-section.visible {
        display: grid;
        gap: 24px;
      }

      .profile-header {
        display: grid;
        justify-items: center;
        gap: 14px;
        padding: 10px 0 8px;
      }

      .avatar-circle {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: var(--peach);
        color: #111;
        font-size: 24px;
        font-weight: 780;
        letter-spacing: -0.02em;
      }

      .profile-name {
        font-size: 24px;
        font-weight: 680;
        text-align: center;
      }

      .profile-email {
        margin-top: -8px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 520;
        text-align: center;
      }

      .profile-cards {
        display: grid;
        gap: 8px;
      }

      .profile-card {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-height: 56px;
        padding: 14px 18px;
        border-radius: 14px;
        background: rgba(248, 245, 239, 0.05);
        transition: background 180ms ease;
      }

      .profile-card:hover {
        background: rgba(248, 245, 239, 0.08);
      }

      .profile-card-label {
        color: rgba(248, 245, 239, 0.48);
        font-size: 12px;
        font-weight: 650;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .profile-card-value {
        color: var(--ink);
        font-size: 15px;
        font-weight: 620;
        text-align: right;
      }

      .signout-btn {
        width: 100%;
        min-height: 46px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: transparent;
        color: var(--muted);
        font-size: 13px;
        font-weight: 620;
        cursor: pointer;
        transition:
          color 180ms ease,
          border-color 180ms ease;
        margin-top: 8px;
      }

      .signout-btn:hover {
        color: var(--ink);
        border-color: var(--line-strong);
      }

      /* ── Bottom navigation ── */
      .bottom-nav {
        position: fixed;
        left: 50%;
        bottom: 12px;
        z-index: 30;
        width: min(376px, calc(100% - 52px));
        min-height: 72px;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 6px;
        padding: 10px 15px 8px;
        border: 1px solid rgba(248, 245, 239, 0.06);
        border-radius: 28px;
        background: rgba(25, 25, 24, 0.82);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.05),
          0 18px 44px rgba(0, 0, 0, 0.42);
        backdrop-filter: blur(26px);
        transform: translateX(-50%);
      }

      .nav-link {
        min-width: 0;
        display: grid;
        justify-items: center;
        align-content: center;
        gap: 5px;
        color: rgba(248, 245, 239, 0.62);
        font-size: 12px;
        font-weight: 560;
      }

      .nav-link.active {
        color: var(--peach);
      }

      .nav-link svg {
        width: 27px;
        height: 27px;
        stroke: currentColor;
        stroke-width: 1.8;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .nav-link.active svg {
        fill: currentColor;
        stroke-width: 0;
      }

      @media (max-width: 374px) {
        .shell {
          padding-inline: 20px;
        }

        .ob-cards.two {
          grid-template-columns: 1fr;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          scroll-behavior: auto !important;
          transition-duration: 0.01ms !important;
          animation-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar" aria-label="Echoo">
        <a class="brand" href="index.html" aria-label="Echoo home">
          <img src="assets/echoo-wordmark.png" alt="echoo" />
        </a>
        <a
          class="profile-link"
          href="auth.html"
          aria-label="Open your profile"
        ></a>
      </header>

      <main class="shell">
        <!-- ─── AUTH PANEL ─── -->
        <section class="auth-section" id="auth-panel">
          <div class="auth-card">
            <div class="auth-head">
              <div class="mode" aria-label="Authentication mode">
                <button class="active" id="signin-tab" type="button">
                  Sign in
                </button>
                <button id="signup-tab" type="button">Join</button>
              </div>
              <h1 id="title">Step back into the city.</h1>
              <p class="sub" id="copy">
                Your saved places, plans, and conversations are waiting.
              </p>
            </div>

            <form class="auth-form" id="auth-form">
              <div class="field signup-only">
                <label for="name">Name</label>
                <input id="name" autocomplete="name" placeholder="Your name" />
              </div>
              <div class="field">
                <label for="email">Email</label>
                <input
                  id="email"
                  type="email"
                  autocomplete="email"
                  placeholder="name@example.com"
                  required
                />
              </div>
              <div class="field">
                <label for="password">Password</label>
                <input
                  id="password"
                  type="password"
                  autocomplete="current-password"
                  placeholder="Password"
                  minlength="6"
                  required
                />
              </div>
              <div class="field signup-only" style="margin: 6px 0">
                <label
                  class="checkbox-container"
                  style="
                    display: flex;
                    align-items: flex-start;
                    gap: 10px;
                    cursor: pointer;
                    color: var(--muted);
                    font-size: 13px;
                    font-weight: 520;
                    line-height: 1.45;
                    text-transform: none;
                    letter-spacing: normal;
                  "
                >
                  <input
                    id="pipeda-consent"
                    type="checkbox"
                    required
                    style="
                      width: auto;
                      min-height: auto;
                      margin-top: 3px;
                      cursor: pointer;
                    "
                  />
                  <span
                    >By creating an Echoo account, you agree to our
                    <a

          target.searchParams.set("city", preferences.city);

        if (preferences.budget && !target.searchParams.has("budget")) {
          target.searchParams.set("budget", preferences.budget);

        const file = target.pathname.split("/").pop() || "app.html";

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function chip(label, key) {
        return `<button type="button" class="chip" data-multi="${escapeHtml(key)}" data-value="${escapeHtml(label)}" aria-pressed="false">${escapeHtml(label)}</button>`;
      }

      function renderCustomInput(id, label) {
        return `
          <label class="custom-field" for="${id}">
            <span>${escapeHtml(label)}</span>
            <input id="${id}" data-custom="${id}" placeholder="Type here">
          </label>
        `;
      }

      function renderOnboardingUI() {
        obProgress.innerHTML = OB_STEPS.map(
          (_, i) =>
            `<div class="ob-bar${i === 0 ? " current" : ""}" data-step="${i}"></div>`,
        ).join("");
        obProgress.style.gridTemplateColumns = `repeat(${OB_STEPS.length}, 1fr)`;

        obStepsWrap.innerHTML = OB_STEPS.map((step, index) => {
          let body = "";

          if (step.type === "interest-map") {
            body = `
              <div class="ob-scroll">
                <fieldset class="preference-fieldset">
                  <legend class="sr-only">Interest categories</legend>
                  ${INTEREST_SECTIONS.map(
                    (section) => `
                    <div class="ob-section">
                      <div class="ob-section-title">${escapeHtml(section.title)}</div>
                      <div class="chips">${section.options.map((option) => chip(option, "vibes")).join("")}</div>

                  `,
                  ).join("")}
                  ${renderCustomInput("customInterest", "Add another interest")}
                </fieldset>
              </div>
            `;
          }

          if (step.type === "multi") {
            body = `
              <fieldset class="preference-fieldset">
                <legend class="sr-only">${escapeHtml(step.title)}</legend>
                <div class="chips">${step.options.map((option) => chip(option, step.key)).join("")}</div>
                ${renderCustomInput(step.customKey, step.customLabel)}
              </fieldset>
            `;
          }

          if (step.type === "cards") {
            body = `
              <div class="ob-cards two" role="radiogroup" aria-label="${escapeHtml(step.title)}">
                ${step.options
                  .map(
                    (option) => `
                  <button type="button" class="ob-card${state[step.key] === option.value ? " selected" : ""}" data-single="${escapeHtml(step.key)}" data-value="${escapeHtml(option.value)}" role="radio" aria-checked="${state[step.key] === option.value ? "true" : "false"}">

                  .join("")}

            body = `
              <div class="field">
                <label for="ob-city">Your city</label>
                <input id="ob-city" type="text" value="${escapeHtml(state.city)}" placeholder="Your city" autocomplete="address-level2">
              </div>

      /* ── Mode switching ── */
      function setMode(mode) {
        state.mode = mode;
        const joining = mode === "signup";
        authPanel.classList.toggle("signup", joining);
        signInTab.classList.toggle("active", !joining);
        signUpTab.classList.toggle("active", joining);

        const c = joining ? COPY.signup : COPY.signin;
        title.textContent = c.title;
        copy.textContent = c.sub;
        submitLabel.textContent = c.btn;
        passwordInput.autocomplete = joining
          ? "new-password"
          : "current-password";
        setStatus("");
      }

      signInTab.addEventListener("click", () => setMode("signin"));
      signUpTab.addEventListener("click", () => setMode("signup"));

      /* ── Auth submit ── */
      function captureUser(providerName) {
        state.userName =
          nameInput.value.trim() ||
          providerName ||
          emailInput.value.trim().split("@")[0] ||
          "";
        state.userEmail = emailInput.value.trim();
      }

      async function finishSignIn() {
        if (OPEN_AUTH_BUTTONS_DIRECTLY_TO_APP) {
          openAppFromAuth();
          return;
        }
        if (!window.EchooAuth?.client) {
          setStatus("Supabase auth is not available on this page.", true);
          return;
        }
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        if (!email || !password) {
          setStatus("Use your email and password to continue.", true);
          return;
        }

        setBusy(true, "Opening…");
        setStatus("Checking your Echoo account…");
        try {
          const { data, error } =
            await window.EchooAuth.client.auth.signInWithPassword({
              email,
              password,
            });
          if (error) throw error;
          state.userName =
            data.user?.user_metadata?.display_name ||
            email.split("@")[0] ||
            "User";
          state.userEmail = data.user?.email || email;

          const profileState = await window.EchooAuth.loadOnboardingProfile();
          if (profileState.ok) {
            redirectAfterAuth(profileState.preferences);
            return;
          }
          setStatus(
            "Finish your Echoo personality once, then it stays with your account.",
          );
          startOnboarding("");
        } catch (error) {
          setStatus(error.message || "Could not sign in.", true);
        } finally {
          setBusy(false);
        }
      }

      function startOnboarding(providerName) {
        captureUser(providerName);
        authPanel.classList.add("fade-out");
        setTimeout(() => {
          authPanel.style.display = "none";
          onboarding.classList.add("visible");
          renderObStep(0);
        }, 240);
      }

      async function startSignup() {
        if (!window.EchooAuth?.client) {
          setStatus("Supabase auth is not available on this page.", true);
          return;
        }
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        const displayName =
          nameInput.value.trim() || email.split("@")[0] || "Echoo User";
        if (!email || !password) {
          setStatus(
            "Add an email and password to create your free account.",
            true,
          );
          return;
        }

        const consentCheckbox = document.getElementById("pipeda-consent");
        if (consentCheckbox && !consentCheckbox.checked) {
          setStatus(
            "You must agree to the Privacy Policy and Terms of Service to sign up.",
            true,
          );
          return;
        }
        localStorage.setItem(
          "echoo_pipeda_consent_at",
          new Date().toISOString(),
        );

        setBusy(true, "Creating…");
        setStatus("Creating your free Echoo account…");
        try {
          const { data, error } = await window.EchooAuth.client.auth.signUp({
            email,
            password,
            options: {
              data: { display_name: displayName },
              emailRedirectTo: authRedirectForProvider(),
            },
          });
          if (error) throw error;

          let session = data.session;
          if (!session) {
            const signIn =
              await window.EchooAuth.client.auth.signInWithPassword({
                email,
                password,
              });
            if (signIn.error) {
              throw new Error(
                "The account was created, but Supabase email confirmation is still enabled for this project. Disable email confirmations so signup opens immediately.",
              );
            }
            session = signIn.data.session;
          }

          state.userName = displayName;
          state.userEmail = data.user?.email || email;
          setStatus(
            "Account ready. Now choose the signals Echoo should remember.",
          );
          startOnboarding("");
        } catch (error) {
          setStatus(error.message || "Could not create your account.", true);
        } finally {
          setBusy(false);
        }
      }

      document.getElementById("auth-form").addEventListener("submit", (e) => {
        e.preventDefault();
        if (OPEN_AUTH_BUTTONS_DIRECTLY_TO_APP) {
          openAppFromAuth();
          return;
        }
        if (state.mode === "signup") {
          startSignup();
        } else {
          finishSignIn();
        }
      });

      document.querySelectorAll("[data-provider]").forEach((btn) => {
        btn.addEventListener("click", async () => {
          if (OPEN_AUTH_BUTTONS_DIRECTLY_TO_APP) {
            openAppFromAuth(btn.dataset.provider);
            return;
          }

          if (!window.EchooAuth?.client) {
            setStatus("Supabase auth is not available on this page.", true);
            return;
          }
          const provider = btn.dataset.provider.toLowerCase();
          setStatus(`Opening ${btn.dataset.provider} sign in…`);
          const { error } = await window.EchooAuth.client.auth.signInWithOAuth({
            provider,
            options: {
              redirectTo: authRedirectForProvider(),
            },
          });
          if (error) setStatus(error.message, true);
        });
      });

      /* ── Onboarding steps ── */
      function renderObStep(index) {
        state.obStep = index;
        const step = OB_STEPS[index];

        obTitle.textContent = step.title;
        obSub.textContent = step.sub;
        obNext.textContent = step.btn;

        obBars.forEach((bar, i) => {
          bar.classList.remove("past", "current");
          if (i < index) bar.classList.add("past");
          else if (i === index) bar.classList.add("current");
        });

        obSteps.forEach((s) => {
          s.classList.remove("active");
          s.setAttribute("aria-hidden", "true");
          const inner = s.querySelector(".ob-step-inner");
          if (inner) inner.style.animation = "none";
        });

        const target = document.querySelector(`[data-ob-step="${index}"]`);
        void target.offsetWidth;
        target.classList.add("active");
        target.setAttribute("aria-hidden", "false");
        const inner = target.querySelector(".ob-step-inner");
        if (inner) inner.style.animation = "";

        const focusTarget = target.querySelector("button, input");
        if (focusTarget)
          setTimeout(() => focusTarget.focus({ preventScroll: true }), 80);
      }

      obNext.addEventListener("click", () => {
        const currentStep = OB_STEPS[state.obStep];
        if (
          currentStep &&
          currentStep.key === "city_intel_consent" &&
          !state.city_intel_consent
        ) {
          alert("Please select one of the choices to continue.");
          return;
        }
        if (
          currentStep &&
          currentStep.key === "casl_push_consent" &&
          !state.casl_push_consent
        ) {
          alert("Please select one of the choices to continue.");
          return;
        }
        if (state.obStep < OB_STEPS.length - 1) {
          renderObStep(state.obStep + 1);
        } else {
          finishOnboarding();
        }
      });

      function updatePressedState(button, selected) {
        button.classList.toggle("selected", selected);
        if (button.hasAttribute("aria-pressed"))
          button.setAttribute("aria-pressed", selected ? "true" : "false");
      }

      function updateRadioState(key, value) {
        state[key] = value;
        document.querySelectorAll(`[data-single="${key}"]`).forEach((card) => {
          const selected = card.dataset.value === value;
          card.classList.toggle("selected", selected);
          card.setAttribute("aria-checked", selected ? "true" : "false");
        });
      }

      function bindOnboardingControls() {
        obStepsWrap.addEventListener("click", (event) => {
          const multi = event.target.closest("[data-multi]");
          if (multi) {
            const key = multi.dataset.multi;
            const value = multi.dataset.value;
            const bucket = state[key];
            if (!bucket || typeof bucket.has !== "function") return;
            if (bucket.has(value)) {
              bucket.delete(value);
              updatePressedState(multi, false);
            } else {
              bucket.add(value);
              updatePressedState(multi, true);
            }
            return;
          }

          const single = event.target.closest("[data-single]");
          if (single) {
            updateRadioState(single.dataset.single, single.dataset.value);
            return;
          }

          const cityPill = event.target.closest("[data-city]");
          if (cityPill) {
            state.city = cityPill.dataset.city;
            if (cityInput) cityInput.value = state.city;
            document.querySelectorAll(".city-pill").forEach((pill) => {
              const selected = pill.dataset.city === state.city;
              pill.classList.toggle("selected", selected);
              pill.setAttribute("aria-checked", selected ? "true" : "false");
            });
          }
        });

        obStepsWrap.addEventListener("input", (event) => {
          if (event.target.id === "ob-city") {
            state.city = event.target.value;
            document.querySelectorAll(".city-pill").forEach((pill) => {
              const selected = pill.dataset.city === state.city;
              pill.classList.toggle("selected", selected);
              pill.setAttribute("aria-checked", selected ? "true" : "false");
            });
          }

          if (event.target.id === "dob") {
            state.dob = event.target.value;
          }

          if (event.target.dataset.custom) {
            state[event.target.dataset.custom] = event.target.value.trim();
          }
        });
      }

      renderOnboardingUI();

      /* ── Finish onboarding ── */
      async function finishOnboarding() {
        const name = state.userName || "User";
        const email = state.userEmail;
        const customInterest = state.customInterest
          ? [state.customInterest]
          : [];
        const customEventStyle = state.customEventStyle
          ? [state.customEventStyle]
          : [];
        const customAudience = state.customAudience
          ? [state.customAudience]
          : [];
        const customMotivation = state.customMotivation
          ? [state.customMotivation]
          : [];
        const interests = [...state.vibes, ...customInterest];
        const eventStyles = [...state.eventStyles, ...customEventStyle];
        const audiences = [...state.audiences, ...customAudience];
        const motivations = [...state.motivations, ...customMotivation];
        const vibes = interests.join(",");
        const budget = state.budget || "$";
        const energy = state.energy || "chill";
        const selectedCity = window.EchooLocationPlatform.cityByName(
          state.city || cityInput.value,
        );
        const city = selectedCity
          ? selectedCity.name
          : (state.city || cityInput?.value || "Ontario").trim();
        const tone = state.tone || "direct";
        const gender = state.gender || "Prefer not to say";
        const dob = state.dob || "";
        const personalizationProfile = {
          interests,
          eventStyles,
          audiences,
          motivations,
          budget,
          energy,
          city,
          gender,
          dob,
          tone,
        };

        const prefs = {
          name,
          email,
          vibes,
          interests,
          eventStyles,
          audiences,
          motivations,
          budget,
          energy,
          city,
          gender,
          dob,
          tone,
          personalizationProfile,
          pipeda_consent_at:
            localStorage.getItem("echoo_pipeda_consent_at") ||
            new Date().toISOString(),
          city_intel_consent_at:
            state.city_intel_consent === "yes"
              ? new Date().toISOString()
              : null,
          casl_push_consent_at:
            state.casl_push_consent === "yes" ? new Date().toISOString() : null,
        };
        localStorage.setItem("echoo_preferences", JSON.stringify(prefs));
        if (prefs.pipeda_consent_at)
          localStorage.setItem(
            "echoo_pipeda_consent_at",
            prefs.pipeda_consent_at,
          );
        if (prefs.city_intel_consent_at)
          localStorage.setItem(
            "echoo_city_intel_consent_at",
            prefs.city_intel_consent_at,
          );
        if (prefs.casl_push_consent_at)
          localStorage.setItem(
            "echoo_casl_push_consent_at",
            prefs.casl_push_consent_at,
          );

        setStatus("Saving your Echoo personality…");
        obNext.disabled = true;
        try {
          const saved = await window.EchooAuth.saveOnboardingProfile({
            ...prefs,
            source: "web_onboarding",
          });
          redirectAfterAuth(saved.preferences || prefs);
        } catch (error) {
          obNext.disabled = false;
          setStatus(
            error.message ||
              "Could not save onboarding. Please try again so Echoo can remember this profile.",
            true,
          );
        }
      }

      /* ═══════════════════════════════════════════════
         PROFILE DASHBOARD
         ═══════════════════════════════════════════════ */
      function showProfileDashboard(prefs) {
        authPanel.style.display = "none";
        onboarding.classList.remove("visible");
        profileDashboard.classList.add("visible");

        const name = prefs?.name || state.userName || "User";
        const email = prefs?.email || state.userEmail || "";
        const initials = name
          .split(" ")
          .map((w) => w[0])
          .join("")
          .toUpperCase()
          .slice(0, 2);

        document.getElementById("profile-avatar").textContent = initials || "U";
        document.getElementById("profile-name").textContent = name;
        document.getElementById("profile-email").textContent = email;

        const budgetMap = {
          $: "Low-key",
          $$: "Curated",
          $$$: "Premium",
        };
        const energyMap = {
          chill: "Chill and intimate",
          hype: "Active and social",
          curious: "Open-ended",
        };
        const toneMap = {
          direct: "Direct",
          detailed: "Contextual",
        };

        const interestCount = prefs?.interests?.length || 0;

        const cards = [
          { label: "City", value: prefs?.city || "Ontario" },
          {
            label: "Budget",
            value: budgetMap[prefs?.budget] || prefs?.budget || "$",
          },
          {
            label: "Energy",
            value: energyMap[prefs?.energy] || prefs?.energy || "Chill",
          },
          {
            label: "Interests",
            value: interestCount
              ? `${interestCount} signal${interestCount !== 1 ? "s" : ""}`
              : "None yet",
          },
          {
            label: "Tone",
            value: toneMap[prefs?.tone] || prefs?.tone || "Direct",
          },
        ];

        let cardsHtml = cards
          .map(
            (card) => `
          <div class="profile-card">
            <span class="profile-card-label">${card.label}</span>
            <span class="profile-card-value">${card.value}</span>
          </div>
        `,
          )
          .join("");

        cardsHtml += `
          <a href="compliance.html" class="profile-card" style="border: 1px dashed var(--peach); background: rgba(247, 213, 178, 0.04); display: flex; align-items: center; justify-content: space-between; gap: 12px; min-height: 56px; padding: 14px 18px; border-radius: 14px; transition: background 180ms ease;">
            <span class="profile-card-label" style="color: var(--peach);">Legal Compliance</span>
            <span class="profile-card-value" style="color: var(--peach); display: flex; align-items: center; gap: 4px;">
              Checklist
              <svg viewBox="0 0 24 24" style="width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2;" aria-hidden="true">
                <path d="M5 12h14M12 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
          </a>
        `;

        document.getElementById("profile-cards").innerHTML = cardsHtml;
      }

      document
        .getElementById("signout-btn")
        .addEventListener("click", async () => {
          if (window.EchooAuth?.client) {
            await window.EchooAuth.client.auth.signOut();
          }
          localStorage.removeItem("echoo_preferences");
          window.location.reload();
        });

      /* ── Boot ── */
      async function bootAuthPage() {
        if (preferredMode === "signup" || authParams.has("next")) {
          setMode("signup");
        } else {
          setMode("signin");
        }
        if (!window.EchooAuth?.client) {
          setStatus("Supabase auth is not available on this page.", true);
          return;
        }
        const profileState = await window.EchooAuth.loadOnboardingProfile();
        if (!profileState.session?.user) return;

        state.userName =
          profileState.preferences?.name ||
          profileState.session.user.user_metadata?.display_name ||
          profileState.session.user.email?.split("@")[0] ||
          "User";
        state.userEmail =
          profileState.preferences?.email ||
          profileState.session.user.email ||
          "";
        if (state.userName) nameInput.value = state.userName;
        if (state.userEmail) emailInput.value = state.userEmail;

        if (profileState.ok) {
          redirectAfterAuth(profileState.preferences);
          return;
        }
        setStatus("Finish onboarding to unlock Echoo planning.");
        startOnboarding("");
      }

      bootAuthPage();
    </script>
  </body>
</html>
