<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Echoo Tickets</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #080907;
        --panel: #11130f;
        --ink: #f5f1e8;
        --muted: #a8a397;
        --line: rgba(245, 241, 232, 0.14);
        --signal: #e7c98e;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
      }
      a {
        color: inherit;
        text-decoration: none;
      }
      button,
      input {
        font: inherit;
      }
      main {
        width: min(980px, 100%);
        margin: 0 auto;
        padding: 28px 16px 80px;
      }
      header {
        display: flex;
        justify-content: space-between;
        align-items: end;
        gap: 14px;
        margin-bottom: 20px;
      }
      h1 {
        margin: 0;
        font-size: clamp(42px, 12vw, 88px);
        line-height: 0.88;
        letter-spacing: -0.075em;
      }
      p {
        color: var(--muted);
        line-height: 1.45;
      }
      .panel,
      .ticket {
        border: 1px solid var(--line);
        background: rgba(17, 19, 15, 0.92);
        padding: 16px;
      }
      .lookup {
        display: grid;
        gap: 10px;
        margin-bottom: 16px;
      }
      input {
        min-height: 48px;
        border: 1px solid var(--line);
        border-radius: 0;
        outline: 0;
        color: var(--ink);
        background: rgba(8, 9, 7, 0.84);
        padding: 0 12px;
      }
      button {
        min-height: 48px;
        border: 1px solid transparent;
        border-radius: 0;
        color: #151311;
        background: var(--signal);
        cursor: pointer;
        font-weight: 950;
      }
      .grid {
        display: grid;
        gap: 12px;
      }
      .ticket {
        display: grid;
        gap: 12px;
      }
      .qr {
        display: grid;
        place-items: center;
        min-height: 150px;
        border: 1px solid var(--line);
        color: var(--signal);
        background:
          linear-gradient(90deg, rgba(245, 241, 232, 0.08) 1px, transparent 1px)
            0 0 / 14px 14px,
          rgba(8, 9, 7, 0.82);
        font-size: 28px;
        font-weight: 950;
        letter-spacing: 0.08em;
      }
      .meta {
        color: var(--muted);
        font-size: 13px;
        font-weight: 750;
      }
      .empty {
        border: 1px dashed var(--line);
        color: var(--muted);
        padding: 16px;
      }
      @media (min-width: 760px) {
        .lookup {
          grid-template-columns: 1fr auto;
          align-items: end;
        }
        .ticket {
          grid-template-columns: 1fr 220px;
          align-items: stretch;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>My Tickets</h1>
          <p>
            Confirmed Echoo tickets appear here by this browser session or buyer
            email.
          </p>
        </div>
        <a class="meta" href="events.html">Discover</a>
      </header>

      <section class="panel lookup">
        <label style="display: grid; gap: 7px"
          >Buyer email
          <input
            id="email"
            autocomplete="email"
            placeholder="name@example.com"
          />
        </label>
        <button id="load" type="button">Load tickets</button>
      </section>

      <section class="grid" id="tickets">
        <div class="empty">Load tickets to begin.</div>
      </section>
    </main>
    <script>
      const ENDPOINT =
        "https://dlezregdjpdqmooubwvl.supabase.co/functions/v1/my-tickets";
      const ANON_KEY = "sb_publishable_4FeunYH-ItDm68Sjg93c_w_s8yMizxH";
      const ticketsEl = document.getElementById("tickets");
      const emailEl = document.getElementById("email");

      emailEl.value = localStorage.getItem("echoo_ticket_buyer_email") || "";

      function sessionId() {
        let id = localStorage.getItem("echoo_ticket_session_id");
        if (!id) {
          id = crypto.randomUUID
            ? crypto.randomUUID()
            : `session-${Date.now()}-${Math.random().toString(16).slice(2)}`;
          localStorage.setItem("echoo_ticket_session_id", id);
        }
        return id;
      }

      function render(tickets) {
        if (!tickets.length) {
          ticketsEl.innerHTML =
            '<div class="empty">No confirmed tickets found yet. Paid manual orders appear here after owner confirmation.</div>';
          return;
        }
        ticketsEl.innerHTML = tickets
          .map((ticket) => {
            const event = ticket.ticketed_events || {};
            const tier = ticket.ticket_tiers || {};
            const starts = event.starts_at
              ? new Date(event.starts_at).toLocaleString([], {
                  dateStyle: "medium",
                  timeStyle: "short",
                })
              : "Date TBA";
            return `
            <article class="ticket">
              <div>
                <div class="meta">${tier.name || "Ticket"} · ${starts}</div>
                <h2 style="margin:8px 0 6px;">${event.title || "Echoo event"}</h2>
                <p>${event.venue_name || "Venue TBA"} · ${event.city || "Canada"}, ${event.province || ""}</p>
                <div class="meta">Display code: ${ticket.display_code}</div>
              </div>
              <div class="qr">${ticket.display_code}</div>
            </article>
          `;
          })
          .join("");
      }

      async function loadTickets() {
        const email = emailEl.value.trim();
        localStorage.setItem("echoo_ticket_buyer_email", email);
        ticketsEl.innerHTML = '<div class="empty">Loading tickets...</div>';
        const query = new URLSearchParams({ sessionId: sessionId() });
        if (email) query.set("email", email);
        try {
          const response = await fetch(`${ENDPOINT}?${query}`, {
            headers: { Authorization: `Bearer ${ANON_KEY}`, apikey: ANON_KEY },
          });
          const json = await response.json();
          if (!response.ok)
            throw new Error(json.error || "Ticket lookup failed");
          render(json.tickets || []);
        } catch (error) {
          ticketsEl.innerHTML = `<div class="empty">${error.message}</div>`;
        }
      }

      document.getElementById("load").addEventListener("click", loadTickets);
      loadTickets();
    </script>
  </body>
</html>
