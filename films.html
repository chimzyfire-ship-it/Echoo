<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>echoo films</title>
    <style>
      :root {
        color-scheme: dark;
        --ink: #f8f5ef;
        --muted: #aaa29a;
        --soft: rgba(248, 245, 239, 0.72);
        --line: rgba(248, 245, 239, 0.12);
        --line-strong: rgba(248, 245, 239, 0.2);
        --glass: rgba(30, 30, 29, 0.72);
        --peach: #f7d5b2;
        --black: #050505;
        --panel: #131313;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      /* ── Viewport stability ── */
      html,
      body {
        max-width: 100%;
        overflow-x: hidden;
        overflow-x: clip;
        overscroll-behavior-y: none;
        -webkit-text-size-adjust: 100%;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        position: relative;
        overflow-wrap: break-word;
      }
      img,
      video,
      svg,
      canvas,
      iframe,
      table {
        max-width: 100%;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
        background: #000;
        color: var(--ink);
      }

      body {
        min-height: 100svh;
        display: grid;
        justify-items: center;
        align-items: start;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button {
        font: inherit;
        -webkit-tap-highlight-color: transparent;
        cursor: pointer;
      }

      .app-shell {
        width: min(100vw, 430px);
        min-height: 100svh;
        position: relative;
        isolation: isolate;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% -4%, rgba(255, 255, 255, 0.14), transparent 18rem),
          radial-gradient(circle at 16% 46%, rgba(255, 212, 166, 0.08), transparent 14rem),
          linear-gradient(145deg, #161716 0%, #080808 44%, #030303 100%);
      }

      .app-shell::after {
        position: absolute;
        inset: 0;
        z-index: -1;
        content: "";
        background:
          linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.035),
            transparent 18%,
            transparent 82%,
            rgba(255, 255, 255, 0.028)
          ),
          radial-gradient(
            ellipse at center,
            transparent 48%,
            rgba(0, 0, 0, 0.62) 100%
          );
        pointer-events: none;
      }

      /* ── Topbar ── */
      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: calc(14px + env(safe-area-inset-top)) 27px 12px;
        background: rgba(8, 8, 8, 0.6);
        backdrop-filter: blur(22px);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        width: 96px;
        height: 34px;
        overflow: hidden;
      }

      .brand img {
        display: block;
        width: 96px;
        height: auto;
        filter: brightness(1.2) contrast(1.05);
      }

      .profile-link {
        width: 34px;
        height: 34px;
        border: 2px solid rgba(248, 245, 239, 0.7);
        border-radius: 50%;
        position: relative;
        opacity: 0.9;
      }

      .profile-link::before {
        position: absolute;
        top: 6px;
        left: 50%;
        width: 8px;
        height: 8px;
        border: 2px solid currentColor;
        border-radius: 50%;
        content: "";
        transform: translateX(-50%);
      }

      .profile-link::after {
        position: absolute;
        left: 7px;
        right: 7px;
        bottom: 6px;
        height: 10px;
        border: 2px solid currentColor;
        border-bottom: 0;
        border-radius: 14px 14px 0 0;
        content: "";
      }

      /* ── Main ── */
      main {
        display: grid;
        gap: 18px;
        padding: 18px 27px calc(110px + env(safe-area-inset-bottom));
      }

      /* ── Hero ── */
      .hero {
        display: grid;
        gap: 12px;
        padding: 10px 0 4px;
      }

      .hero h1 {
        margin: 0;
        font-size: clamp(38px, 11vw, 52px);
        line-height: 1.02;
        font-weight: 820;
        letter-spacing: -0.02em;
      }

      .hero p {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.42;
        font-weight: 520;
      }

      /* ── Screen ── */
      .screen {
        display: grid;
        gap: 14px;
        opacity: 0;
        transform: translateY(12px) scale(0.985);
        pointer-events: none;
        transition:
          opacity 300ms cubic-bezier(0.2, 0.8, 0.2, 1),
          transform 300ms cubic-bezier(0.2, 0.8, 0.2, 1);
      }

      .screen.active {
        opacity: 1;
        transform: translateY(0) scale(1);
        pointer-events: auto;
      }

      .trailer-stage {
        position: relative;
        overflow: hidden;
        border-radius: 14px;
        background: #000;
        border: 1px solid var(--line);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
      }

      .trailer-frame {
        position: relative;
        width: 100%;
        aspect-ratio: 16 / 10;
      }

      .trailer-frame iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
      }

      .film-copy {
        display: grid;
        gap: 6px;
      }

      .film-copy span {
        color: var(--peach);
        font-size: 10px;
        font-weight: 650;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .film-copy h2 {
        margin: 0;
        font-size: 24px;
        line-height: 1.1;
        font-weight: 680;
      }

      .film-copy p {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.42;
        font-weight: 520;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
      }

      .action {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 0 20px;
        color: var(--ink);
        background: rgba(248, 245, 239, 0.04);
        cursor: pointer;
        font-size: 13px;
        font-weight: 650;
        transition:
          border-color 180ms ease,
          background 180ms ease,
          transform 180ms ease;
      }

      .action:hover {
        border-color: var(--line-strong);
        background: rgba(248, 245, 239, 0.08);
        transform: translateY(-1px);
      }

      .action.primary {
        color: #111;
        background: var(--peach);
        border-color: transparent;
        font-weight: 680;
      }

      .action.primary:hover {
        background: #f5cf7e;
      }

      /* ── Queue ── */
      .queue {
        display: grid;
        gap: 8px;
        margin-top: 10px;
      }

      .queue-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        color: rgba(248, 245, 239, 0.48);
        font-size: 10px;
        font-weight: 650;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .film-row {
        display: grid;
        grid-template-columns: 56px 1fr;
        align-items: center;
        gap: 12px;
        min-height: 72px;
        border: 1px solid transparent;
        border-radius: 14px;
        padding: 8px;
        color: var(--ink);
        background: rgba(248, 245, 239, 0.03);
        text-align: left;
        cursor: pointer;
        transition:
          transform 180ms ease,
          background 180ms ease,
          border-color 180ms ease;
      }

      .film-row:hover {
        transform: translateY(-1px);
        background: rgba(248, 245, 239, 0.06);
      }

      .film-row.active {
        border-color: var(--line-strong);
        background: rgba(248, 245, 239, 0.07);
      }

      .film-row img {
        width: 56px;
        height: 56px;
        border-radius: 10px;
        object-fit: cover;
      }

      .film-row strong {
        display: block;
        font-size: 16px;
        line-height: 1.15;
        font-weight: 620;
      }

      .film-row span span {
        display: block;
        margin-top: 4px;
        color: rgba(248, 245, 239, 0.48);
        font-size: 11px;
        font-weight: 520;
      }

      /* ── Bottom navigation ── */
      .bottom-nav {
        position: fixed;
        left: 50%;
        bottom: 12px;
        z-index: 30;
        width: min(376px, calc(100% - 52px));
        min-height: 72px;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 6px;
        padding: 10px 15px 8px;
        border: 1px solid rgba(248, 245, 239, 0.06);
        border-radius: 28px;
        background: rgba(25, 25, 24, 0.82);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.05),
          0 18px 44px rgba(0, 0, 0, 0.42);
        backdrop-filter: blur(26px);
        transform: translateX(-50%);
      }

      .nav-link {
        min-width: 0;
        display: grid;
        justify-items: center;
        align-content: center;
        gap: 5px;
        color: rgba(248, 245, 239, 0.62);
        font-size: 12px;
        font-weight: 560;
      }

      .nav-link.active {
        color: var(--peach);
      }

      .nav-link svg {
        width: 27px;
        height: 27px;
        stroke: currentColor;
        stroke-width: 1.8;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .nav-link.active svg {
        fill: currentColor;
        stroke-width: 0;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          scroll-behavior: auto !important;
          transition-duration: 0.01ms !important;
          animation-duration: 0.01ms !important;
          animation: none !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar" aria-label="Echoo">
        <a class="brand" href="index.html" aria-label="Echoo home">
          <img src="assets/echoo-wordmark.png" alt="echoo" />
        </a>
        <a class="profile-link" href="auth.html" aria-label="Open your profile"></a>
      </header>

      <main>
        <section class="hero" data-echoo-hero="films">
          <h1 data-echoo-hero-title>Trailers worth a night out.</h1>
          <p data-echoo-hero-copy>
            A compact cinema room for beautiful trailers, date-night films, and
            movies that feel worth planning around.
          </p>
        </section>

        <section class="screen active" id="film-screen" aria-live="polite">
          <div class="trailer-stage">
            <div class="trailer-frame" id="trailer-frame"></div>
          </div>
          <div class="film-copy">
            <span id="film-meta">Trailer</span>
            <h2 id="film-title"></h2>
            <p id="film-copy"></p>
          </div>
          <div class="actions">
            <a class="action primary" id="film-search" href="events.html?query=film%20screenings%20ontario">
              Find screenings
            </a>
            <button class="action" id="next-film" type="button">Next</button>
          </div>
        </section>

        <section class="queue" aria-label="Trailer queue">
          <div class="queue-title">
            <span>Now screening</span>
            <span>Swipe energy</span>
          </div>
          <div id="film-list"></div>
        </section>
      </main>

      <nav class="bottom-nav" aria-label="Main navigation">
        <a class="nav-link" href="index.html">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11.5 12 4l9 7.5V21h-6v-6H9v6H3Z" /></svg>
          <span>Home</span>
        </a>
        <a class="nav-link active" href="events.html" aria-current="page">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7" /><path d="m16 16 4 4" /></svg>
          <span>Discover</span>
        </a>
        <a class="nav-link" href="tickets.html">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 9a3 3 0 0 0 0 6v3h18v-3a3 3 0 0 0 0-6V6H3Z" /><path d="M13 6v12" /></svg>
          <span>Tickets</span>
        </a>
        <a class="nav-link" href="auth.html">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="8" r="4" /><path d="M4 21a8 8 0 0 1 16 0" /></svg>
          <span>Profile</span>
        </a>
      </nav>
    </div>

    <script src="assets/hero-copy.js"></script>
    <script>
      const films = [
        {
          title: "The Wild Robot",
          mood: "Tender sci-fi adventure",
          copy: "A luminous animated survival story with heart, wonder, and the kind of trailer that instantly feels like a shared plan.",
          video: "67vbA5ZJdKQ",
          poster: "assets/optimized/news-movie-768.jpg",
          query: "The Wild Robot screenings Ontario",
        },
        {
          title: "Dune: Part Two",
          mood: "Epic cinema night",
          copy: "Huge scale, desert myth, and a trailer built for the biggest screen you can find.",
          video: "Way9Dexny3w",
          poster: "assets/optimized/background-1400.jpg",
          query: "Dune Part Two screenings Ontario",
        },
        {
          title: "Inside Out 2",
          mood: "Feel-good group pick",
          copy: "Bright, funny, and easy to say yes to when the group needs something lighter.",
          video: "LEjhY15eCx0",
          poster: "assets/optimized/news-date-768.jpg",
          query: "Inside Out 2 screenings Ontario",
        },
        {
          title: "Wicked",
          mood: "Musical spectacle",
          copy: "Big vocals, polished fantasy, and date-night theatrical energy in one trailer.",
          video: "6COmYeLsz4c",
          poster: "assets/optimized/news-music-768.jpg",
          query: "Wicked movie screenings Ontario",
        },
      ];

      const screen = document.getElementById("film-screen");
      const frame = document.getElementById("trailer-frame");
      const title = document.getElementById("film-title");
      const copy = document.getElementById("film-copy");
      const meta = document.getElementById("film-meta");
      const search = document.getElementById("film-search");
      const list = document.getElementById("film-list");
      let activeIndex = 0;

      function trailerMarkup(film) {
        return `<iframe src="https://www.youtube-nocookie.com/embed/${film.video}?rel=0&modestbranding=1&playsinline=1" title="${film.title} trailer" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen loading="lazy"></iframe>`;
      }

      function renderQueue() {
        list.innerHTML = films
          .map(
            (film, index) => `
              <button class="film-row ${index === activeIndex ? "active" : ""}" type="button" data-index="${index}">
                <img src="${film.poster}" alt="" loading="lazy" decoding="async">
                <span>
                  <strong>${film.title}</strong>
                  <span>${film.mood}</span>
                </span>
              </button>
            `,
          )
          .join("");
      }

      function setFilm(index) {
        activeIndex = (index + films.length) % films.length;
        const film = films[activeIndex];
        screen.classList.remove("active");
        window.setTimeout(() => {
          frame.innerHTML = trailerMarkup(film);
          title.textContent = film.title;
          copy.textContent = film.copy;
          meta.textContent = film.mood;
          search.href = `events.html?query=${encodeURIComponent(film.query)}`;
          renderQueue();
          screen.classList.add("active");
        }, 160);
      }

      document.getElementById("next-film").addEventListener("click", () => {
        setFilm(activeIndex + 1);
      });

      list.addEventListener("click", (event) => {
        const row = event.target.closest("[data-index]");
        if (!row) return;
        setFilm(Number(row.dataset.index));
      });

      renderQueue();
      setFilm(0);
    </script>
  </body>
</html>
